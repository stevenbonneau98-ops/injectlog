          ${SWITCH_REASONS.map(r => `<option value="${r.key}" ${inj.switchReason === r.key ? 'selected' : ''}>${escapeHtml(switchReasonLabel(r.key))}</option>`).join('')}
        </select>
      </label>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.va'))}</span>
        <input id="i-va" type="text" placeholder="${escapeAttr(t('inj.va.ph'))}" value="${escapeAttr(inj.vaSnellen || '')}" autocapitalize="none">
      </label>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.crt'))}</span>
        <input id="i-crt" type="number" min="100" max="900" inputmode="numeric" value="${inj.crtUm ?? ''}">
      </label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <label class="field">
          <span class="lbl">${escapeHtml(t('inj.iop.pre'))}</span>
          <input id="i-iop-pre" type="number" min="1" max="60" inputmode="numeric" value="${inj.iopPre ?? ''}">
        </label>
        <label class="field">
          <span class="lbl">${escapeHtml(t('inj.iop.post'))}</span>
          <input id="i-iop-post" type="number" min="1" max="60" inputmode="numeric" value="${inj.iopPost ?? ''}">
        </label>
      </div>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.interval.next'))}</span>
        <input id="i-int" type="number" min="1" max="24" inputmode="numeric" value="${inj.intervalWeeksApplied || 4}">
      </label>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.complications'))}</span>
        <div class="chip-grid" id="i-comp">
          ${COMPLICATIONS.map(c => `<button type="button" class="chip ${(inj.complications || []).includes(c.key) ? 'selected' : ''}" data-k="${c.key}">${escapeHtml(complicationLabel(c.key))}</button>`).join('')}
        </div>
      </label>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.oct'))}</span>
        <div style="display:flex; gap:10px; align-items:center;">
          <div id="i-oct-thumb">${octThumb}</div>
          <button id="i-oct-add" type="button" class="btn-secondary" style="flex:1;">${escapeHtml(inj.octPhoto ? t('inj.oct.remove') : t('inj.oct.add'))}</button>
          <input id="i-oct-input" type="file" accept="image/*" style="display:none;">
        </div>
      </label>
      <label class="field" style="margin-bottom:0;">
        <span class="lbl">${escapeHtml(t('inj.notes'))}</span>
        <textarea id="i-notes">${escapeHtml(inj.notes || '')}</textarea>
      </label>
    </div>
    <button id="i-save" class="btn-block">${escapeHtml(t('btn.save'))}</button>
    ${state.injectionId ? `<button id="i-delete" class="btn-danger" style="margin-top:10px;">${escapeHtml(t('btn.delete'))}</button>` : ''}`;

  // Show switch-reason field whenever the chosen drug differs from the
  // patient's current plan for that eye OR the previous injection's drug.
  const drugSelect = document.getElementById('i-drug');
  const switchWrap = document.getElementById('switch-wrap');
  const previousInjs = await db.listInjections(patient.id);
  const prevForEye = previousInjs.find(i => i.eye === inj.eye && i.id !== inj.id);
  const checkSwitch = () => {
    const cur = drugSelect.value;
    const ref = prevForEye?.drug || patient.eyes[inj.eye].drug;
    switchWrap.style.display = (ref && cur !== ref) ? '' : 'none';
  };
  drugSelect.addEventListener('change', () => {
    inj.eye = view.querySelector('#i-eye button.on')?.dataset.v || 'od';
    checkSwitch();
  });
  checkSwitch();

  view.querySelectorAll('#i-eye button').forEach(b => {
    b.onclick = () => {
      view.querySelectorAll('#i-eye button').forEach(x => x.classList.toggle('on', x === b));
      checkSwitch();
    };
  });
  view.querySelectorAll('#i-comp .chip').forEach(c => {
    c.onclick = () => c.classList.toggle('selected');
  });
  const bilatBtn = document.getElementById('i-bilateral');
  if (bilatBtn) bilatBtn.onclick = () => bilatBtn.classList.toggle('on');
  const octBtn = document.getElementById('i-oct-add');
  const octInput = document.getElementById('i-oct-input');
  octBtn.onclick = () => {
    if (inj.octPhoto) {
      inj.octPhoto = null;
      document.getElementById('i-oct-thumb').innerHTML = '';
      octBtn.textContent = t('inj.oct.add');
    } else {
      octInput.click();
    }
  };
  octInput.onchange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    inj.octPhoto = await processPhotoFile(file, 1600);
    document.getElementById('i-oct-thumb').innerHTML = `<div class="oct-thumb"><img src="${URL.createObjectURL(inj.octPhoto)}" alt=""></div>`;
    octBtn.textContent = t('inj.oct.remove');
  };
  document.getElementById('i-save').onclick = async () => {
    inj.date = document.getElementById('i-date').value || todayISO();
    inj.eye = view.querySelector('#i-eye button.on')?.dataset.v || 'od';
    inj.drug = document.getElementById('i-drug').value;
    inj.vaSnellen = document.getElementById('i-va').value.trim();
    const crt = Number(document.getElementById('i-crt').value);
    inj.crtUm = isFinite(crt) && crt > 0 ? crt : null;
    const ip = Number(document.getElementById('i-iop-pre').value);
    inj.iopPre = isFinite(ip) && ip > 0 ? ip : null;
    const ipp = Number(document.getElementById('i-iop-post').value);
    inj.iopPost = isFinite(ipp) && ipp > 0 ? ipp : null;
    const iv = Number(document.getElementById('i-int').value);
    inj.intervalWeeksApplied = (isFinite(iv) && iv >= 1 && iv <= 24) ? iv : 4;
    inj.complications = Array.from(view.querySelectorAll('#i-comp .chip.selected')).map(c => c.dataset.k);
    inj.switchReason = document.getElementById('i-switch')?.value || '';
    inj.notes = document.getElementById('i-notes').value.trim();
    inj.bilateral = !!view.querySelector('#i-bilateral')?.classList.contains('on');

    // Safety gates: drug-allergy + pre-IOP > 25 mmHg (relative contraindication).
    const fresh = await db.getPatient(inj.patientId);
    ensurePatientShape(fresh);
    if (Array.isArray(fresh.allergies) && fresh.allergies.includes(inj.drug)) {
      if (!confirm((getLang() === 'fr' ? '⚠ Le patient a une allergie/intolérance enregistrée à ' : '⚠ Patient has a recorded allergy / intolerance to ') + drugLabel(inj.drug) + (getLang() === 'fr' ? '. Continuer quand même ?' : '. Inject anyway?'))) return;
    }
    if (inj.iopPre && inj.iopPre > 25) {
      if (!confirm((getLang() === 'fr' ? '⚠ PIO pré-injection ' : '⚠ Pre-injection IOP is ') + inj.iopPre + (getLang() === 'fr' ? ' mmHg (> 25). Confirmer l\'injection ?' : ' mmHg (> 25). Proceed with the injection?'))) return;
    }

    await db.saveInjection(inj);
    // If bilateral, save a sibling injection for the other eye.
    if (inj.bilateral) {
      const otherEye = inj.eye === 'od' ? 'os' : 'od';
      const sibling = { ...inj, id: uid(), eye: otherEye, bilateral: false, _bilateralOf: inj.id };
      delete sibling._bilateralOf;
      await db.saveInjection(sibling);
      const cur = await db.getPatient(inj.patientId);
      ensurePatientShape(cur);
      cur.eyes[otherEye].intervalWeeks = inj.intervalWeeksApplied;
      if (!cur.eyes[otherEye].active) cur.eyes[otherEye].active = true;
      cur.eyes[otherEye].drug = inj.drug;
      await db.savePatient(cur);
    }
    const cur = await db.getPatient(inj.patientId);
    ensurePatientShape(cur);
    cur.eyes[inj.eye].intervalWeeks = inj.intervalWeeksApplied;
    if (!cur.eyes[inj.eye].active) cur.eyes[inj.eye].active = true;
    cur.eyes[inj.eye].drug = inj.drug;
    await db.savePatient(cur);
    toast(t('inj.saved'));
    if (!(await goBack())) go('patient', { patientId: inj.patientId });
  };
  const delBtn = document.getElementById('i-delete');
  if (delBtn) delBtn.onclick = async () => {
    if (!confirm(t('inj.delete.confirm'))) return;
    await db.deleteInjection(inj.id);
    pruneNavStack(s => s.injectionId === inj.id);
    toast(t('inj.deleted'));
    if (!(await goBack())) go('patient', { patientId: inj.patientId });
  };
}

/* =====================================================================
   Per-patient stats
   =================================================================== */
async function renderPatientStats() {
  const patient = await db.getPatient(state.patientId);
  if (!patient) return go('patients');
  const injs = await db.listInjections(patient.id);
  titleEl.textContent = t('pstats.title');
  primaryBtn.style.display = 'none';

  // Table-open state persists per eye for this patient-stats visit.
  // Default is OPEN (user wanted auto-expand).
  if (!state.tlTableOpen) state.tlTableOpen = { od: true, os: true };

  const eyeStats = (eyeKey) => {
    const list = injs.filter(i => i.eye === eyeKey).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    if (!list.length) return { count: 0 };
    const first = list[0], last = list[list.length - 1];
    const years = first.date ? daysBetween(first.date, last.date) / 365 : 0;
    const switches = [];
    let lastDrug = null;
    for (const i of list) { if (lastDrug && i.drug !== lastDrug) switches.push(i); lastDrug = i.drug; }
    let longest = 0;
    for (let i = 1; i < list.length; i++) {
      const gap = daysBetween(list[i - 1].date, list[i].date);
      if (gap > longest) longest = gap;
    }
    const baselineVAStr = list.find(i => i.vaSnellen)?.vaSnellen || null;
    const latestVAStr = [...list].reverse().find(i => i.vaSnellen)?.vaSnellen || null;
    const baselineVA = snellenToLogMAR(baselineVAStr);
    const latestVA = snellenToLogMAR(latestVAStr);
    const vaImproved = (baselineVA != null && latestVA != null) ? (baselineVA - latestVA) : null; // >0 = better
    const baselineCRT = list.find(i => typeof i.crtUm === 'number')?.crtUm;
    const latestCRT = [...list].reverse().find(i => typeof i.crtUm === 'number')?.crtUm;
    const crtDelta = (baselineCRT && latestCRT) ? (latestCRT - baselineCRT) : null;
    return {
      count: list.length,
      years: years.toFixed(1),
      switches: switches.length,
      longestWeeks: (longest / 7).toFixed(1),
      baselineVAStr, latestVAStr, vaImproved,
      crtDelta,
    };
  };

  const od = eyeStats('od');
  const os = eyeStats('os');
  const odInj = injs.filter(i => i.eye === 'od').slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const osInj = injs.filter(i => i.eye === 'os').slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  const fr = getLang() === 'fr';
  const vaTile = (s) => {
    if (!s.baselineVAStr || !s.latestVAStr) return '—';
    const color = s.vaImproved > 0.05 ? 'var(--green)' : (s.vaImproved < -0.05 ? 'var(--ember)' : 'var(--text)');
    return `<span style="color:${color}; font-family:var(--serif); font-size:18px;">${escapeHtml(s.baselineVAStr)} <span style="color:var(--text3); font-size:14px;">→</span> ${escapeHtml(s.latestVAStr)}</span>`;
  };

  const visitsTable = (eyeKey, listAsc) => {
    // listAsc is oldest → newest; intervals are computed against the prior
    // injection (in ASC order), then the table is rendered DESC.
    const withInterval = listAsc.map((i, idx) => {
      const prev = listAsc[idx - 1];
      const weeks = prev ? (daysBetween(prev.date, i.date) / 7) : null;
      return { ...i, intervalWeeks: weeks };
    }).reverse();
    return `
      <table style="width:100%; border-collapse:collapse; font-size:12px; font-variant-numeric:tabular-nums;">
        <thead><tr style="text-align:left; color:var(--text3); font-weight:600;">
          <th style="padding:4px 6px 4px 0;">${escapeHtml(fr ? 'Date' : 'Date')}</th>
          <th style="padding:4px 6px;">${escapeHtml(fr ? 'Interv.' : 'Interv.')}</th>
          <th style="padding:4px 6px;">${escapeHtml(fr ? 'Produit' : 'Drug')}</th>
          <th style="padding:4px 6px;">VA</th>
          <th style="padding:4px 6px;">CRT</th>
        </tr></thead>
        <tbody>
          ${withInterval.map(i => `
            <tr style="border-top:1px solid var(--separator);">
              <td style="padding:5px 6px 5px 0;">${escapeHtml(fmtDate(i.date))}</td>
              <td style="padding:5px 6px; color:var(--text3);">${i.intervalWeeks != null ? i.intervalWeeks.toFixed(1) + ' w' : '—'}</td>
              <td style="padding:5px 6px;"><span class="drug-pill" style="background:${drug(i.drug).color}; flex:0 0 auto;">${escapeHtml(drugLabel(i.drug))}</span></td>
              <td style="padding:5px 6px;">${escapeHtml(i.vaSnellen || '—')}</td>
              <td style="padding:5px 6px;">${typeof i.crtUm === 'number' ? i.crtUm + ' µm' : '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  };

  // Faint blue background for OD card, faint yellow for OS card so eyes
  // are visually unmistakable. Borders match the same hue, intensified.
  const eyeStyle = (eyeKey) => eyeKey === 'od'
    ? 'background:rgba(10,107,255,0.05); border-color:rgba(10,107,255,0.25);'
    : 'background:rgba(245,158,11,0.07); border-color:rgba(245,158,11,0.30);';

  const card = (eyeKey, s, list) => {
    const tableOpen = state.tlTableOpen[eyeKey] !== false; // default open
    return `
      <div class="card" style="margin-bottom:10px; ${eyeStyle(eyeKey)}">
        <h3 style="font-family:var(--serif); margin:0 0 8px; font-size:16px;">${escapeHtml(eyeKey === 'od' ? t('eye.od') : t('eye.os'))}</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px;">
          <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.injections'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.count || 0}</div></div>
          <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.years.on.tx'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.years ?? '0'}</div></div>
          <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.switches'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.switches ?? 0}</div></div>
          <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.longest.dry'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.longestWeeks ?? '—'}</div></div>
          <div style="grid-column:1 / -1;"><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(fr ? 'AV (Snellen) départ → actuel' : 'VA (Snellen) baseline → latest')}</div><div>${vaTile(s)}</div></div>
          <div style="grid-column:1 / -1;"><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.crt.delta'))}</div><div style="font-family:var(--serif); font-size:20px; color:${s.crtDelta < 0 ? 'var(--green)' : (s.crtDelta > 0 ? 'var(--ember)' : 'var(--text)')}">${s.crtDelta != null ? (s.crtDelta > 0 ? '+' : '') + s.crtDelta + ' µm' : '—'}</div></div>
        </div>
        ${list.length ? `
          <div style="margin-top:12px;">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
              <div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.timeline'))}</div>
              <div style="font-size:10px; color:var(--text3);">${escapeHtml(fr ? 'Toucher pour agrandir' : 'Tap to expand')}</div>
            </div>
            <div data-tl-open="${eyeKey}" style="cursor:zoom-in;">${combinedTimelineSvg(list)}</div>
          </div>
          <div class="section-toggle ${tableOpen ? 'open' : ''}" data-tl-table="${eyeKey}" style="margin-top:8px;">
            <div class="toggle-head" style="padding:8px 4px;"><span class="caret">›</span><span style="font-size:14px;">${escapeHtml(fr ? 'Visites (récent → ancien)' : 'Visits (recent → oldest)')}</span><span class="sub">${list.length}</span></div>
            <div class="toggle-body">${visitsTable(eyeKey, list)}</div>
          </div>` : ''}
      </div>`;
  };
  view.innerHTML = `
    <h3 class="section-title">${escapeHtml(formatPatientName(patient))}</h3>
    ${card('od', od, odInj)}
    ${card('os', os, osInj)}
    <p style="font-size:11px; color:var(--text3); line-height:1.4; margin: 4px 4px 12px;">${escapeHtml(t('pstats.timeline.legend'))}</p>`;

  view.querySelectorAll('[data-tl-open]').forEach(box => {
    box.onclick = () => openTimelineModal(box.dataset.tlOpen, box.dataset.tlOpen === 'od' ? odInj : osInj);
  });
  view.querySelectorAll('[data-tl-table]').forEach(box => {
    box.querySelector('.toggle-head').onclick = () => {
      const k = box.dataset.tlTable;
      state.tlTableOpen[k] = !state.tlTableOpen[k];
      box.classList.toggle('open');
    };
  });
}

// Fullscreen timeline modal with zoom + pan. Opens when the user taps the
// inline timeline. Zoom levels 1×–8×; pan once zoomed; reset button.
function openTimelineModal(eyeKey, list) {
  if (!list || !list.length) return;
  const fr = getLang() === 'fr';
  const state2 = { zoom: 1, offset: 0 };
  const el = document.createElement('div');
  el.className = 'fs-overlay';
  const eyeLabel = eyeKey === 'od' ? t('eye.od') : t('eye.os');
  const draw = () => {
    const z = state2.zoom;
    el.querySelector('#tl-svg').innerHTML = combinedTimelineSvg(list, {
      zoom: z, offset: state2.offset, W: 600, H: 360, alwaysLabel: true,
    });
    el.querySelector('#tl-zo').disabled = z <= 1;
    el.querySelector('#tl-zi').disabled = z >= 8;
    el.querySelector('#tl-reset').disabled = z === 1 && state2.offset === 0;
    el.querySelector('#tl-label').textContent = z < 1.5 ? '1×' : `${z.toFixed(1)}×`;
  };
  el.innerHTML = `
    <header>
      <button id="tl-cancel" class="btn-ghost" style="padding:6px 10px;">${escapeHtml(t('btn.close'))}</button>
      <h2>${escapeHtml(fr ? 'Chronologie' : 'Timeline')} · ${escapeHtml(eyeLabel)}</h2>
    </header>
    <main style="padding:14px;">
      <div id="tl-svg" style="background:var(--surface); border:1px solid var(--separator); border-radius:10px; padding:6px; touch-action:none; user-select:none;"></div>
      <p style="font-size:11px; color:var(--text3); text-align:center; margin: 8px 0 0;">${escapeHtml(fr ? 'Pincez pour zoomer · glissez pour déplacer · double tap pour réinitialiser' : 'Pinch to zoom · drag to pan · double-tap to reset')}</p>
      <div style="display:flex; align-items:center; justify-content:center; margin-top:10px; gap:6px;">
        <button id="tl-zo" class="btn-ghost" style="padding:6px 12px; font-size:18px;">−</button>
        <span id="tl-label" style="font-family:var(--serif); font-size:14px; min-width:36px; text-align:center;">1×</span>
        <button id="tl-zi" class="btn-ghost" style="padding:6px 12px; font-size:18px;">+</button>
        <button id="tl-reset" class="btn-ghost" style="padding:6px 10px; font-size:12px;">${escapeHtml(fr ? 'Réinit.' : 'Reset')}</button>
      </div>
      <p style="font-size:11px; color:var(--text3); line-height:1.4; margin: 18px 4px 0;">${escapeHtml(t('pstats.timeline.legend'))}</p>
    </main>`;
  document.body.appendChild(el);
  draw();
  el.querySelector('#tl-cancel').onclick = () => el.remove();
  el.querySelector('#tl-zi').onclick = () => {
    state2.zoom = Math.min(8, state2.zoom * 2);
    const maxOff = Math.max(0, 1 - 1 / state2.zoom);
    state2.offset = Math.min(maxOff, state2.offset + (maxOff - state2.offset) * 0.5);
    draw();
  };
  el.querySelector('#tl-zo').onclick = () => {
    state2.zoom = Math.max(1, state2.zoom / 2);
    const maxOff = Math.max(0, 1 - 1 / state2.zoom);
    state2.offset = Math.min(maxOff, state2.offset);
    draw();
  };
  el.querySelector('#tl-reset').onclick = () => {
    state2.zoom = 1; state2.offset = 0; draw();
  };

  // Native pinch (two-finger) + drag (one-finger) gestures on the SVG.
  // Pinch keeps the data point under the midpoint of the two fingers
  // anchored as the zoom changes — feels like a native iOS map pinch.
  const wrap = el.querySelector('#tl-svg');
  const clampOffset = (off, z) => {
    const max = Math.max(0, 1 - 1 / z);
    return Math.max(0, Math.min(max, off));
  };
  let pinch = null;     // active two-finger gesture
  let pan = null;       // active one-finger drag
  let lastTap = 0;      // for double-tap to reset
  wrap.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const r = wrap.getBoundingClientRect();
      const midX = (t1.clientX + t2.clientX) / 2 - r.left;
      const boxW = Math.max(1, r.width);
      // The data fraction currently rendered at this on-screen midpoint —
      // we'll keep it pinned to the same midpoint as zoom changes.
      const dataFrac = state2.offset + (midX / boxW) * (1 / state2.zoom);
      pinch = { startZoom: state2.zoom, startDist: dist, dataFrac, midX, boxW };
      pan = null;
      e.preventDefault();
    } else if (e.touches.length === 1) {
      // Double-tap (within 300 ms) to reset.
      const now = Date.now();
      if (now - lastTap < 300) {
        state2.zoom = 1; state2.offset = 0; draw();
        lastTap = 0;
      } else {
        lastTap = now;
      }
      if (state2.zoom > 1) {
        const r = wrap.getBoundingClientRect();
        pan = { startX: e.touches[0].clientX, startOffset: state2.offset, boxW: Math.max(1, r.width) };
        pinch = null;
        e.preventDefault();
      }
    }
  }, { passive: false });
  wrap.addEventListener('touchmove', (e) => {
    if (pinch && e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const newZoom = Math.max(1, Math.min(8, pinch.startZoom * (dist / Math.max(1, pinch.startDist))));
      state2.zoom = newZoom;
      state2.offset = clampOffset(pinch.dataFrac - (pinch.midX / pinch.boxW) * (1 / newZoom), newZoom);
      draw();
      e.preventDefault();
    } else if (pan && e.touches.length === 1) {
      const dx = e.touches[0].clientX - pan.startX;
      const newOffset = pan.startOffset - (dx / pan.boxW) * (1 / state2.zoom);
      state2.offset = clampOffset(newOffset, state2.zoom);
      draw();
      e.preventDefault();
    }
  }, { passive: false });
  const endTouch = () => { pinch = null; pan = null; };
  wrap.addEventListener('touchend', endTouch);
  wrap.addEventListener('touchcancel', endTouch);
}

// Combined per-eye timeline. Single SVG: CRT line (left axis, blue),
// Snellen VA line dashed (right axis — labelled as 20/X), drug-coloured
// dots per injection, vertical lines at drug switches, ⚠ at complications.
// `opts.zoom` (1..8) and `opts.offset` (0..1-1/zoom) restrict the time
// window. `opts.alwaysLabel` forces per-dot value labels even when there
// are many visits — used by the expanded zoom modal.
function combinedTimelineSvg(list, opts = {}) {
  const zoom = Math.max(1, opts.zoom || 1);
  const offset = Math.max(0, Math.min(1 - 1 / zoom, opts.offset || 0));
  const W = opts.W || 340;
  const H = opts.H || 220;
  const padL = 40, padR = 56, padT = 16, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const tFirst = new Date(list[0].date).getTime();
  const tLast = new Date(list[list.length - 1].date).getTime() || (tFirst + 1);
  const range = Math.max(1, tLast - tFirst);
  const windowSpan = range / zoom;
  const t0 = tFirst + offset * range;
  const t1 = t0 + windowSpan;
  const xFor = (iso) => {
    const t = new Date(iso).getTime();
    return padL + ((t - t0) / Math.max(1, t1 - t0)) * innerW;
  };
  const visible = list.filter(i => {
    const ti = new Date(i.date).getTime();
    return ti >= t0 - 1 && ti <= t1 + 1;
  });
  const crtVals = visible.map(i => typeof i.crtUm === 'number' ? i.crtUm : null);
  const haveCrt = crtVals.filter(v => v != null);
  const crtMin = haveCrt.length ? Math.min(...haveCrt) : 0;
  const crtMax = haveCrt.length ? Math.max(...haveCrt) : 1;
  const crtY = (v) => {
    if (v == null) return null;
    const span = Math.max(20, crtMax - crtMin);
    return padT + innerH - ((v - crtMin) / span) * innerH;
  };
  const vaVals = visible.map(i => snellenToLogMAR(i.vaSnellen));
  const haveVa = vaVals.filter(v => v != null);
  // Snap the VA range to the standard Snellen ladder so axis ticks align
  // with the curve and dots. Bottom of the chart = best VA (lowest
  // logMAR), top = worst VA — but visually we want best VA at the top,
  // worst at the bottom, so invert: y maps higher logMAR → lower y.
  const dataMin = haveVa.length ? Math.min(...haveVa) : 0;
  const dataMax = haveVa.length ? Math.max(...haveVa) : 1;
  let loIdx = SNELLEN_LADDER.findIndex(s => s.lm >= dataMin);
  if (loIdx === -1) loIdx = SNELLEN_LADDER.length - 1;
  if (loIdx > 0 && SNELLEN_LADDER[loIdx].lm > dataMin + 0.001) loIdx--;
  let hiIdx = SNELLEN_LADDER.findIndex(s => s.lm > dataMax);
  if (hiIdx === -1) hiIdx = SNELLEN_LADDER.length - 1;
  else if (hiIdx > 0) hiIdx--;
  if (hiIdx < loIdx) hiIdx = loIdx;
  const vaMin = SNELLEN_LADDER[loIdx].lm;
  const vaMax = Math.max(vaMin + 0.05, SNELLEN_LADDER[hiIdx].lm);
  const vaY = (v) => {
    if (v == null) return null;
    const span = Math.max(0.05, vaMax - vaMin);
    return padT + ((v - vaMin) / span) * innerH;
  };
  const crtPath = (() => {
    const pts = [];
    visible.forEach((i, idx) => {
      const y = crtY(crtVals[idx]);
      if (y != null) pts.push(`${pts.length ? 'L' : 'M'}${xFor(i.date).toFixed(1)},${y.toFixed(1)}`);
    });
    return pts.join(' ');
  })();
  const vaPath = (() => {
    const pts = [];
    visible.forEach((i, idx) => {
      const y = vaY(vaVals[idx]);
      if (y != null) pts.push(`${pts.length ? 'L' : 'M'}${xFor(i.date).toFixed(1)},${y.toFixed(1)}`);
    });
    return pts.join(' ');
  })();
  const switches = [];
  for (let i = 1; i < visible.length; i++) {
    if (visible[i].drug !== visible[i - 1].drug) switches.push(visible[i]);
  }
  // Per-dot value labels: skip when there are too many visits in the
  // window (too condensed). The expanded modal sets alwaysLabel=true.
  const showLabels = opts.alwaysLabel || visible.length <= 5;
  const dotsAndLabels = visible.map((i, idx) => {
    const x = xFor(i.date);
    const xs = x.toFixed(1);
    const cy = crtY(typeof i.crtUm === 'number' ? i.crtUm : null);
    const vy = vaY(snellenToLogMAR(i.vaSnellen));
    const y = (cy ?? vy ?? (padT + innerH / 2));
    const ys = y.toFixed(1);
    let labels = '';
    if (showLabels) {
      if (typeof i.crtUm === 'number' && cy != null) {
        labels += `<text x="${xs}" y="${(cy - 5).toFixed(1)}" font-size="9" fill="var(--signal)" text-anchor="middle" font-weight="600">${i.crtUm}</text>`;
      }
      if (i.vaSnellen && vy != null) {
        labels += `<text x="${xs}" y="${(vy + 11).toFixed(1)}" font-size="9" fill="var(--text2)" text-anchor="middle">${escapeHtml(i.vaSnellen)}</text>`;
      }
    }
    return `${labels}<circle cx="${xs}" cy="${ys}" r="3.5" fill="${drug(i.drug).color}" stroke="white" stroke-width="0.8"/>`;
  }).join('');
  const switchLines = switches.map(s => {
    const x = xFor(s.date).toFixed(1);
    return `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT + innerH}" stroke="var(--text3)" stroke-width="0.6" stroke-dasharray="2,2"/>`;
  }).join('');
  const compMarks = visible.filter(i => Array.isArray(i.complications) && i.complications.length).map(i => {
    const x = xFor(i.date).toFixed(1);
    return `<text x="${x}" y="${padT + 8}" text-anchor="middle" font-size="10" fill="#991B1B">⚠</text>`;
  }).join('');
  const firstLabel = visible.length ? fmtDate(visible[0].date) : '';
  const lastLabel = visible.length ? fmtDate(visible[visible.length - 1].date) : '';
  // Left (CRT) axis: simple min/mid/max numeric ticks.
  const crtAxisTicks = (mn, mx) => {
    const mid = (mn + mx) / 2;
    return [
      `<text x="2" y="${padT + 8}" font-size="9" fill="var(--signal)">${Math.round(mx)}</text>`,
      `<text x="2" y="${padT + innerH / 2 + 3}" font-size="9" fill="var(--signal)">${Math.round(mid)}</text>`,
      `<text x="2" y="${padT + innerH}" font-size="9" fill="var(--signal)">${Math.round(mn)}</text>`,
    ].join('');
  };
  // Right (Snellen) axis: ticks at every standard ladder rung inside the
  // data range, padded one step on each side so range labels match
  // clinical convention. Cap density so labels don't overlap.
  const snellenAxisTicks = (vmn, vmx) => {
    let lo = SNELLEN_LADDER.findIndex(s => s.lm >= vmn);
    if (lo === -1) lo = SNELLEN_LADDER.length - 1;
    if (lo > 0 && SNELLEN_LADDER[lo].lm > vmn + 0.001) lo--;
    let hi = SNELLEN_LADDER.findIndex(s => s.lm > vmx);
    if (hi === -1) hi = SNELLEN_LADDER.length - 1;
    else if (hi > 0) hi--;
    if (hi < lo) hi = lo;
    const inRange = SNELLEN_LADDER.slice(lo, hi + 1);
    const maxTicks = Math.max(2, Math.floor(innerH / 22));
    let picks = inRange;
    if (inRange.length > maxTicks) {
      picks = [];
      const stride = (inRange.length - 1) / (maxTicks - 1);
      for (let i = 0; i < maxTicks; i++) picks.push(inRange[Math.round(i * stride)]);
    }
    return picks.map(s => {
      const y = vaY(s.lm);
      if (y == null) return '';
      return `<text x="${W - 2}" y="${(y + 3).toFixed(1)}" font-size="9" fill="var(--text2)" text-anchor="end">${s.label}</text>`;
    }).join('');
  };
  return `
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;">
      <rect x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="rgba(0,0,0,0.02)" stroke="var(--separator)"/>
      ${switchLines}
      ${crtPath ? `<path d="${crtPath}" fill="none" stroke="var(--signal)" stroke-width="1.5"/>` : ''}
      ${vaPath ? `<path d="${vaPath}" fill="none" stroke="var(--text2)" stroke-width="1.2" stroke-dasharray="3,3"/>` : ''}
      ${dotsAndLabels}
      ${compMarks}
      <text x="${padL}" y="${H - 14}" font-size="9" fill="var(--text3)">${escapeHtml(firstLabel)}</text>
      <text x="${W - padR}" y="${H - 14}" font-size="9" fill="var(--text3)" text-anchor="end">${escapeHtml(lastLabel)}</text>
      <text x="${padL}" y="${H - 4}" font-size="8" fill="var(--signal)">CRT (µm)</text>
      <text x="${W - padR + 4}" y="${H - 4}" font-size="8" fill="var(--text2)">Snellen</text>
      ${haveCrt.length ? crtAxisTicks(crtMin, crtMax) : ''}
      ${haveVa.length ? snellenAxisTicks(vaMin, vaMax) : ''}
    </svg>`;
}

/* =====================================================================
   Calendar — with long-press quick-add
   =================================================================== */
async function renderCalendar() {
  titleEl.textContent = t('cal.title');
  primaryBtn.style.display = 'none';

  // Calendar shows the grid only; today's clinic lives in the List tab.
  if (state.calendarView !== 'week' && state.calendarView !== 'month') {
    state.calendarView = 'week';
  }
  const now = new Date();
  if (!state.calendarMonth) {
    state.calendarMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }
  if (!state.calendarWeekStart) state.calendarWeekStart = startOfWeekISO(todayISO());
  const [y, m] = state.calendarMonth.split('-').map(Number);
  const monthStart = new Date(y, m - 1, 1);
  const monthEnd = new Date(y, m, 0);
  const gridStart = new Date(monthStart); gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const gridEnd = new Date(monthEnd);     gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));
  const days = [];
  for (let d = new Date(gridStart); d <= gridEnd; d.setDate(d.getDate() + 1)) days.push(todayISO(d.getTime()));

  const patients = await db.listPatients();
  const today = todayISO();
  // byDate: ISO → array of per-eye entries (still used for dot density).
  // byDayPatient: ISO → Map<patientId, { p, od?:{drugKey, injNumber}, os?:{drugKey, injNumber} }>
  // The per-patient map collapses bilateral entries into a single row.
  const byDate = new Map();
  const byDayPatient = new Map();
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const eyeKey of ['od', 'os']) {
      const eye = { ...p.eyes[eyeKey], _eyeKey: eyeKey };
      const s = eyeStatus(eye, injs, today);
      if (!eye.active || !s.nextDate) continue;
      const target = s.status === 'late' ? today : s.nextDate;
      const eyeInjCount = injs.filter(i => i.eye === eyeKey).length;
      const injNumber = eyeInjCount + 1;
      const entry = { p, eye: eyeKey, drugKey: eye.drug, status: s.status, injNumber };
      if (!byDate.has(target)) byDate.set(target, []);
      byDate.get(target).push(entry);
      if (!byDayPatient.has(target)) byDayPatient.set(target, new Map());
      const m = byDayPatient.get(target);
      if (!m.has(p.id)) m.set(p.id, { p });
      m.get(p.id)[eyeKey] = { drugKey: eye.drug, injNumber, status: s.status };
    }
  }
  const dow = getLang() === 'fr' ? ['D','L','M','M','J','V','S'] : ['S','M','T','W','T','F','S'];
  const isToday = (iso) => iso === today;
  const isWeek = state.calendarView === 'week';
  const isMonth = state.calendarView === 'month';
  const fr = getLang() === 'fr';
  const weekDays = (() => {
    const arr = [];
    for (let i = 0; i < 7; i++) arr.push(addDays(state.calendarWeekStart, i));
    return arr;
  })();
  const cells = isWeek ? weekDays : days;

  // Shared grid (week or month).
  const gridView = `
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin: 4px 0 10px;">
      <button id="cal-prev" class="btn-ghost" style="padding:6px 12px;">‹</button>
      <h2 style="font-family:var(--serif); font-weight:500; font-size:18px; margin:0; text-transform:capitalize;">${escapeHtml(isWeek ? `${fmtDate(state.calendarWeekStart)} → ${fmtDate(addDays(state.calendarWeekStart, 6))}` : fmtMonth(state.calendarMonth))}</h2>
      <button id="cal-next" class="btn-ghost" style="padding:6px 12px;">›</button>
    </div>
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 10px;">${escapeHtml(t('cal.tap.day'))}</p>
    <div class="cal-grid">
      ${dow.map(d => `<div class="cal-head">${d}</div>`).join('')}
      ${cells.map(iso => {
        const isOut = isWeek ? false : !iso.startsWith(state.calendarMonth);
        const dayList = byDate.get(iso) || [];
        const dots = dayList.slice(0, 4).map(e => `<div class="dot" style="background:${drug(e.drugKey).color};"></div>`).join('');
        const more = dayList.length > 4 ? `<div class="more">+${dayList.length - 4}</div>` : '';
        const dayNum = Number(iso.split('-')[2]);
        return `
          <div class="cal-cell ${isOut ? 'out' : ''} ${isToday(iso) ? 'today' : ''}" data-iso="${iso}" style="${isWeek ? 'min-height:96px;' : ''}">
            <div class="d">${dayNum}</div>
            <div class="dot-row">${dots}</div>
            ${more}
          </div>`;
      }).join('')}
    </div>
    <div id="cal-day" style="margin-top:16px;"></div>`;

  view.innerHTML = `
    <div class="seg" style="margin: 4px 0 12px;">
      <button id="cal-view-week"  class="${isWeek ? 'on' : ''}">${escapeHtml(fr ? 'Semaine' : 'Week')}</button>
      <button id="cal-view-month" class="${isMonth ? 'on' : ''}">${escapeHtml(fr ? 'Mois' : 'Month')}</button>
    </div>
    ${gridView}`;

  document.getElementById('cal-view-week').onclick = () => { state.calendarView = 'week'; renderCalendar(); };
  document.getElementById('cal-view-month').onclick = () => { state.calendarView = 'month'; renderCalendar(); };
  document.getElementById('cal-prev').onclick = () => {
    if (isWeek) state.calendarWeekStart = addDays(state.calendarWeekStart, -7);
    else {
      const d = new Date(y, m - 2, 1);
      state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }
    renderCalendar();
  };
  document.getElementById('cal-next').onclick = () => {
    if (isWeek) state.calendarWeekStart = addDays(state.calendarWeekStart, 7);
    else {
      const d = new Date(y, m, 1);
      state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }
    renderCalendar();
  };
  // Tap = show day's list. Long-press (500 ms) = quick-add.
  view.querySelectorAll('.cal-cell').forEach(cell => {
    let pressTimer = null, longFired = false;
    const start = () => {
      longFired = false;
      cell.classList.add('long-pressing');
      pressTimer = setTimeout(() => {
        longFired = true;
        cell.classList.remove('long-pressing');
        quickAddOnDate(cell.dataset.iso);
      }, 500);
    };
    const cancel = () => {
      cell.classList.remove('long-pressing');
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    };
    cell.addEventListener('touchstart', start, { passive: true });
    cell.addEventListener('touchmove', cancel);
    cell.addEventListener('touchend', cancel);
    cell.addEventListener('touchcancel', cancel);
    cell.addEventListener('mousedown', start);
    cell.addEventListener('mouseup', cancel);
    cell.addEventListener('mouseleave', cancel);
    cell.onclick = () => { if (!longFired) showCalDay(cell.dataset.iso, byDate, byDayPatient); };
  });
  if (todayISO().startsWith(state.calendarMonth)) showCalDay(todayISO(), byDate, byDayPatient);
}
function showCalDay(iso, byDate, byDayPatient) {
  const wrap = document.getElementById('cal-day');
  if (!wrap) return;
  const dayMap = byDayPatient ? byDayPatient.get(iso) : null;
  const patients = dayMap ? Array.from(dayMap.values()) : [];
  if (!patients.length) {
    wrap.innerHTML = `<div class="card" style="text-align:center; color:var(--text3); font-size:13px;">${escapeHtml(tF('cal.day.empty', { date: fmtDate(iso) }))}</div>`;
    return;
  }
  wrap.innerHTML = `
    <h3 class="section-title">${escapeHtml(tF('cal.day.due', { date: fmtDate(iso) }))}</h3>
    <div class="card list">
      ${patients.map(entry => {
        const pillFor = (eyeKey) => {
          const e = entry[eyeKey];
          if (!e) return '';
          return `<span class="drug-pill" style="background:${drug(e.drugKey).color}; flex:0 0 auto;">${escapeHtml(eyeKey.toUpperCase())} · ${escapeHtml(drugLabel(e.drugKey))} <strong style="opacity:0.9; margin-left:3px;">#${e.injNumber}</strong></span>`;
        };
        return `
          <div class="row" data-pid="${entry.p.id}">
            <div class="meta">
              <h3>${escapeHtml(formatPatientName(entry.p))}${entry.p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(entry.p.patientNumber)}</span>` : ''}</h3>
              <p style="display:flex; gap:4px; flex-wrap:wrap;">${pillFor('od')}${pillFor('os')}</p>
            </div>
            <div class="chev">›</div>
          </div>`;
      }).join('')}
    </div>`;
  wrap.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => go('patient', { patientId: r.dataset.pid });
  });
}
async function quickAddOnDate(iso) {
  // Pop a patient picker that, when chosen, lands on the injection editor
  // pre-filled with the chosen date.
  const patients = await db.listPatients();
  if (!patients.length) { toast('No patients'); return; }
  const el = document.createElement('div');
  el.className = 'fs-overlay';
  el.innerHTML = `
    <header>
      <button id="qa-cancel" class="btn-ghost" style="padding:6px 10px;">${escapeHtml(t('btn.cancel'))}</button>
      <h2>${escapeHtml(tF('cal.quick.add', { date: fmtDate(iso) }))}</h2>
    </header>
    <main>
      <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('cal.pick.patient'))}</p>
      <div class="card list">
        ${patients.map(p => `
          <div class="row" data-pid="${p.id}">
            <div class="avatar">${escapeHtml(p.initials || deriveInitials(p.name) || '·')}</div>
            <div class="meta">
              <h3>${escapeHtml(formatPatientName(p))}${p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(p.patientNumber)}</span>` : ''}</h3>
            </div>
            <div class="chev">›</div>
          </div>`).join('')}
      </div>
    </main>`;
  document.body.appendChild(el);
  document.getElementById('qa-cancel').onclick = () => el.remove();
  el.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => {
      el.remove();
      // Carry the picked date into the editor via state.
      state.injectionDatePrefill = iso;
      go('injection', { patientId: r.dataset.pid, injectionId: null, eye: 'od' });
    };
  });
}

/* =====================================================================
   List — today's clinic + import schedule
   =================================================================== */
async function renderList() {
  titleEl.textContent = t('tab.list');
  primaryBtn.style.display = 'none';

  const patients = await db.listPatients();
  const today = todayISO();
  // byPatient: Map<patientId, { p, od?, os? }> for eyes due today.
  const byPatient = new Map();
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const ek of ['od', 'os']) {
      const eye = { ...p.eyes[ek], _eyeKey: ek };
      if (!eye.active) continue;
      const s = eyeStatus(eye, injs, today);
      if (!s.nextDate) continue;
      // Include eyes whose nextDate is today, OR which are already late.
      if (s.nextDate !== today && s.status !== 'late') continue;
      const eyeInjCount = injs.filter(i => i.eye === ek).length;
      if (!byPatient.has(p.id)) byPatient.set(p.id, { p });
      byPatient.get(p.id)[ek] = { drugKey: eye.drug, injNumber: eyeInjCount + 1, status: s.status };
    }
  }
  const todaysPatients = Array.from(byPatient.values());
  const fr = getLang() === 'fr';
  const doneKey = 'injectlog_clinic_done_' + today;
  const done = new Set(JSON.parse(localStorage.getItem(doneKey) || '[]'));
  const doneCount = todaysPatients.filter(e => done.has(e.p.id)).length;

  view.innerHTML = `
    <h2 style="font-family:var(--serif); font-weight:500; font-size:20px; margin: 4px 0 4px;">${escapeHtml(fr ? "Liste du jour" : "Today's list")} <span style="font-family:var(--sans); font-size:12px; color:var(--text3); font-weight:400;">${escapeHtml(fmtDate(today))}</span></h2>
    <p style="font-size:12px; color:var(--text3); margin: 0 0 12px;">${todaysPatients.length ? `${doneCount}/${todaysPatients.length} ${escapeHtml(fr ? 'cochés' : 'done')}` : escapeHtml(fr ? "Aucun œil prévu aujourd'hui." : 'Nothing due today.')}</p>

    <div class="btn-row" style="display:flex; gap:8px; margin-bottom:12px;">
      <button id="list-import" class="btn-secondary" style="flex:1;">${escapeHtml(t('patients.import'))}</button>
      <button id="list-add" class="btn-ghost" style="flex:0 0 auto;">${escapeHtml(t('patients.add'))}</button>
      <input id="list-import-photo" type="file" accept="image/*" style="display:none;">
    </div>

    ${todaysPatients.length ? `<div class="card list">
      ${todaysPatients.map(entry => {
        const k = entry.p.id;
        const isDone = done.has(k);
        const pillFor = (eyeKey) => {
          const e = entry[eyeKey];
          if (!e) return '';
          return `<span class="drug-pill" style="background:${drug(e.drugKey).color}; flex:0 0 auto;">${escapeHtml(eyeKey.toUpperCase())} · ${escapeHtml(drugLabel(e.drugKey))} <strong style="opacity:0.9; margin-left:3px;">#${e.injNumber}</strong></span>`;
        };
        return `
          <div class="row" data-pid="${entry.p.id}" data-clinic="${k}">
            <button type="button" class="chip ${isDone ? 'selected' : ''}" data-toggle-clinic="${k}" style="padding:6px 10px; min-width:36px; justify-content:center;">${isDone ? '✓' : ''}</button>
            <div class="meta">
              <h3 style="${isDone ? 'text-decoration:line-through; color:var(--text3);' : ''}">${escapeHtml(formatPatientName(entry.p))}${entry.p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(entry.p.patientNumber)}</span>` : ''}</h3>
              <p style="display:flex; gap:4px; flex-wrap:wrap;">${pillFor('od')}${pillFor('os')}</p>
            </div>
            <div class="chev">›</div>
          </div>`;
      }).join('')}
    </div>` : `
      <div class="empty" style="padding:30px 16px;">
        <p style="font-size:13px; color:var(--text3); max-width:34ch; margin: 0 auto;">${escapeHtml(fr ? "Importez la liste du jour à partir d'une photo, ou ajoutez les patients manuellement." : "Import today's list from a photo, or add patients manually.")}</p>
      </div>`}`;

  document.getElementById('list-import').onclick = () => document.getElementById('list-import-photo').click();
  document.getElementById('list-import-photo').onchange = (e) => handleImportSchedule(e.target.files?.[0]);
  document.getElementById('list-add').onclick = () => promptNewPatient();
  view.querySelectorAll('[data-toggle-clinic]').forEach(btn => btn.onclick = (e) => {
    e.stopPropagation();
    const k = btn.dataset.toggleClinic;
    const set = new Set(JSON.parse(localStorage.getItem(doneKey) || '[]'));
    if (set.has(k)) set.delete(k); else set.add(k);
    localStorage.setItem(doneKey, JSON.stringify([...set]));
    renderList();
  });
  view.querySelectorAll('.row[data-clinic]').forEach(r => r.onclick = (e) => {
    if (e.target.closest('[data-toggle-clinic]')) return;
    go('patient', { patientId: r.dataset.pid });
  });
}

   Stats hub
   =================================================================== */
async function renderStats() {
  titleEl.textContent = t('stats.title');
  primaryBtn.style.display = 'none';

  const patients = await db.listPatients();
  const allInj = await db.listAllInjections();
  const drugCount = {};
  for (const i of allInj) drugCount[i.drug] = (drugCount[i.drug] || 0) + 1;
  const indCount = {};
  let activeEyes = 0;
  for (const p of patients) {
    ensurePatientShape(p);
    for (const ek of ['od', 'os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      activeEyes++;
      indCount[e.diagnosis || 'unknown'] = (indCount[e.diagnosis || 'unknown'] || 0) + 1;
    }
  }
  const oneYearAgo = (() => { const d = new Date(); d.setFullYear(d.getFullYear() - 1); return todayISO(d.getTime()); })();
  const recent = allInj.filter(i => i.date >= oneYearAgo);
  const perPatient = patients.length ? recent.length / patients.length : 0;
  let taeIntervals = [];
  for (const p of patients) {
    for (const ek of ['od', 'os']) {
      const e = p.eyes[ek];
      if (!e.active || e.regimen !== 'tae') continue;
      const inj = allInj.filter(i => i.patientId === p.id && i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (!inj.length) continue;
      const lastIv = inj[inj.length - 1].intervalWeeksApplied;
      if (isFinite(lastIv)) taeIntervals.push(lastIv);
    }
  }
  const meanTae = taeIntervals.length ? (taeIntervals.reduce((a,b)=>a+b,0) / taeIntervals.length) : null;
  const compCount = allInj.reduce((s, i) => s + (Array.isArray(i.complications) ? i.complications.length : 0), 0);
  const compRate = allInj.length ? (compCount * 1000 / allInj.length) : 0;
  // Time-to-q12 for TAE eyes: weeks between first injection and first
  // injection where intervalWeeksApplied ≥ 12. We compute a global median
  // here for the tile; the dedicated view (below) splits by drug.
  const q12Weeks = [];
  const q12ByDrug = {};
  for (const p of patients) {
    for (const ek of ['od','os']) {
      const e = p.eyes[ek];
      if (!e || e.regimen !== 'tae') continue;
      const inj = allInj.filter(i => i.patientId === p.id && i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (inj.length < 2) continue;
      const first = inj[0];
      const reached = inj.find(i => (i.intervalWeeksApplied || 0) >= 12);
      if (!reached) continue;
      const wks = daysBetween(first.date, reached.date) / 7;
      q12Weeks.push(wks);
      const dk = first.drug || 'other';
      (q12ByDrug[dk] = q12ByDrug[dk] || []).push(wks);
    }
  }
  const median = (arr) => {
    if (!arr.length) return null;
    const s = arr.slice().sort((a,b) => a - b);
    const m = Math.floor(s.length / 2);
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  };
  const medianQ12 = median(q12Weeks);
  const drugTotal = Object.values(drugCount).reduce((a,b) => a + b, 0) || 1;
  const indTotal  = Object.values(indCount).reduce((a,b) => a + b, 0) || 1;

  view.innerHTML = `
    <div class="eye-grid" style="margin-bottom:12px;">
      ${statTile(t('stats.total.injections'), allInj.length)}
      ${statTile(t('stats.total.patients'), patients.length)}
      ${statTile(t('stats.eyes.active'), activeEyes)}
      ${statTile(t('stats.injections.per.year'), perPatient.toFixed(1))}
      ${statTile(t('stats.mean.interval'), meanTae == null ? '—' : meanTae.toFixed(1) + ' w')}
      ${statTile(t('stats.complications.rate'), compRate.toFixed(1))}
      ${statTile(t('stats.timeq12'), medianQ12 == null ? '—' : medianQ12.toFixed(0) + ' w')}
    </div>

    <h3 class="section-title">${escapeHtml(t('stats.drug.share'))}</h3>
    <div class="card">
      ${DRUGS.filter(d => drugCount[d.key]).map(d => {
        const n = drugCount[d.key] || 0;
        const pct = (n / drugTotal) * 100;
        return `
          <div style="margin-bottom:8px;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
              <span><span class="drug-pill" style="background:${d.color};">${escapeHtml(getLang() === 'fr' ? d.fr : d.en)}</span></span>
              <span style="font-variant-numeric:tabular-nums; font-size:13px;">${n} · ${pct.toFixed(0)}%</span>
            </div>
            <div style="height:6px; background:var(--mist); border-radius:3px; overflow:hidden;">
              <div style="height:100%; width:${pct}%; background:${d.color};"></div>
            </div>
          </div>`;
      }).join('') || `<p style="color:var(--text3); font-size:13px; margin:0;">—</p>`}
    </div>

    <h3 class="section-title">${escapeHtml(t('stats.indication.share'))}</h3>
    <div class="card">
      ${INDICATIONS.filter(i => indCount[i.key]).map(i => {
        const n = indCount[i.key] || 0;
        const pct = (n / indTotal) * 100;
        return `
          <div style="display:flex; justify-content:space-between; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--separator);">
            <span>${escapeHtml(getLang() === 'fr' ? i.fr : i.en)}</span>
            <span style="font-variant-numeric:tabular-nums; font-size:13px;">${n} · ${pct.toFixed(0)}%</span>
          </div>`;
      }).join('') || `<p style="color:var(--text3); font-size:13px; margin:0;">—</p>`}
    </div>

    ${Object.keys(q12ByDrug).length ? `
      <h3 class="section-title">${escapeHtml(t('stats.timeq12'))}</h3>
      <div class="card">
        <p style="font-size:12px; color:var(--text3); margin: 0 0 10px;">${escapeHtml(t('stats.timeq12.body'))}</p>
        ${DRUGS.filter(d => q12ByDrug[d.key]?.length).map(d => {
          const arr = q12ByDrug[d.key];
          const med = median(arr);
          return `
            <div style="display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--separator);">
              <span class="drug-pill" style="background:${d.color}; flex:0 0 auto;">${escapeHtml(getLang() === 'fr' ? d.fr : d.en)}</span>
              <div style="flex:1; font-size:13px;">n=${arr.length}</div>
              <div style="font-variant-numeric:tabular-nums; font-size:13px;">${med == null ? '—' : med.toFixed(0) + ' w'}</div>
            </div>`;
        }).join('')}
      </div>` : ''}

    <h3 class="section-title">${escapeHtml(t('stats.title'))}</h3>
    <div class="card list">
      <div class="row" data-go="letter-gain"><div class="avatar">📈</div><div class="meta"><h3>${escapeHtml(t('stats.letter.gain'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="switching"><div class="avatar">🔁</div><div class="meta"><h3>${escapeHtml(t('stats.switching'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="capacity"><div class="avatar">📅</div><div class="meta"><h3>${escapeHtml(t('stats.capacity'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="complications"><div class="avatar">⚠</div><div class="meta"><h3>${escapeHtml(t('stats.complications.detail'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="recall"><div class="avatar">🔔</div><div class="meta"><h3>${escapeHtml(t('stats.recall'))}</h3></div><div class="chev">›</div></div>
    </div>`;

  view.querySelectorAll('.row[data-go]').forEach(r => r.onclick = () => go(r.dataset.go));
}

/* ─── Letter-gain outcomes ─────────────────────────────────────────── */
async function renderLetterGain() {
  titleEl.textContent = t('stats.letter.gain');
  primaryBtn.style.display = 'none';
  const patients = await db.listPatients();
  const allInj = await db.listAllInjections();
  const cutoffDays = 270; // ~9 mo
  // For each active eye, get baseline (first VA-recorded injection) and
  // latest VA-recorded injection that is at least cutoff days after baseline.
  // Bucket twice: once by indication, once by the eye's first-injection drug
  // (so the by-drug panel asks "which drug got eyes started").
  const byInd = new Map();
  const byDrug = new Map();
  for (const p of patients) {
    ensurePatientShape(p);
    for (const ek of ['od','os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      const list = allInj.filter(i => i.patientId === p.id && i.eye === ek && i.vaSnellen).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (list.length < 2) continue;
      const baseline = list[0];
      const candidates = list.filter(i => daysBetween(baseline.date, i.date) >= cutoffDays);
      if (!candidates.length) continue;
      const final = candidates[candidates.length - 1];
      const baseV = snellenToLogMAR(baseline.vaSnellen);
      const finV = snellenToLogMAR(final.vaSnellen);
      if (baseV == null || finV == null) continue;
      const deltaLines = logMarToLines(baseV - finV);
      const indKey = e.diagnosis || 'unknown';
      if (!byInd.has(indKey)) byInd.set(indKey, []);
      byInd.get(indKey).push(deltaLines);
      const drugKey = baseline.drug || 'other';
      if (!byDrug.has(drugKey)) byDrug.set(drugKey, []);
      byDrug.get(drugKey).push(deltaLines);
    }
  }
  const renderRow = (label, arr, pill) => {
    const total = arr.length;
    const gain5  = arr.filter(d => d >= 1).length;
    const gain10 = arr.filter(d => d >= 2).length;
    const gain15 = arr.filter(d => d >= 3).length;
    return `
      <div style="padding:8px 0; border-bottom:1px solid var(--separator);">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
          ${pill || ''}<div style="font-size:14px; font-weight:600;">${escapeHtml(label)} <span style="color:var(--text3); font-weight:400;">· n=${total}</span></div>
        </div>
        <div style="font-size:12px; color:var(--text2);">
          ≥ 5 letters: <strong>${((gain5/total)*100).toFixed(0)}%</strong> ·
          ≥ 10: <strong>${((gain10/total)*100).toFixed(0)}%</strong> ·
          ≥ 15: <strong>${((gain15/total)*100).toFixed(0)}%</strong>
        </div>
      </div>`;
  };
  const empty = `<p style="color:var(--text3); font-size:13px; margin:0;">Not enough data yet — needs at least one eye with ≥ 9 mo of follow-up and Snellen VA at baseline + a later visit.</p>`;
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(tF('stats.letter.gain.body', { n: 1 }))}</p>
    <h3 class="section-title">${escapeHtml(t('stats.letter.gain.by.ind'))}</h3>
    <div class="card">
      ${Array.from(byInd.entries()).map(([k, arr]) => renderRow(indicationLabel(k), arr, '')).join('') || empty}
    </div>
    <h3 class="section-title">${escapeHtml(t('stats.letter.gain.by.drug'))}</h3>
    <div class="card">
      ${Array.from(byDrug.entries()).map(([k, arr]) => {
        const pill = `<span class="drug-pill" style="background:${drug(k).color}; flex:0 0 auto;">${escapeHtml(drugLabel(k))}</span>`;
        return renderRow(drugLabel(k), arr, pill);
      }).join('') || empty}
    </div>`;
}

/* ─── Drug-switch analysis ─────────────────────────────────────────── */
async function renderSwitchingAnalysis() {
  titleEl.textContent = t('stats.switching');
  primaryBtn.style.display = 'none';
  const patients = await db.listPatients();
  const allInj = await db.listAllInjections();
  // Build per-eye chronological injection lists, walk each switch, and
  // compute the mean CRT of the 3 mo BEFORE the switch (exclusive of the
  // switch injection itself) and the mean CRT of the 3 mo AFTER, requiring
  // at least one CRT-bearing visit on each side so the comparison is real.
  const WINDOW_DAYS = 90;
  const events = []; // { from, to, deltaCrt, prePts, postPts, date, p, eye }
  for (const p of patients) {
    for (const ek of ['od','os']) {
      const list = allInj.filter(i => i.patientId === p.id && i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      for (let i = 1; i < list.length; i++) {
        if (list[i].drug === list[i - 1].drug) continue;
        const switchDate = list[i].date;
        const pre = list.slice(0, i).filter(x => typeof x.crtUm === 'number' && daysBetween(x.date, switchDate) <= WINDOW_DAYS);
        const post = list.slice(i).filter(x => typeof x.crtUm === 'number' && daysBetween(switchDate, x.date) <= WINDOW_DAYS && daysBetween(switchDate, x.date) >= 0);
        if (!pre.length || !post.length) continue;
        const preCrt = pre.reduce((s,x) => s + x.crtUm, 0) / pre.length;
        const postCrt = post.reduce((s,x) => s + x.crtUm, 0) / post.length;
        events.push({
          from: list[i - 1].drug, to: list[i].drug,
          deltaCrt: postCrt - preCrt, prePts: pre.length, postPts: post.length,
          preCrt, postCrt, date: switchDate, p, eye: ek,
        });
      }
    }
  }
  // Group by from→to pair.
  const groups = new Map();
  for (const ev of events) {
    const k = ev.from + '→' + ev.to;
    if (!groups.has(k)) groups.set(k, { from: ev.from, to: ev.to, deltas: [], events: [] });
    groups.get(k).deltas.push(ev.deltaCrt);
    groups.get(k).events.push(ev);
  }
  const groupArr = Array.from(groups.values()).sort((a, b) => b.events.length - a.events.length);
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('stats.switching.body'))}</p>
    ${groupArr.length ? groupArr.map(g => {
      const mean = g.deltas.reduce((a,b) => a + b, 0) / g.deltas.length;
      const better = g.deltas.filter(d => d < -10).length; // ≥ 10 µm dryer
      const worse = g.deltas.filter(d => d > 10).length;
      const flat = g.deltas.length - better - worse;
      return `
        <div class="card" style="margin-bottom:10px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
            <span class="drug-pill" style="background:${drug(g.from).color}; flex:0 0 auto;">${escapeHtml(drugLabel(g.from))}</span>
            <span style="color:var(--text3);">→</span>
            <span class="drug-pill" style="background:${drug(g.to).color}; flex:0 0 auto;">${escapeHtml(drugLabel(g.to))}</span>
            <span style="color:var(--text3); font-size:13px; margin-left:auto;">n=${g.events.length}</span>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; font-size:12px;">
            <div><div style="color:var(--text3); text-transform:uppercase; font-size:10px;">Mean ΔCRT</div><div style="font-family:var(--serif); font-size:20px; color:${mean < 0 ? 'var(--green)' : (mean > 0 ? 'var(--ember)' : 'var(--text)')}">${mean > 0 ? '+' : ''}${mean.toFixed(0)} µm</div></div>
            <div><div style="color:var(--text3); text-transform:uppercase; font-size:10px;">Dryer ≥10 µm</div><div style="font-family:var(--serif); font-size:20px;">${better}</div></div>
            <div><div style="color:var(--text3); text-transform:uppercase; font-size:10px;">Wetter ≥10 µm</div><div style="font-family:var(--serif); font-size:20px;">${worse}</div></div>
          </div>
          <div style="margin-top:6px; font-size:11px; color:var(--text3);">Flat: ${flat}. Window: 3 mo on each side of switch.</div>
        </div>`;
    }).join('') : `<div class="empty"><p>${escapeHtml(t('stats.switching.empty'))}</p></div>`}`;
}

/* ─── Capacity planner ─────────────────────────────────────────────── */
async function renderCapacity() {
  titleEl.textContent = t('stats.capacity');
  primaryBtn.style.display = 'none';
  const patients = await db.listPatients();
  const today = todayISO();
  const days = [];
  for (let i = 0; i < 28; i++) days.push(addDays(today, i));
  const counts = new Map(days.map(d => [d, 0]));
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const ek of ['od','os']) {
      const eye = { ...p.eyes[ek], _eyeKey: ek };
      if (!eye.active) continue;
      const s = eyeStatus(eye, injs, today);
      if (!s.nextDate) continue;
      if (s.nextDate >= today && s.nextDate <= days[days.length - 1]) {
        counts.set(s.nextDate, (counts.get(s.nextDate) || 0) + 1);
      } else if (s.status === 'late') {
        counts.set(today, (counts.get(today) || 0) + 1);
      }
    }
  }
  const TARGET = 10; // tweak in Settings later
  const max = Math.max(...Array.from(counts.values()), TARGET);
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('stats.capacity.body'))}</p>
    <div class="card">
      ${days.map(d => {
        const n = counts.get(d) || 0;
        const pct = (n / max) * 100;
        const over = n > TARGET;
        return `
          <div style="display:flex; align-items:center; gap:10px; padding:4px 0;">
            <div style="width:70px; font-size:12px; color:var(--text3);">${escapeHtml(fmtDate(d))}</div>
            <div style="flex:1; height:8px; background:var(--mist); border-radius:4px; overflow:hidden;">
              <div style="height:100%; width:${pct}%; background:${over ? 'var(--ember)' : 'var(--signal)'};"></div>
            </div>
            <div style="width:36px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px;">${n}</div>
          </div>`;
      }).join('')}
    </div>`;
}

/* ─── Complications tracker ────────────────────────────────────────── */
async function renderComplications() {
  titleEl.textContent = t('stats.complications.detail');
  primaryBtn.style.display = 'none';
  const allInj = await db.listAllInjections();
  const patients = await db.listPatients();
  const pById = new Map(patients.map(p => [p.id, p]));
  const events = [];
  for (const i of allInj) {
    for (const c of (i.complications || [])) {
      events.push({ key: c, date: i.date, patientId: i.patientId, eye: i.eye, drug: i.drug });
    }
  }
  events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const totalInj = allInj.length || 1;
  const fr = getLang() === 'fr';
  // Bucket by severity for the top-line summary cards.
  const sevCount = { sight: 0, minor: 0, systemic: 0 };
  const sevEvents = { sight: [], minor: [], systemic: [] };
  const byKey = {};
  for (const ev of events) {
    const sev = complicationSeverity(ev.key);
    sevCount[sev]++;
    sevEvents[sev].push(ev);
    (byKey[ev.key] = byKey[ev.key] || []).push(ev);
  }
  const sevColor = { sight: 'var(--ember)', minor: '#B45309', systemic: '#5B21B6' };
  const sevBg    = { sight: 'rgba(220,38,38,0.10)', minor: 'rgba(245,158,11,0.12)', systemic: 'rgba(91,33,182,0.10)' };
  const sevOrder = ['sight', 'minor', 'systemic'];

  // Per-key summary inside a severity bucket: count, % of severity bucket,
  // rate per 1 000 injections, last event date.
  const renderTypeRow = (k, list, bucketTotal) => {
    const n = list.length;
    const pct = bucketTotal ? ((n / bucketTotal) * 100).toFixed(0) : 0;
    const rate = ((n * 1000) / totalInj).toFixed(1);
    const last = list[0]; // events are reverse-chron
    return `
      <div class="row comp-type-row" data-key="${k}" style="cursor:pointer;">
        <div class="avatar" style="background:${sevBg[complicationSeverity(k)]}; color:${sevColor[complicationSeverity(k)]};">⚠</div>
        <div class="meta">
          <h3>${escapeHtml(complicationLabel(k))} <span style="font-weight:400; color:var(--text3); font-size:13px;">· n=${n} · ${pct}%</span></h3>
          <p>${escapeHtml(t('comp.rate'))} <strong>${rate}</strong> · ${escapeHtml(fr ? 'dernier' : 'last')} ${escapeHtml(fmtDate(last.date))}</p>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="comp-type-detail" data-detail="${k}" style="display:none;">
        ${list.slice(0, 30).map(ev => {
          const p = pById.get(ev.patientId);
          return `
            <div class="row" data-pid="${ev.patientId}" style="padding-left:46px;">
              <div class="meta">
                <h3 style="font-size:13px;">${escapeHtml(formatPatientName(p || {}))}${p?.patientNumber ? ` <span style="font-weight:400; color:var(--text3);">· #${escapeHtml(p.patientNumber)}</span>` : ''}</h3>
                <p>${escapeHtml(fmtDate(ev.date))} · ${escapeHtml(ev.eye.toUpperCase())} · ${escapeHtml(drugLabel(ev.drug))}</p>
              </div>
              <div class="chev">›</div>
            </div>`;
        }).join('')}
        ${list.length > 30 ? `<p style="text-align:center; font-size:11px; color:var(--text3); padding:8px;">${escapeHtml(fr ? `+${list.length - 30} de plus` : `+${list.length - 30} more`)}</p>` : ''}
      </div>`;
  };

  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('stats.complications.body'))}</p>

    <div class="eye-grid" style="margin-bottom:12px;">
      ${statTile(fr ? 'Total' : 'Total events', events.length)}
      ${statTile(t('comp.rate'), ((events.length * 1000) / totalInj).toFixed(1))}
      ${statTile(t('comp.sev.sight'), sevCount.sight)}
    </div>

    ${sevOrder.map(sev => {
      const bucket = sevEvents[sev];
      if (!bucket.length) return '';
      const keys = Object.entries(byKey)
        .filter(([k]) => complicationSeverity(k) === sev)
        .sort((a, b) => b[1].length - a[1].length);
      return `
        <h3 class="section-title" style="color:${sevColor[sev]};">${escapeHtml(t('comp.sev.' + sev))} <span style="color:var(--text3); font-family:var(--sans); font-weight:400;">· ${bucket.length}</span></h3>
        <div class="card list">
          ${keys.map(([k, list]) => renderTypeRow(k, list, bucket.length)).join('')}
        </div>`;
    }).join('') || `<div class="empty"><p>${escapeHtml(t('comp.no.events'))}</p></div>`}`;

  // Expand/collapse per type.
  view.querySelectorAll('.comp-type-row').forEach(row => {
    row.onclick = (e) => {
      if (e.target.closest('[data-pid]')) return;
      const key = row.dataset.key;
      const det = view.querySelector(`.comp-type-detail[data-detail="${key}"]`);
      const open = det.style.display !== 'none';
      det.style.display = open ? 'none' : 'block';
      row.querySelector('.chev').textContent = open ? '▾' : '▴';
    };
  });
  view.querySelectorAll('[data-pid]').forEach(r => {
    r.onclick = (e) => { e.stopPropagation(); go('patient', { patientId: r.dataset.pid }); };
  });
}

/* ─── Recall list ─────────────────────────────────────────────────── */
async function renderRecall() {
  titleEl.textContent = t('stats.recall');
  primaryBtn.style.display = 'none';
  const wks = getRecallWeeks();
  const cutoffDate = addDays(todayISO(), -wks * 7);
  const patients = await db.listPatients();
  const flagged = [];
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const ek of ['od','os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      const list = injs.filter(i => i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      const last = list[list.length - 1];
      if (!last) continue;
      if (last.date < cutoffDate) flagged.push({ p, eye: ek, lastDate: last.date, drug: e.drug });
    }
  }
  flagged.sort((a, b) => (a.lastDate || '').localeCompare(b.lastDate || ''));
  view.innerHTML = `
    <label class="field">
      <span class="lbl">${escapeHtml(t('stats.recall.weeks'))}</span>
      <input id="recall-wks" type="number" min="4" max="52" value="${wks}">
    </label>
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(tF('stats.recall.body', { n: wks }))}</p>
    ${flagged.length ? `<div class="card list">
      ${flagged.map(f => `
        <div class="row" data-pid="${f.p.id}">
          <span class="drug-pill" style="background:${drug(f.drug).color}; flex:0 0 auto;">${escapeHtml(f.eye.toUpperCase())} ${escapeHtml(drugLabel(f.drug))}</span>
          <div class="meta">
            <h3>${escapeHtml(formatPatientName(f.p))}${f.p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(f.p.patientNumber)}</span>` : ''}</h3>
            <p>${escapeHtml(getLang() === 'fr' ? 'Dernière inj. ' : 'Last inj. ') + escapeHtml(fmtDate(f.lastDate))}</p>
          </div>
          <div class="chev">›</div>
        </div>`).join('')}
    </div>` : `<div class="empty"><p>—</p></div>`}`;
  document.getElementById('recall-wks').addEventListener('change', (e) => {
    setRecallWeeks(e.target.value);
    renderRecall();
  });
  view.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => go('patient', { patientId: r.dataset.pid });
  });
}

function isIosSafari() {
  const ua = navigator.userAgent || '';
  const isIos = /iPhone|iPad|iPod/.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!isIos) return false;
  if (/CriOS|FxiOS|EdgiOS|OPiOS|YaBrowser|GSA|FBAN|FBAV|Instagram|Line|MicroMessenger/i.test(ua)) return false;
  return true;
}

  return navigator.standalone === true ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
