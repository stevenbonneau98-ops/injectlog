/* =====================================================================
   Terms / Demo / Install hint
   =================================================================== */
function showTermsScreen(force) {
  return new Promise((resolve) => {
    const el = document.createElement('div');
    el.className = 'fs-overlay';
    el.innerHTML = `
      <header><h2>${escapeHtml(t('terms.title'))}</h2></header>
      <main>
        <p style="color:var(--text2); font-size:14px;">${escapeHtml(t('terms.intro'))}</p>
        ${[1,2,3,4,5,6,7].map(i => `
          <h3 style="font-size:14px; font-weight:600; margin: 14px 0 4px;">${escapeHtml(t('terms.s' + i + '.h'))}</h3>
          <p style="color:var(--text2); font-size:14px;">${escapeHtml(t('terms.s' + i + '.b'))}</p>
        `).join('')}
        <p style="color:var(--text3); font-size:13px; margin-top:18px; font-style:italic;">${escapeHtml(t('terms.confirm'))}</p>
      </main>
      <footer>
        <button id="t-ok" class="btn-block">${escapeHtml(force ? t('btn.done') : t('btn.agree'))}</button>
      </footer>`;
    document.body.appendChild(el);
    document.getElementById('t-ok').onclick = () => {
      localStorage.setItem(TERMS_KEY, new Date().toISOString());
      el.remove();
      resolve();
    };
  });
}
function showDemoFlow(force) {
  return new Promise((resolve) => {
    const slides = [
      { h: t('demo.s1.h'), b: t('demo.s1.b') },
      { h: t('demo.s2.h'), b: t('demo.s2.b') },
      { h: t('demo.s3.h'), b: t('demo.s3.b') },
      { h: t('demo.s4.h'), b: t('demo.s4.b') },
      { h: t('demo.s5.h'), b: t('demo.s5.b') },
      { h: t('demo.s6.h'), b: t('demo.s6.b') },
    ];
    let i = 0;
    const el = document.createElement('div');
    el.className = 'fs-overlay';
    document.body.appendChild(el);
    const render = () => {
      const last = i === slides.length - 1;
      el.innerHTML = `
        <header style="display:flex; align-items:center; justify-content:space-between;">
          <img src="injectlog_icon.png" style="width:32px; height:32px; border-radius:7px;">
          <button id="d-skip" class="btn-ghost">${escapeHtml(t('demo.skip'))}</button>
        </header>
        <main style="display:flex; flex-direction:column; align-items:center; text-align:center; padding-top:32px;">
          <h2 style="font-family:var(--serif); font-size:24px; font-weight:500; margin:0 0 10px;">${escapeHtml(slides[i].h)}</h2>
          <p style="color:var(--text2); font-size:15px; max-width:32ch; line-height:1.5; white-space:pre-wrap;">${escapeHtml(slides[i].b)}</p>
        </main>
        <footer>
          <button id="d-next" class="btn-block">${escapeHtml(last ? t('demo.done') : t('demo.next'))}</button>
        </footer>`;
      document.getElementById('d-skip').onclick = finish;
      document.getElementById('d-next').onclick = () => { if (last) finish(); else { i++; render(); } };
    };
    const finish = () => {
      localStorage.setItem(DEMO_KEY, '1');
      el.remove();
      resolve();
    };
    render();
  });
}
function isIosSafari() {
  const ua = navigator.userAgent || '';
  const isIos = /iPhone|iPad|iPod/.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!isIos) return false;
  if (/CriOS|FxiOS|EdgiOS|OPiOS|YaBrowser|GSA|FBAN|FBAV|Instagram|Line|MicroMessenger/i.test(ua)) return false;
  return true;
}
function isStandalone() {
  return navigator.standalone === true ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
}
async function showInstallHint() {
  if (!isIosSafari() || isStandalone()) return;
  if (localStorage.getItem(INSTALL_DISMISS_KEY) === '1') return;
  const banner = document.getElementById('install-hint');
  const backdrop = document.getElementById('install-backdrop');
  banner.querySelector('h4').textContent = t('install.title') + ' · Installer sur votre iPhone';
  banner.querySelector('p').innerHTML = t('install.body') + '<br><br>Touchez Partager dans Safari puis <strong>Ajouter à l\'écran d\'accueil</strong>.';
  banner.querySelector('button').textContent = t('install.ok');
  banner.classList.add('show');
  backdrop.classList.add('show');
  return new Promise((resolve) => {
    document.getElementById('install-ok').addEventListener('click', () => {
      banner.classList.remove('show');
      backdrop.classList.remove('show');
      localStorage.setItem(INSTALL_DISMISS_KEY, '1');
      resolve();
    }, { once: true });
  });
}

/* =====================================================================
   Email today's list (mailto)
   =================================================================== */
async function emailTodaysList(enriched) {
  const email = getDigestEmail();
  if (!email) { toast(t('home.email.no.email')); return; }
  const items = (enriched || []).filter(x => {
    return x.sOd.status === 'due' || x.sOd.status === 'late' ||
           x.sOs.status === 'due' || x.sOs.status === 'late';
  });
  if (!items.length) { toast(t('home.email.none')); return; }
  const lines = items.map(({ p, sOd, sOs }) => {
    const parts = [];
    if (sOd.status === 'due' || sOd.status === 'late') parts.push(`OD ${drugLabel(p.eyes.od.drug)} (${t('status.' + sOd.status)})`);
    if (sOs.status === 'due' || sOs.status === 'late') parts.push(`OS ${drugLabel(p.eyes.os.drug)} (${t('status.' + sOs.status)})`);
    return `• ${formatPatientName(p)}${p.patientNumber ? ' #' + p.patientNumber : ''} — ${parts.join(', ')}`;
  });
  const subject = tF('home.email.subject', { date: fmtDate(todayISO()) });
  const body = lines.join('\n');
  window.location.href = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  toast(t('home.email.opened'));
}

/* ─── service worker ──────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

/* ─── boot ────────────────────────────────────────────────────────── */
(async function boot() {
  await showInstallHint();
  if (navigator.storage?.persist) { try { await navigator.storage.persist(); } catch {} }
  if (lockIsEnabled()) await showLockScreen();
  const termsAt = localStorage.getItem(TERMS_KEY);
  if (!termsAt) await showTermsScreen(false);
  if (!localStorage.getItem(DEMO_KEY)) await showDemoFlow(false);
  await go('patients');
})();
</script>
