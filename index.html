<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>InjectLog</title>
<meta name="theme-color" content="#0A6BFF">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="InjectLog">
<link rel="apple-touch-icon" href="injectlog_icon.png">
<style>
:root {
  --paper: #FBFAF7;
  --surface: #FFFFFF;
  --mist: #EEF1F5;
  --ink: #0F172A;
  --slate: #94A3B8;

  --bg: var(--paper);
  --card: var(--surface);
  --text: var(--ink);
  --text2: #475569;
  --text3: #94A3B8;
  --separator: rgba(15, 23, 42, 0.08);

  --signal: #0A6BFF;
  --signal-100: rgba(10, 107, 255, 0.12);

  --green: #16A34A;
  --amber: #E5A93B;
  --ember: #DC2626;

  --shadow-1: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.04);

  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);

  --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --serif: ui-serif, 'New York', 'Iowan Old Style', Georgia, 'Times New Roman', serif;
  --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
body { padding-bottom: var(--safe-bottom); }
body.has-tab-bar { padding-bottom: calc(var(--safe-bottom) + 64px); }

#app { max-width: 720px; margin: 0 auto; padding: 0 16px; }

header.bar {
  position: sticky; top: 0; z-index: 5;
  background: rgba(251, 250, 247, 0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  padding: calc(var(--safe-top) + 12px) 4px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--separator);
  margin: 0 -16px 14px;
  padding-left: 16px; padding-right: 16px;
}
.bar-title {
  font-family: var(--serif); font-weight: 500;
  font-size: 22px; letter-spacing: -0.01em; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bar-title em { font-style: italic; color: var(--signal); font-weight: 500; }
.bar .back { background: none; border: 0; color: var(--signal); font: inherit; font-weight: 500; padding: 6px 8px; margin-left: -8px; cursor: pointer; }
.bar .back:before { content: "‹ "; }
.bar .primary { background: none; border: 0; color: var(--signal); font: inherit; font-weight: 500; padding: 6px 8px; cursor: pointer; }
.bar-logo { width: 28px; height: 28px; border-radius: 6px; flex: 0 0 28px; object-fit: cover; box-shadow: 0 1px 2px rgba(10,31,68,0.08); }

main#view { padding: 0 0 24px; }

.tab-bar {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--separator);
  padding-bottom: env(safe-area-inset-bottom);
  display: flex;
  z-index: 8000;
}
.tab-bar .tab {
  flex: 1; background: transparent; border: none;
  padding: 8px 0 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text3); font-size: 11px; cursor: pointer;
  position: relative;
}
.tab-bar .tab svg { width: 24px; height: 24px; display: block; }
.tab-bar .tab.on { color: var(--signal); }
.tab-bar .tab.on svg { stroke-width: 2; }
.tab-bar .tab-badge {
  position: absolute; top: 4px; right: calc(50% - 22px);
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 999px; background: var(--ember); color: #fff;
  font-size: 11px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
.tab-bar .tab.has-badge .tab-badge { display: flex; }

.card {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-1);
}
.list .row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 4px;
  border-bottom: 1px solid var(--separator);
  cursor: pointer;
}
.list .row:last-child { border-bottom: 0; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--mist); color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-weight: 500; font-size: 14px;
  flex: 0 0 auto;
}
.row .meta { flex: 1; min-width: 0; }
.row .meta h3 { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; margin: 0; }
.row .meta p { font-size: 13px; color: var(--text3); margin: 2px 0 0; }
.row .chev { color: var(--slate); }

button.btn-block, button.btn-secondary, button.btn-ghost, button.btn-danger {
  font: inherit; border-radius: 12px; border: 0;
  padding: 12px 16px; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: transform 0.12s var(--ease-ios), background 0.12s;
}
button.btn-block { background: var(--signal); color: #fff; width: 100%; }
button.btn-secondary { background: var(--mist); color: var(--text); width: 100%; }
button.btn-ghost { background: transparent; color: var(--signal); }
button.btn-danger { background: var(--ember); color: #fff; width: 100%; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

label.field { display: block; margin-bottom: 12px; }
label.field .lbl {
  display: block; font-size: 12px; color: var(--text3);
  margin-bottom: 4px; font-weight: 500;
  letter-spacing: 0.02em; text-transform: uppercase;
}
input[type=text], input[type=date], input[type=number], input[type=email],
input[type=password],
select, textarea {
  width: 100%; font: inherit; color: var(--text);
  background: var(--mist);
  border: 1px solid transparent;
  border-radius: 12px; padding: 12px 14px;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus {
  outline: 0; border-color: var(--signal); background: var(--surface);
}
textarea { min-height: 80px; resize: vertical; }

.seg { display: inline-flex; background: var(--mist); padding: 3px; border-radius: 10px; width: 100%; }
.seg button {
  flex: 1; background: transparent; border: 0;
  padding: 8px 10px; border-radius: 8px;
  font: inherit; font-size: 13px; color: var(--text2);
  cursor: pointer;
}
.seg button.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow-1); }

.chip { display: inline-flex; align-items: center; gap: 4px;
  background: var(--mist); color: var(--text2);
  padding: 6px 10px; border-radius: 999px; font-size: 12px;
  border: 0; font: inherit; cursor: pointer;
}
.chip.selected { background: var(--signal); color: #fff; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }

.section-title {
  font-family: var(--serif); font-size: 13px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text3); margin: 18px 4px 6px;
}
.empty { text-align: center; padding: 56px 16px; color: var(--text3); }
.empty h2 { font-family: var(--serif); font-size: 20px; color: var(--text); margin: 0 0 6px; font-weight: 500; }
.empty p { font-size: 14px; max-width: 32ch; margin: 0 auto 14px; line-height: 1.45; }

.section-toggle .toggle-head {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
  padding: 14px 4px 8px;
  font-family: var(--serif);
  font-size: 17px; font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--text);
}
.section-toggle .toggle-head .caret {
  display: inline-block;
  transition: transform 0.2s ease;
  color: var(--text3);
  font-family: var(--sans);
  font-size: 14px;
}
.section-toggle.open .toggle-head .caret { transform: rotate(90deg); }
.section-toggle .toggle-head .sub {
  font-family: var(--sans); font-size: 12px; color: var(--text3);
  margin-left: auto; font-weight: 400;
}
.section-toggle .toggle-body { display: none; padding-bottom: 4px; }
.section-toggle.open .toggle-body { display: block; }

.drug-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  color: #fff; letter-spacing: 0.02em;
}
.drug-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.85);
}

.status-badge {
  display: inline-block; padding: 3px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
}
.status-badge.future { background: rgba(20, 184, 166, 0.12); color: #0F766E; }
.status-badge.due    { background: rgba(229, 169, 59, 0.20); color: #8A6500; }
.status-badge.late   { background: rgba(220, 38, 38, 0.14);  color: #991B1B; }
.status-badge.none   { background: var(--mist); color: var(--text3); }

.eye-card {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 14px; padding: 14px;
  box-shadow: var(--shadow-1);
}
.eye-card .eye-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.eye-card .eye-label {
  font-family: var(--serif); font-size: 15px; font-weight: 500;
}
.eye-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
@media (max-width: 380px) { .eye-grid { grid-template-columns: 1fr; } }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-head { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.cal-cell {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 8px;
  min-height: 56px; padding: 4px 6px;
  display: flex; flex-direction: column; gap: 2px;
  position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.cal-cell.out  { opacity: 0.32; }
.cal-cell.today { border-color: var(--signal); box-shadow: 0 0 0 2px var(--signal-100); }
.cal-cell .d { font-size: 12px; font-weight: 600; color: var(--text2); }
.cal-cell .dot-row { display: flex; gap: 2px; flex-wrap: wrap; }
.cal-cell .dot { width: 6px; height: 6px; border-radius: 50%; }
.cal-cell .more { font-size: 9px; color: var(--text3); margin-top: auto; }
.cal-cell.long-pressing { background: var(--signal-100); }

.spark { display: block; width: 100%; height: 36px; }

.oct-thumb { width: 64px; height: 64px; border-radius: 8px; overflow: hidden; background: var(--mist); flex: 0 0 auto; }
.oct-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

#install-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.55);
  z-index: 9997; display: none;
}
#install-backdrop.show { display: block; }
#install-hint {
  position: fixed; left: 16px; right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 24px);
  background: var(--card); color: var(--text);
  border: 1px solid var(--separator);
  border-radius: 18px;
  box-shadow: 0 18px 60px rgba(0,0,0,0.45);
  padding: 20px 20px 22px;
  z-index: 9998; display: none;
}
#install-hint.show { display: block; }
#install-hint h4 {
  font-family: var(--serif); font-size: 17px; font-weight: 500;
  margin: 0 0 8px; letter-spacing: -0.01em;
}
#install-hint p { font-size: 14px; color: var(--text2); margin: 0; line-height: 1.5; }
#install-hint button {
  margin-top: 14px; background: var(--signal); color: #fff;
  border: 0; padding: 11px 18px; border-radius: 10px;
  font: inherit; font-weight: 500; cursor: pointer;
}

#resume-chip {
  background: var(--signal-100);
  border: 1px solid rgba(10, 107, 255, 0.35);
  border-radius: 12px;
  padding: 10px 14px;
  margin: 0 0 12px;
  display: none;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
#resume-chip.show { display: flex; }
#resume-chip .avatar {
  width: 28px; height: 28px; font-size: 12px;
  background: var(--signal); color: #fff;
}
#resume-chip .body { flex: 1; min-width: 0; }
#resume-chip .label { font-size: 11px; color: var(--signal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
#resume-chip .name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#resume-chip .chev { color: var(--signal); font-size: 18px; flex: 0 0 auto; }
#resume-chip .dismiss {
  background: transparent; border: 0; color: var(--text3);
  font-size: 18px; line-height: 1; padding: 4px 6px;
  flex: 0 0 auto; cursor: pointer;
}

/* lock screen */
.lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px;
}
.lock-screen .icon {
  width: 96px; height: 96px;
  border-radius: 22px;
  box-shadow: 0 6px 24px rgba(10, 107, 255, 0.25);
  margin-bottom: 18px;
}
.lock-screen h1 {
  font-family: var(--serif); font-size: 28px; font-weight: 500; letter-spacing: -0.01em;
  margin: 0 0 6px;
}
.lock-screen p { color: var(--text2); text-align: center; max-width: 32ch; margin: 0 0 22px; }
.lock-screen button {
  background: var(--signal); color: #fff; border: 0;
  border-radius: 12px; padding: 14px 22px; font-size: 15px; font-weight: 500;
  cursor: pointer;
}

footer.legal {
  text-align: center; color: var(--text3);
  font-size: 11px; padding: 18px 16px 12px;
}

.toast {
  position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 88px);
  transform: translateX(-50%) translateY(40px);
  background: var(--ink); color: #fff;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.18s, transform 0.18s var(--ease-ios);
  z-index: 9000; pointer-events: none;
  max-width: calc(100vw - 32px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* terms / demo full-screen */
.fs-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
}
.fs-overlay header {
  padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
  border-bottom: 1px solid var(--separator);
}
.fs-overlay header h2 {
  font-family: var(--serif); font-size: 20px; font-weight: 500; margin: 0;
}
.fs-overlay main {
  flex: 1; overflow-y: auto;
  padding: 18px 20px 12px;
  line-height: 1.55;
}
.fs-overlay footer {
  padding: 12px 20px calc(env(safe-area-inset-bottom) + 12px);
  border-top: 1px solid var(--separator);
  background: var(--card);
}

/* sparkline tooltip */
.spark-wrap { position: relative; }

/* drug-switch timeline */
.timeline {
  position: relative;
  padding: 4px 0;
}
.timeline-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--separator);
}
.timeline-row:last-child { border-bottom: 0; }
.timeline-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex: 0 0 auto;
}

/* OCT photo capture */
.photo-viewer {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0, 0, 0, 0.95);
  display: flex; flex-direction: column;
}
.photo-viewer .pv-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
  color: #fff;
}
.photo-viewer .pv-header button { background: transparent; color: #fff; border: 0; padding: 8px; font: inherit; cursor: pointer; }
.photo-viewer .pv-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.photo-viewer .pv-body img { max-width: 100%; max-height: 100%; }
</style>
</head>
<body>
<div id="install-backdrop" aria-hidden="true"></div>
<aside id="install-hint" role="dialog" aria-live="polite">
  <h4></h4>
  <p></p>
  <button id="install-ok" type="button">OK</button>
</aside>

<div id="app">
  <header class="bar">
    <button id="back" class="back" style="display:none">Back</button>
    <img class="bar-logo" src="injectlog_icon.png" alt="" id="bar-logo">
    <div class="bar-title">Inject<em>Log</em></div>
    <button id="primary" class="primary" style="display:none"></button>
  </header>
  <div id="resume-chip" style="display:none;"></div>
  <main id="view"></main>
  <footer class="legal" id="footer-credit"></footer>
</div>

<nav class="tab-bar" id="tab-bar" style="display:none;">
  <button class="tab" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11l9-8 9 8"/>
      <path d="M5 10v10h14V10"/>
    </svg>
    <span class="tab-label" id="tl-home">Home</span>
    <span class="tab-badge" id="tb-home"></span>
  </button>
  <button class="tab" data-tab="list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="20" y2="6"/>
      <line x1="8" y1="12" x2="20" y2="12"/>
      <line x1="8" y1="18" x2="20" y2="18"/>
      <circle cx="4" cy="6" r="1"/>
      <circle cx="4" cy="12" r="1"/>
      <circle cx="4" cy="18" r="1"/>
    </svg>
    <span class="tab-label" id="tl-list">List</span>
    <span class="tab-badge" id="tb-list"></span>
  </button>
  <button class="tab" data-tab="calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="16" rx="2"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="3" x2="8" y2="7"/>
      <line x1="16" y1="3" x2="16" y2="7"/>
    </svg>
    <span class="tab-label" id="tl-calendar">Calendar</span>
  </button>
  <button class="tab" data-tab="stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="20" x2="4" y2="12"/>
      <line x1="10" y1="20" x2="10" y2="4"/>
      <line x1="16" y1="20" x2="16" y2="14"/>
      <line x1="22" y1="20" x2="2" y2="20"/>
    </svg>
    <span class="tab-label" id="tl-stats">Stats</span>
  </button>
  <button class="tab" data-tab="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9c.4.2.7.4.9.7"/>
    </svg>
    <span class="tab-label" id="tl-settings">Settings</span>
  </button>
</nav>

<div id="toast" class="toast"></div>

<script>
/* =====================================================================
   InjectLog v0.2 — anti-VEGF injection tracker.
   Local-only (IndexedDB) patient + injection data; optional encrypted
   backup; optional AI schedule import (identifiers only); biometric
   lock; Terms of Use; first-run demo; navigation back-stack; resume
   chip; per-patient stats; recall list; capacity planner; cost ledger;
   complications tracker.
   =================================================================== */

/* ─── reference data ──────────────────────────────────────────────── */
const DRUGS = [
  { key: 'avastin',  en: 'Avastin',   fr: 'Avastin',   scientific: 'bevacizumab',     color: '#6366F1' },
  { key: 'lucentis', en: 'Lucentis',  fr: 'Lucentis',  scientific: 'ranibizumab',     color: '#14B8A6' },
  { key: 'eylea',    en: 'Eylea',     fr: 'Eylea',     scientific: 'aflibercept',     color: '#F97316' },
  { key: 'eylea-hd', en: 'Eylea HD',  fr: 'Eylea HD',  scientific: 'aflibercept-HD',  color: '#DC2626' },
  { key: 'vabysmo',  en: 'Vabysmo',   fr: 'Vabysmo',   scientific: 'faricimab-svoa',  color: '#A855F7' },

/* ─── IndexedDB ───────────────────────────────────────────────────── */
const DB_NAME = 'injectlog-v1';
const DB_VERSION = 2;
let _dbPromise = null;
function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('patients')) {
        db.createObjectStore('patients', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('injections')) {
        const s = db.createObjectStore('injections', { keyPath: 'id' });
        s.createIndex('patientId', 'patientId', { unique: false });
        s.createIndex('date', 'date', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
async function tx(store, mode, run) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const r = run(s);
    t.oncomplete = () => resolve(r);
    t.onerror = () => reject(t.error);
  });
}
const db = {
  async listPatients() {
    return tx('patients', 'readonly', s => new Promise(res => {
      const out = [];
      s.openCursor().onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out.sort((a, b) => (b.modifiedAt || 0) - (a.modifiedAt || 0)));
      };
    }));
  },
  async getPatient(id) {
    return tx('patients', 'readonly', s => new Promise(res => {
      s.get(id).onsuccess = (e) => res(e.target.result);
    }));
  },
  async savePatient(p) {
    p.modifiedAt = Date.now();
    if (!p.createdAt) p.createdAt = p.modifiedAt;
    return tx('patients', 'readwrite', s => s.put(p));
  },
  async deletePatient(id) {
    await tx('patients', 'readwrite', s => s.delete(id));
    const injs = await db.listInjections(id);
    await Promise.all(injs.map(i => db.deleteInjection(i.id)));
  },
  async listInjections(patientId) {
    return tx('injections', 'readonly', s => new Promise(res => {
      const out = [];
      const idx = s.index('patientId');
      idx.openCursor(IDBKeyRange.only(patientId)).onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out.sort((a, b) => (b.date || '').localeCompare(a.date || '')));
      };
    }));
  },
  async listAllInjections() {
    return tx('injections', 'readonly', s => new Promise(res => {
      const out = [];
      s.openCursor().onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out);
      };
    }));
  },
  async getInjection(id) {
    return tx('injections', 'readonly', s => new Promise(res => {
      s.get(id).onsuccess = (e) => res(e.target.result);
    }));
  },
  async saveInjection(i) {
    i.modifiedAt = Date.now();
    if (!i.createdAt) i.createdAt = i.modifiedAt;
    return tx('injections', 'readwrite', s => s.put(i));
  },
  async deleteInjection(id) {
    return tx('injections', 'readwrite', s => s.delete(id));
  },
};

function tF(key, vars = {}) {
  let s = t(key);
  if ('n' in vars) s = s.replace(/\{s\}/g, vars.n === 1 ? '' : 's');

function snellenToLogMAR(s) {
  if (typeof s !== 'string') return null;
  const m = s.trim().match(/^(\d+)\s*\/\s*(\d+)$/);
  if (!m) return null;
  const num = Number(m[1]), den = Number(m[2]);
  if (!num || !den) return null;
  return Math.log10(den / num);
}

// Standard clinical Snellen "ladder" — only these labels are shown on the
// per-patient timeline's right axis so it doesn't display oddball values
// like 20/35 or 20/19. CF/HM/LP/NLP are included as the standard low-
// vision sentinel categories, mapped to their conventional logMAR
// equivalents (Holladay-style; CF≈1.85, HM≈2.3, LP≈2.7, NLP≈3.0).
const SNELLEN_LADDER = [
  { label: '20/20',  lm: 0.000 },
  { label: '20/25',  lm: 0.097 },
  { label: '20/30',  lm: 0.176 },
  { label: '20/40',  lm: 0.301 },
  { label: '20/50',  lm: 0.398 },
  { label: '20/60',  lm: 0.477 },
  { label: '20/80',  lm: 0.602 },
  { label: '20/100', lm: 0.699 },
  { label: '20/150', lm: 0.875 },
  { label: '20/200', lm: 1.000 },
  { label: '20/400', lm: 1.301 },
  { label: 'CF',     lm: 1.850 },
  { label: 'HM',     lm: 2.300 },
  { label: 'LP',     lm: 2.700 },
  { label: 'NLP',    lm: 3.000 },
];
function logMarToSnellen(lm) {
  if (lm == null || !isFinite(lm)) return '—';
  // Snap to the nearest ladder rung — never invent a non-standard value.
  let best = SNELLEN_LADDER[0];
  for (const s of SNELLEN_LADDER) {
    if (Math.abs(s.lm - lm) < Math.abs(best.lm - lm)) best = s;
  }
  return best.label;
}

// True when the eye's last 3 injections show monotonically rising CRT
// despite no drug change — a textbook "tachyphylaxis / sub-optimal
// response" signal worth surfacing on the eye card.
function isTachyphylaxis(eyeInjectionsAsc) {
  const last3 = (eyeInjectionsAsc || []).filter(i => typeof i.crtUm === 'number').slice(-3);
  if (last3.length < 3) return false;
  if (last3[1].drug !== last3[0].drug || last3[2].drug !== last3[1].drug) return false;
  return last3[2].crtUm > last3[1].crtUm && last3[1].crtUm > last3[0].crtUm;
}

function eyeStatus(eye, injections, todayDate) {
  if (!eye || !eye.active) return { lastDate: null, nextDate: null, status: 'none' };
  const today = todayDate || todayISO();
  const eyeKey = eye._eyeKey;
  const eyeInj = (injections || []).filter(i => i.eye === eyeKey).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const last = eyeInj[eyeInj.length - 1];
  const lastDate = last ? last.date : null;
  const interval = (last && last.intervalWeeksApplied) || eye.intervalWeeks || 4;
  let nextDate = null;
  if (eye.regimen === 'prn') nextDate = null;
  else if (lastDate) nextDate = addDays(lastDate, interval * 7);
  else nextDate = today;
  let status = 'future';
  if (nextDate) {
    const dd = daysBetween(today, nextDate);
    if (dd < -DUE_WINDOW_DAYS) status = 'late';
    else if (dd <= DUE_WINDOW_DAYS) status = 'due';
    else status = 'future';
  }
  const loadingTarget = eye.regimen === 'loading' ? (eye.loadingTarget || 3) : 0;
  return {
    lastDate, nextDate, status,
    daysToNext: nextDate ? daysBetween(today, nextDate) : null,
    interval,
    loadingDone: loadingTarget ? eyeInj.length : 0,
    loadingTarget,
    injectionCount: eyeInj.length,
  };
}

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function enableLock() {
  // Try WebAuthn platform authenticator first.
  if (window.PublicKeyCredential) {
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = crypto.getRandomValues(new Uint8Array(16));
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge,
          rp: { name: 'InjectLog' },
          user: { id: userId, name: 'user', displayName: 'InjectLog user' },
          pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
          authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
          timeout: 60000,
        },
      });
      if (cred && cred.rawId) {
        const id64 = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
        localStorage.setItem(LOCK_CRED_KEY, id64);
        localStorage.setItem(LOCK_KEY, '1');
        toast(t('lock.enabled'));
        return true;
      }
    } catch (e) {
      console.warn('WebAuthn enrol failed', e);
    }
  }
  // Fallback: passphrase.
  const pass = prompt(t('lock.passphrase.set'));
  if (!pass || pass.length < 8) return false;
  const h = await sha256Hex(pass);
  localStorage.setItem(LOCK_PASS_HASH_KEY, h);
  localStorage.setItem(LOCK_KEY, '1');
  toast(t('lock.enabled'));
  return true;
}
function disableLock() {
  localStorage.removeItem(LOCK_KEY);
  localStorage.removeItem(LOCK_CRED_KEY);
  localStorage.removeItem(LOCK_PASS_HASH_KEY);
  toast(t('lock.disabled'));
}
async function unlockAttempt() {
  const credId64 = localStorage.getItem(LOCK_CRED_KEY);
  if (credId64 && window.PublicKeyCredential) {
    try {
      const raw = Uint8Array.from(atob(credId64), c => c.charCodeAt(0));
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const res = await navigator.credentials.get({
        publicKey: {
          challenge,
          allowCredentials: [{ id: raw, type: 'public-key' }],
          userVerification: 'required',
          timeout: 60000,
        },
      });
      if (res) return true;
    } catch (e) {
      console.warn('WebAuthn unlock failed', e);
    }
  }
  if (localStorage.getItem(LOCK_PASS_HASH_KEY)) {
    const pass = prompt(t('lock.subtitle'));
    if (!pass) return false;
    const h = await sha256Hex(pass);
    return h === localStorage.getItem(LOCK_PASS_HASH_KEY);
  }
  return false;
}

let _lastActivityAt = Date.now();
let _autoLockTimer = null;
let _autoLockShowing = false;
function bumpActivity() { _lastActivityAt = Date.now(); }
function startAutoLockWatcher() {
  ['touchstart','pointerdown','keydown','focus'].forEach(ev => window.addEventListener(ev, bumpActivity, { passive: true }));
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState !== 'visible') return;
    if (!lockIsEnabled() || _autoLockShowing) return;
    const idleMs = Date.now() - _lastActivityAt;
    if (idleMs >= autoLockMinutes() * 60 * 1000) {
      _autoLockShowing = true;
      try { await showLockScreen(); } finally { _autoLockShowing = false; bumpActivity(); }
    }
  });
  // Also check periodically so the screen locks even while the app stays
  // in the foreground (e.g. on a desk).
  if (_autoLockTimer) clearInterval(_autoLockTimer);
  _autoLockTimer = setInterval(async () => {
    if (!lockIsEnabled() || _autoLockShowing) return;
    const idleMs = Date.now() - _lastActivityAt;
    if (idleMs >= autoLockMinutes() * 60 * 1000) {
      _autoLockShowing = true;
      try { await showLockScreen(); } finally { _autoLockShowing = false; bumpActivity(); }
    }
  }, 30000);
}

async function showLockScreen() {
  return new Promise((resolve) => {
    const el = document.createElement('div');
    el.className = 'lock-screen';
    el.innerHTML = `
      <img class="icon" src="injectlog_icon.png" alt="">
      <h1>${escapeHtml(t('lock.title'))}</h1>
      <p>${escapeHtml(t('lock.subtitle'))}</p>
      <button id="lock-unlock" type="button">${escapeHtml(t('btn.unlock'))}</button>`;
    document.body.appendChild(el);
    const attempt = async () => {
      const ok = await unlockAttempt();
      if (ok) { el.remove(); resolve(); }
      else toast(t('lock.fail'));
    };
    document.getElementById('lock-unlock').onclick = attempt;
    // Auto-trigger after a short delay.
    setTimeout(attempt, 250);
  });
}

/* ─── encrypted backup (AES-256-GCM / PBKDF2 250 k) ───────────────── */
async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 250000, hash: 'SHA-256' },
    km,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}
function b64encode(arr) {
  let s = '';
  const a = arr instanceof Uint8Array ? arr : new Uint8Array(arr);
  for (let i = 0; i < a.length; i++) s += String.fromCharCode(a[i]);
  return btoa(s);
}
function b64decode(s) {
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function exportEncryptedBackup() {
  const pass = prompt('Passphrase for this backup (keep it safe):');
  if (!pass || pass.length < 6) { toast('Passphrase too short'); return; }
  const [patients, injections] = await Promise.all([db.listPatients(), db.listAllInjections()]);
  // Convert any OCT Blob to base64 so JSON can hold it.
  const injPacked = await Promise.all(injections.map(async (i) => {
    if (i.octPhoto instanceof Blob) {
      const buf = await i.octPhoto.arrayBuffer();
      return { ...i, octPhoto: { _b64: b64encode(buf), _type: i.octPhoto.type || 'image/jpeg' } };
    }
    return i;
  }));
  const payload = JSON.stringify({ patients, injections: injPacked, exportedAt: new Date().toISOString() });
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(pass, salt);
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(payload)));
  const file = {
    format: 'injectlog-encrypted-backup',
    version: 1,
    exportedAt: new Date().toISOString(),
    algorithm: 'AES-256-GCM/PBKDF2-SHA256',
    iterations: 250000,
    salt: b64encode(salt),
    iv: b64encode(iv),
    ciphertext: b64encode(ct),
  };
  const blob = new Blob([JSON.stringify(file)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `injectlog-backup-${todayISO()}.lidcatch.json`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
  recordBackupNow();
  toast('Encrypted backup saved');
}

/* Anonymised CSV cohort export. Identifiers (name, chart #, DOB, free-text
   notes) never leave the file. Patient is collapsed to a short hash of the
   internal id + a session salt so the same patient lines up across rows,
   but the hash is unlinkable to the source record outside this device. */
async function exportAnonymisedCsv() {
  const [patients, injections] = await Promise.all([db.listPatients(), db.listAllInjections()]);
  const sessionSalt = String(Date.now()) + ':' + Math.random().toString(36).slice(2);
  const enc = new TextEncoder();
  const pidHash = async (id) => {
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(sessionSalt + ':' + id));
    const a = new Uint8Array(buf);
    let s = '';
    for (let i = 0; i < 6; i++) s += a[i].toString(16).padStart(2, '0');
    return 'p_' + s;
  };
  const pmap = new Map();
  for (const p of patients) pmap.set(p.id, p);
  const hashes = new Map();
  for (const p of patients) hashes.set(p.id, await pidHash(p.id));
  const ageYears = (dob) => {
    if (!dob) return '';
    const d = new Date(dob);
    if (isNaN(d.getTime())) return '';
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 86400000));
  };
  const headers = [
    'pseudonym', 'age_years', 'eye_diagnosis', 'eye_regimen',
    'injection_date', 'eye', 'drug', 'va_snellen', 'crt_um',
    'iop_pre', 'iop_post', 'interval_weeks_applied', 'complications', 'switch_reason',
  ];
  const esc = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const rows = [headers.join(',')];
  for (const i of injections) {
    const p = pmap.get(i.patientId);
    if (!p) continue;
    const eye = p.eyes?.[i.eye] || {};
    rows.push([
      hashes.get(i.patientId) || '',
      ageYears(p.dob),
      eye.diagnosis || '',
      eye.regimen || '',
      i.date || '',
      i.eye || '',
      i.drug || '',
      i.vaSnellen || '',
      typeof i.crtUm === 'number' ? i.crtUm : '',
      i.iopPre ?? '',
      i.iopPost ?? '',
      i.intervalWeeksApplied ?? '',
      Array.isArray(i.complications) ? i.complications.join(';') : '',
      i.switchReason || '',
    ].map(esc).join(','));
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `injectlog-cohort-${todayISO()}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
  toast(getLang() === 'fr' ? 'CSV anonymisé enregistré' : 'Anonymised CSV saved');
}

async function importEncryptedBackup(file) {
  if (!file) return;
  let parsed;
  try { parsed = JSON.parse(await file.text()); } catch { toast('Bad file'); return; }
  if (parsed.format === 'injectlog-v1') {
    // Plain JSON backup from v0.1 — accept.
    if (Array.isArray(parsed.patients)) for (const p of parsed.patients) await db.savePatient(p);
    if (Array.isArray(parsed.injections)) for (const i of parsed.injections) await db.saveInjection(i);
    toast('Plain backup imported');
    render();
    return;
  }
  if (parsed.format !== 'injectlog-encrypted-backup') { toast('Unknown format'); return; }
  const pass = prompt('Passphrase to decrypt this backup:');
  if (!pass) return;
  try {
    const salt = b64decode(parsed.salt);
    const iv = b64decode(parsed.iv);
    const ct = b64decode(parsed.ciphertext);
    const key = await deriveKey(pass, salt);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    const data = JSON.parse(new TextDecoder().decode(plain));
    if (Array.isArray(data.patients)) {
      for (const p of data.patients) await db.savePatient(p);
    }
    if (Array.isArray(data.injections)) {
      for (const i of data.injections) {
        if (i.octPhoto && i.octPhoto._b64) {
          const bytes = b64decode(i.octPhoto._b64);
          i.octPhoto = new Blob([bytes], { type: i.octPhoto._type || 'image/jpeg' });
        }
        await db.saveInjection(i);
      }
    }
    toast('Backup decrypted and imported');
    render();
  } catch (e) {
    console.error(e);
    toast('Decryption failed — wrong passphrase?');
  }
}

/* ─── badge + due/late count ──────────────────────────────────────── */
async function dueLateCount() {
  try {
    const patients = await db.listPatients();
    const today = todayISO();
    let n = 0;
    for (const p of patients) {
      ensurePatientShape(p);
      const injs = await db.listInjections(p.id);
      const sOd = eyeStatus({ ...p.eyes.od, _eyeKey: 'od' }, injs, today).status;
      const sOs = eyeStatus({ ...p.eyes.os, _eyeKey: 'os' }, injs, today).status;
      if (sOd === 'due' || sOd === 'late' || sOs === 'due' || sOs === 'late') n++;
    }
    return n;
  } catch { return 0; }
}
async function todaysPatientCount() {
  try {
    const patients = await db.listPatients();
    const today = todayISO();
    let n = 0;
    for (const p of patients) {
      ensurePatientShape(p);
      const injs = await db.listInjections(p.id);
      let any = false;
      for (const ek of ['od','os']) {
        const eye = { ...p.eyes[ek], _eyeKey: ek };
        if (!eye.active) continue;
        const s = eyeStatus(eye, injs, today);
        if (s.status === 'due' || s.status === 'late' || s.nextDate === today) any = true;
      }
      if (any) n++;
    }
    return n;
  } catch { return 0; }
}
async function refreshAppBadge() {
  if (typeof navigator === 'undefined' || typeof navigator.setAppBadge !== 'function') return;
  if (typeof Notification !== 'undefined' && Notification.permission !== 'granted') return;
  try {
    const n = await dueLateCount();
    if (n > 0) await navigator.setAppBadge(n);
    else await navigator.clearAppBadge?.();
  } catch {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') refreshAppBadge();
});

/* ─── state + navigation ──────────────────────────────────────────── */
const state = {
  view: 'patients',
  patientId: null,
  injectionId: null,
  calendarMonth: null,
  patientSearch: '',
  _navStack: [],
  _lastPatientCtx: null,
};
const titleEl   = document.querySelector('.bar-title');
const backBtn   = document.getElementById('back');
const primaryBtn= document.getElementById('primary');
const view      = document.getElementById('view');

const TAB_DEST = { home: 'patients', list: 'list', calendar: 'calendar', stats: 'stats', settings: 'settings' };
const VIEW_TO_TAB = {
  patients: 'home', patient: 'home', injection: 'home',
  'patient-stats': 'home',
  list: 'list',
  calendar: 'calendar',
  stats: 'stats', recall: 'stats', capacity: 'stats', complications: 'stats', 'letter-gain': 'stats', switching: 'stats',
  settings: 'settings',
};
document.querySelectorAll('#tab-bar .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = TAB_DEST[btn.dataset.tab];
    if (v && v !== state.view) go(v);
  });
});

backBtn.addEventListener('click', async () => {
  if (await goBack()) return;
  // Fallback per-view mapping.
  const fb = (v, p = {}) => go(v, p, { noStack: true });
  if (state.view === 'patient') fb('patients');
  else if (state.view === 'injection') fb('patient', { patientId: state.patientId });
  else if (state.view === 'patient-stats') fb('patient', { patientId: state.patientId });
  else if (state.view === 'recall' || state.view === 'capacity' || state.view === 'complications' || state.view === 'letter-gain' || state.view === 'switching') fb('stats');
  else fb('patients');
});

async function go(v, payload = {}, opts = {}) {
  const prev = state.view;
  // Track patient context for the resume chip.
  const isPatientCtx = (vw) => vw === 'patient' || vw === 'injection' || vw === 'patient-stats';
  if (isPatientCtx(prev) && !isPatientCtx(v)) {
    state._lastPatientCtx = { view: prev, patientId: state.patientId, injectionId: state.injectionId };
  } else if (isPatientCtx(v)) {
    state._lastPatientCtx = null;
  }
  if (!opts.noStack && prev && prev !== v) {
    state._navStack.push({
      view: prev, patientId: state.patientId, injectionId: state.injectionId, calendarMonth: state.calendarMonth,
    });
    while (state._navStack.length > 60) state._navStack.shift();
  }
  state.view = v;
  Object.assign(state, payload);
  await render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}
async function goBack() {
  if (state._navStack.length) {
    const snap = state._navStack.pop();
    state.view = snap.view;
    state.patientId = snap.patientId;
    state.injectionId = snap.injectionId;
    state.calendarMonth = snap.calendarMonth;
    await render();
    window.scrollTo({ top: 0, behavior: 'instant' });
    return true;
  }
  return false;
}
function pruneNavStack(pred) {
  state._navStack = state._navStack.filter(s => !pred(s));
}

async function render() {
  primaryBtn.style.display = 'none';
  primaryBtn.textContent = '';
  primaryBtn.onclick = null;
  const rootViews = ['patients', 'list', 'calendar', 'stats', 'settings'];
  backBtn.style.display = rootViews.includes(state.view) ? 'none' : 'inline-block';

  const credit = document.getElementById('footer-credit');
  if (credit) {
    const lu = new Date(document.lastModified);
    const luStr = isNaN(lu.getTime()) ? '' : lu.toLocaleString(getLang() === 'fr' ? 'fr-CA' : 'en-CA',
      { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: getLang() !== 'fr' });
    credit.textContent = luStr ? (getLang() === 'fr' ? 'Mise à jour : ' : 'Last update: ') + luStr : '';
  }

  await refreshTabBar();
  await refreshResumeChip();
  refreshAppBadge();

  if (state.view === 'patients')        return renderPatients();
  if (state.view === 'patient')         return renderPatient();
  if (state.view === 'injection')       return renderInjection();
  if (state.view === 'patient-stats')   return renderPatientStats();
  if (state.view === 'list')            return renderList();
  if (state.view === 'calendar')        return renderCalendar();
  if (state.view === 'stats')           return renderStats();
  if (state.view === 'recall')          return renderRecall();
  if (state.view === 'capacity')        return renderCapacity();
  if (state.view === 'complications')   return renderComplications();
  if (state.view === 'letter-gain')     return renderLetterGain();
  if (state.view === 'switching')       return renderSwitchingAnalysis();
  if (state.view === 'settings')        return renderSettings();
}
async function refreshTabBar() {
  const bar = document.getElementById('tab-bar');
  if (!bar) return;
  document.getElementById('tl-home').textContent     = t('tab.home');
  document.getElementById('tl-list').textContent     = t('tab.list');
  document.getElementById('tl-calendar').textContent = t('tab.calendar');
  document.getElementById('tl-stats').textContent    = t('tab.stats');
  document.getElementById('tl-settings').textContent = t('tab.settings');
  const active = VIEW_TO_TAB[state.view] || 'home';
  bar.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === active));
  const count = await dueLateCount();
  const homeTab = bar.querySelector('.tab[data-tab="home"]');
  const badge = document.getElementById('tb-home');
  if (homeTab && badge) {
    if (count > 0) { badge.textContent = String(count); homeTab.classList.add('has-badge'); }
    else { homeTab.classList.remove('has-badge'); }
  }
  const listTab = bar.querySelector('.tab[data-tab="list"]');
  const listBadge = document.getElementById('tb-list');
  if (listTab && listBadge) {
    const todayCount = await todaysPatientCount();
    if (todayCount > 0) { listBadge.textContent = String(todayCount); listTab.classList.add('has-badge'); }
    else { listTab.classList.remove('has-badge'); }
  }
  bar.style.display = '';
  document.body.classList.add('has-tab-bar');
}
async function refreshResumeChip() {
  const chip = document.getElementById('resume-chip');
  if (!chip) return;
  const ctx = state._lastPatientCtx;
  const isPatientCtx = ['patient', 'injection', 'patient-stats'].includes(state.view);
  if (!ctx || !ctx.patientId || isPatientCtx) {
    chip.classList.remove('show'); chip.innerHTML = '';
    return;
  }
  const p = await db.getPatient(ctx.patientId);
  if (!p) { state._lastPatientCtx = null; chip.classList.remove('show'); chip.innerHTML = ''; return; }
  const label = getLang() === 'fr' ? 'Reprendre' : 'Resume';
  chip.innerHTML = `
    <div class="avatar">${escapeHtml(p.initials || deriveInitials(p.name) || '·')}</div>
    <div class="body">
      <div class="label">${escapeHtml(label)}</div>
      <div class="name">${escapeHtml(formatPatientName(p))}</div>
    </div>
    <div class="chev">›</div>
    <button class="dismiss" aria-label="Dismiss" type="button">×</button>`;
  chip.classList.add('show');
  chip.onclick = (e) => {
    if (e.target.closest('.dismiss')) return;
    go(ctx.view || 'patient', { patientId: ctx.patientId, injectionId: ctx.injectionId });
  };
  chip.querySelector('.dismiss').onclick = (e) => {
    e.stopPropagation();
    state._lastPatientCtx = null;
    refreshResumeChip();
  };
}

   Patients home
   =================================================================== */
async function renderPatients() {
  titleEl.innerHTML = `Inject<em>Log</em>`;
  primaryBtn.style.display = 'inline-block';
  primaryBtn.textContent = t('patients.add');
  primaryBtn.onclick = () => promptNewPatient();

  const patients = await db.listPatients();
  const today = todayISO();
  if (!state.patientFilters) state.patientFilters = { status: 'all', drug: 'all', indication: 'all', duration: 'all' };
  if (!('duration' in state.patientFilters)) state.patientFilters.duration = 'all';
  const enriched = [];
  let due = 0, late = 0;
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    const sOd = eyeStatus({ ...p.eyes.od, _eyeKey: 'od' }, injs, today);
    const sOs = eyeStatus({ ...p.eyes.os, _eyeKey: 'os' }, injs, today);
    if (sOd.status === 'due') due++; if (sOs.status === 'due') due++;
    if (sOd.status === 'late') late++; if (sOs.status === 'late') late++;
    const rank = (s) => ({ late: 0, due: 1, future: 2, none: 3 }[s] ?? 9);
    const worst = Math.min(rank(sOd.status), rank(sOs.status));
    // Duration of treatment = years between earliest injection and today.
    // null if the patient has no injections logged yet.
    const earliest = injs.length ? injs[injs.length - 1].date : null; // listInjections returns DESC
    const years = earliest ? daysBetween(earliest, today) / 365.25 : null;
    enriched.push({ p, sOd, sOs, worst, injs, years });
  }
  enriched.sort((a, b) => a.worst - b.worst || (formatPatientName(a.p).localeCompare(formatPatientName(b.p))));

  const q = (state.patientSearch || '').trim().toLowerCase();
  const f = state.patientFilters;
  const durationMatch = (years, bucket) => {
    if (bucket === 'all') return true;
    if (bucket === 'none') return years == null;
    if (years == null) return false;
    if (bucket === 'lt1') return years < 1;
    if (bucket === '1to3') return years >= 1 && years < 3;
    if (bucket === '3to5') return years >= 3 && years < 5;
    if (bucket === 'gte5') return years >= 5;
    return true;
  };
  const filtered = enriched.filter(({ p, sOd, sOs, years }) => {
    if (q && !((p.name || '') + (p.patientNumber || '') + (p.initials || '')).toLowerCase().includes(q)) return false;
    if (f.status !== 'all') {
      const wanted = f.status; // 'due' | 'late' | 'future' | 'none'
      if (sOd.status !== wanted && sOs.status !== wanted) return false;
    }
    if (f.drug !== 'all') {
      const drugs = [p.eyes.od.active ? p.eyes.od.drug : null, p.eyes.os.active ? p.eyes.os.drug : null];
      if (!drugs.includes(f.drug)) return false;
    }
    if (f.indication !== 'all') {
      const inds = [p.eyes.od.active ? p.eyes.od.diagnosis : null, p.eyes.os.active ? p.eyes.os.diagnosis : null];
      if (!inds.includes(f.indication)) return false;
    }
    if (!durationMatch(years, f.duration)) return false;
    return true;
  });

  if (!patients.length) {
    view.innerHTML = `
      <div class="empty">
        <h2>${escapeHtml(t('patients.empty.h'))}</h2>
        <p>${escapeHtml(t('patients.empty.b'))}</p>
        <button id="empty-add" class="btn-block" style="max-width:240px;">${escapeHtml(t('patients.add'))}</button>
        <button id="empty-import" class="btn-secondary" style="max-width:240px; margin-top:8px;">${escapeHtml(t('patients.import'))}</button>
        <input id="import-photo" type="file" accept="image/*" style="display:none;">
        <p style="margin-top:18px; font-size:11px; color:var(--text3);">— ${getLang() === 'fr' ? 'ou' : 'or'} —</p>
        <button id="empty-seed" class="btn-ghost" style="max-width:240px;">🧪 ${getLang() === 'fr' ? 'Charger 200 patients fictifs' : 'Load 200 demo patients'}</button>
      </div>`;
    document.getElementById('empty-add').onclick = () => promptNewPatient();
    document.getElementById('empty-import').onclick = () => document.getElementById('import-photo').click();
    document.getElementById('import-photo').onchange = (e) => handleImportSchedule(e.target.files?.[0]);
    document.getElementById('empty-seed').onclick = () => seedDemoPatients();
    return;
  }

  const emailBtn = (due + late) > 0 ? `
    <button id="email-today" class="btn-secondary" style="margin-bottom:12px;">${escapeHtml(t('home.email.btn'))}</button>` : '';
  const hasFilter = q || f.status !== 'all' || f.drug !== 'all' || f.indication !== 'all' || f.duration !== 'all';
  // List is intentionally hidden until the user types a query OR picks at
  // least one filter chip. This keeps the home screen calm and prevents
  // accidental exposure of identifiers when the device is glanced at.
  const fr = getLang() === 'fr';
  if (state.patientSearchOpen == null) state.patientSearchOpen = false;
  const searchOpen = !!state.patientSearchOpen || hasFilter;
  const listBlock = hasFilter ? `
    <p style="font-size:12px; color:var(--text3); margin: 0 4px 8px;">${escapeHtml(fr ? `${filtered.length} sur ${enriched.length}` : `${filtered.length} of ${enriched.length}`)}</p>
    <div class="card list">
      ${filtered.length ? filtered.map(({ p, sOd, sOs, injs }) => {

async function handleImportSchedule(file) {
  if (!file) return;
  try {
    showLoading('Reading the schedule…');
    // Resize on-device first.
    const blob = await processPhotoFile(file, 1400);
    const dataUrl = await blobToDataURL(blob);
    const resp = await fetch('/api/scan-list', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ image: dataUrl }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || `API ${resp.status}`);
    const parsed = Array.isArray(data.patients) ? data.patients : [];
    hideLoading();
    if (!parsed.length) { toast('No patients detected'); return; }
    // Save each as a new patient (skip duplicates by chart #).
    const existing = await db.listPatients();
    const byPN = new Map();
    for (const p of existing) {
      const pn = (p.patientNumber || '').trim();
      if (pn) byPN.set(pn.toLowerCase(), p);
    }
    let created = 0, skipped = 0;
    for (const r of parsed) {
      const pn = (r.patientNumber || '').trim();
      if (pn && byPN.has(pn.toLowerCase())) { skipped++; continue; }
      const p = {
        id: uid(),
        initials: (r.initials || deriveInitials(r.name)).toUpperCase(),
        name: r.name || '',
        patientNumber: r.patientNumber || '',
        dob: '',
        notes: '',
        eyes: { od: emptyEye(), os: emptyEye() },
        createdAt: Date.now(),
      };
      await db.savePatient(p);
      created++;
    }
    toast(`Imported ${created} · skipped ${skipped}`);
    render();
  } catch (e) {
    hideLoading();
    console.error(e);
    toast(`Schedule scan failed: ${e?.message || 'unknown'}`);
  }
}
function processPhotoFile(file, maxEdge = 1600) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const w0 = img.naturalWidth, h0 = img.naturalHeight;
      const scale = Math.min(1, maxEdge / Math.max(w0, h0));
      const w = Math.max(1, Math.round(w0 * scale));
      const h = Math.max(1, Math.round(h0 * scale));
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob null')), 'image/jpeg', 0.86);
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('decode')); };
    img.src = url;
  });
}
function blobToDataURL(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('read'));
    r.readAsDataURL(blob);
  });
}
function showLoading(msg) {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = 'position:fixed; inset:0; background:rgba(15,23,42,0.5); z-index:9990; display:flex; align-items:center; justify-content:center;';

    document.body.appendChild(el);
  } else {
    const inner = el.querySelector('#loading-msg');
    if (inner) inner.textContent = msg;
  }
}

// Simple deterministic LCG so the demo cohort is repeatable across runs.
let _seedRng = 0xC0FFEE;
function seedRngReset(seed) { _seedRng = seed >>> 0; }
function seedRandom() {
  _seedRng = (_seedRng * 1664525 + 1013904223) >>> 0;
  return _seedRng / 0x100000000;
}
function seedPick(arr) { return arr[Math.floor(seedRandom() * arr.length)]; }
function seedPickWeighted(items) {
  const total = items.reduce((s, [, w]) => s + w, 0);
  let r = seedRandom() * total;
  for (const [item, w] of items) { if (r < w) return item; r -= w; }
  return items[items.length - 1][0];
}
function seedInt(lo, hi) { return lo + Math.floor(seedRandom() * (hi - lo + 1)); }

function _makeEye() {
  const diagnosis = seedPickWeighted([
    ['namd', 50], ['dme', 22], ['brvo', 9], ['crvo', 7], ['mcnv', 4], ['pcv', 3], ['rop', 1], ['other', 4],
  ]);
  const drug = seedPickWeighted([
    ['eylea', 32], ['avastin', 24], ['vabysmo', 18], ['lucentis', 12], ['eylea-hd', 11], ['other', 3],
  ]);
  const regimen = seedPickWeighted([
    ['tae', 60], ['fixed', 18], ['loading', 12], ['prn', 10],
  ]);
  let intervalWeeks;
  if (regimen === 'loading') intervalWeeks = 4;
  else if (regimen === 'prn') intervalWeeks = 8;
  else if (regimen === 'fixed') intervalWeeks = seedPickWeighted([[4,5],[6,15],[8,40],[10,20],[12,20]]);
  else intervalWeeks = seedPickWeighted([[4,10],[6,15],[8,30],[10,20],[12,15],[14,5],[16,5]]);
  return {
    active: true,
    diagnosis, drug, regimen,
    intervalWeeks,
    loadingTarget: 3,
    notes: '',
  };
}

async function _seedInjectionsForEye(patientId, eyeKey, eye) {
  const historyRoll = seedRandom();
  let totalInj;
  if (eye.regimen === 'loading') {
    totalInj = seedPickWeighted([[0,10],[1,20],[2,30],[3,30],[4,10]]);
  } else if (historyRoll < 0.30) totalInj = seedInt(1, 5);
  else if (historyRoll < 0.70) totalInj = seedInt(6, 15);
  else totalInj = seedInt(16, 28);
  if (totalInj === 0) return;

  const avgIntervalDays = eye.regimen === 'loading' ? 28 : (eye.intervalWeeks * 7);
  const totalDaysBack = totalInj * avgIntervalDays - seedInt(0, avgIntervalDays / 2);
  let currentDate = addDays(todayISO(), -totalDaysBack);

  let currentDrug = eye.drug;
  let intervalToApply = eye.intervalWeeks;
  let currentVALogMAR = snellenToLogMAR(seedPickWeighted([
    ['20/20',5],['20/25',8],['20/30',10],['20/40',18],['20/50',14],['20/60',12],
    ['20/80',10],['20/100',9],['20/200',8],['20/400',3],['20/800',3],
  ])) ?? 0.3;
  let currentCRT = seedInt(280, 480);
  const trajectory = seedPickWeighted([['improving',40],['stable',40],['worsening',20]]);
  const previousDrugForSwitch = currentDrug;
  let switchPending = false;

  for (let i = 0; i < totalInj; i++) {
    if (i > 0) {
      if (trajectory === 'improving') {
        currentVALogMAR -= 0.015 + seedRandom() * 0.025;
        currentCRT -= 4 + seedRandom() * 12;
      } else if (trajectory === 'worsening') {
        currentVALogMAR += 0.008 + seedRandom() * 0.018;
        currentCRT += 2 + seedRandom() * 8;
      } else {
        currentVALogMAR += (seedRandom() - 0.5) * 0.02;
        currentCRT += (seedRandom() - 0.5) * 10;
      }
      currentVALogMAR = Math.max(0, Math.min(1.7, currentVALogMAR));
      currentCRT = Math.max(220, Math.min(700, Math.round(currentCRT)));
    }

    // Snellen denominator from logMAR.
    const candidates = [20, 25, 30, 40, 50, 60, 80, 100, 125, 160, 200, 250, 320, 400, 500, 800];
    const target = Math.round(20 * Math.pow(10, currentVALogMAR));
    const snellenDen = candidates.reduce((best, c) => Math.abs(c - target) < Math.abs(best - target) ? c : best, 20);
    const snellenVA = `20/${snellenDen}`;

    const complications = [];
    if (seedRandom() < 0.018) complications.push(seedPick(['ioh-spike','subconj-hem']));
    if (seedRandom() < 0.003) complications.push('endophth'); // very rare

    // Drug switch only on TAE, post-loading. ~6% per injection after 5.
    let switchReason = '';
    if (eye.regimen === 'tae' && i >= 5 && seedRandom() < 0.06) {
      const others = DRUGS.filter(d => d.key !== currentDrug && d.key !== 'other');
      currentDrug = seedPick(others).key;
      switchReason = seedPickWeighted([
        ['durability',38],['partial',27],['no-response',16],['tachyphylaxis',11],['adverse',5],['patient',3],
      ]);
    }
    if (eye.regimen === 'tae' && i > 0) {
      if (trajectory === 'improving' || (trajectory === 'stable' && seedRandom() < 0.45)) {
        intervalToApply = Math.min(16, intervalToApply + 2);
      } else if (trajectory === 'worsening') {
        intervalToApply = Math.max(4, intervalToApply - 2);
      }
    }

    const inj = {
      id: uid(),
      _demo: true,
      patientId,
      date: currentDate,
      eye: eyeKey,
      drug: currentDrug,
      vaSnellen: snellenVA,
      crtUm: currentCRT,
      iopPre: seedInt(11, 19),
      iopPost: seedInt(13, 26),
      complications,
      switchReason,
      notes: '',
      intervalWeeksApplied: intervalToApply,
      createdAt: Date.now(),
    };
    await db.saveInjection(inj);
    currentDate = addDays(currentDate, intervalToApply * 7);
  }
}

async function seedDemoPatients() {
  if (!confirm('Load 200 demo patients with ~2 000 fake injections? This is reversible.')) return;
  seedRngReset(20260517);
  showLoading('Seeding 0 / 200 patients…');
  try {
    await clearDemoPatients(); // start fresh
    for (let i = 0; i < 200; i++) {
      const last = seedPick(DEMO_LAST_NAMES);
      const first = seedPick(DEMO_FIRST_NAMES);
      const name = `${last}, ${first}`;
      const ageYears = seedInt(50, 92);
      const dobYear = new Date().getFullYear() - ageYears;
      const dob = `${dobYear}-${String(seedInt(1, 12)).padStart(2, '0')}-${String(seedInt(1, 28)).padStart(2, '0')}`;
      const roll = seedRandom();
      let odActive = false, osActive = false;
      if (roll < 0.62) { odActive = true; osActive = true; }
      else if (roll < 0.85) { odActive = true; }
      else if (roll < 0.96) { osActive = true; }
      else { odActive = true; } // tiny fallback
      const patient = {
        id: uid(),
        _demo: true,
        initials: deriveInitials(name),
        name,
        patientNumber: String(10000 + i),
        dob,
        notes: '',
        eyes: {
          od: odActive ? _makeEye() : emptyEye(),
          os: osActive ? _makeEye() : emptyEye(),
        },
        createdAt: Date.now() - seedInt(30, 5 * 365) * 86400000,
      };
      await db.savePatient(patient);
      if (odActive) await _seedInjectionsForEye(patient.id, 'od', patient.eyes.od);
      if (osActive) await _seedInjectionsForEye(patient.id, 'os', patient.eyes.os);
      if (i % 5 === 0 || i === 199) showLoading(`Seeding ${i + 1} / 200 patients…`);
    }
    hideLoading();
    toast('200 demo patients loaded');
    render();
  } catch (e) {
    hideLoading();
    console.error(e);
    toast('Seed failed: ' + (e?.message || 'unknown'));
  }
}

  titleEl.textContent = formatPatientName(patient);
  primaryBtn.style.display = 'none';

  // One-line summary per eye: "OD — DME · q8 Eylea · VA 20/40 · CRT 285 µm"
  // with inline + (add injection) and ✎ (edit eye) buttons. The vertical
  // colour bar on the left says OD/OS at a glance.
  const eyeLineHtml = (eyeKey) => {
    const eye = { ...patient.eyes[eyeKey], _eyeKey: eyeKey };
    const eyeLabel = eyeKey === 'od' ? 'OD' : 'OS';
    const eyeInjAsc = injs.filter(i => i.eye === eyeKey).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const lastInj = eyeInjAsc[eyeInjAsc.length - 1];
    const tachy = isTachyphylaxis(eyeInjAsc);
    const accent = eyeKey === 'od' ? '#0A6BFF' : '#F59E0B';
    const tint = eyeKey === 'od'
      ? 'background:rgba(10,107,255,0.06); border-color:rgba(10,107,255,0.22);'
      : 'background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.30);';
    let summary;
    if (!eye.active) {
      summary = `<span style="color:var(--text3);">${escapeHtml(t('eye.inactive'))}</span>`;
    } else {
      const bits = [];
      if (eye.diagnosis) bits.push(escapeHtml(indicationLabel(eye.diagnosis).toUpperCase()));
      bits.push(`${escapeHtml(regimenLabel(eye.regimen))}${eye.regimen !== 'prn' ? ` q${eye.intervalWeeks || 4}` : ''} ${escapeHtml(drugLabel(eye.drug))}`);
      if (lastInj?.vaSnellen) bits.push(`VA ${escapeHtml(lastInj.vaSnellen)}`);
      if (typeof lastInj?.crtUm === 'number') bits.push(`CRT ${lastInj.crtUm} µm`);

    return `
      <div class="card" style="${tint} display:flex; align-items:center; gap:10px; padding:10px 12px; margin-bottom:8px;">
        <span style="font-family:var(--serif); font-size:16px; font-weight:600; color:${accent}; min-width:28px;">${eyeLabel}</span>
        <div style="flex:1; font-size:13px; line-height:1.4; min-width:0;">
          ${summary}
          ${tachy ? ` <span style="color:#991B1B; font-weight:600;">· ⚠ CRT ×3</span>` : ''}
        </div>
        ${eye.active
          ? `<button class="btn-ghost" data-action="add-injection" data-eye="${eyeKey}" title="${escapeHtml(t('eye.add.injection'))}" style="padding:4px 10px; font-size:18px; font-weight:600; flex:0 0 auto;">+</button>
             <button class="btn-ghost" data-action="edit-eye" data-eye="${eyeKey}" title="${escapeHtml(t('btn.edit'))}" style="padding:4px 8px; font-size:14px; flex:0 0 auto;">✎</button>`
          : `<button class="btn-ghost" data-action="edit-eye" data-eye="${eyeKey}" style="padding:4px 10px; font-size:12px; flex:0 0 auto;">${escapeHtml(t('eye.activate'))}</button>`}
      </div>`;
  };

  const allergies = Array.isArray(patient.allergies) ? patient.allergies : [];

  // Next-due highlight strip — earliest upcoming injection across both eyes.
  // Background colour mirrors the worst (most-overdue) status so a glance
  // at the top says "this patient is on schedule" / "this patient is late".
  const fr = getLang() === 'fr';
  const today = todayISO();
  const nextEntries = [];
  for (const ek of ['od', 'os']) {
    const eye = { ...patient.eyes[ek], _eyeKey: ek };
    if (!eye.active) continue;
    const s = eyeStatus(eye, injs, today);
    if (!s.nextDate) continue;
    nextEntries.push({ eye: ek, drug: eye.drug, ...s });
  }
  nextEntries.sort((a, b) => (a.nextDate || '').localeCompare(b.nextDate || ''));
  const worstStatus = nextEntries.reduce((acc, e) => {
    const rank = { late: 3, due: 2, future: 1 };
    return (rank[e.status] || 0) > (rank[acc] || 0) ? e.status : acc;
  }, 'future');
  const stripBg = {
    late:   'background:rgba(220,38,38,0.10); border-color:rgba(220,38,38,0.30);',
    due:    'background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.30);',
    future: 'background:rgba(10,107,255,0.08); border-color:rgba(10,107,255,0.25);',
  }[worstStatus] || '';
  const nextHighlight = nextEntries.length ? `
    <div class="card" style="${stripBg} display:flex; align-items:flex-start; gap:10px; padding:12px 14px;">
      <span style="font-size:22px; line-height:1;">📅</span>
      <div style="flex:1;">
        <div style="font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; font-weight:600;">${escapeHtml(fr ? 'Prochaine injection' : 'Next injection due')}</div>
        ${nextEntries.map(e => {
          const days = e.daysToNext;
          const dStr = days == null ? '' : (days < 0
            ? ` <span style="color:var(--ember); font-weight:700;">· ${-days}${fr ? 'j en retard' : 'd late'}</span>`
            : (days === 0 ? ` <span style="font-weight:700;">· ${fr ? "aujourd'hui" : 'today'}</span>` : ` <span style="color:var(--text3);">· ${fr ? 'dans ' + days + ' j' : 'in ' + days + ' d'}</span>`));
          return `
            <div style="margin-top:4px; font-size:14px;">
              <span class="drug-pill" style="background:${drug(e.drug).color}; flex:0 0 auto;">${escapeHtml(e.eye.toUpperCase())} · ${escapeHtml(drugLabel(e.drug))}</span>
              <strong style="font-family:var(--serif); font-size:16px; margin-left:6px;">${escapeHtml(fmtDate(e.nextDate))}</strong>${dStr}
            </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Combined Visits toggle for both eyes, sorted reverse-chron. Each row
  // is tappable and lands on the injection editor. Closed by default so
  // the patient page stays calm.
  const allInjDesc = injs.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (state.patientVisitsOpen == null) state.patientVisitsOpen = false;
  const visitsToggle = `
    <div class="section-toggle ${state.patientVisitsOpen ? 'open' : ''}" id="pv-visits">
      <div class="toggle-head"><span class="caret">›</span><span>${escapeHtml(fr ? 'Visites' : 'Visits')}</span><span class="sub">${allInjDesc.length}</span></div>
      <div class="toggle-body">
        ${allInjDesc.length ? `<div class="card list">
          ${allInjDesc.map(i => {
            const eyeTint = i.eye === 'od' ? 'rgba(10,107,255,0.06)' : 'rgba(245,158,11,0.08)';
            return `
              <div class="row" data-iid="${i.id}" style="background:${eyeTint};">
                <span class="drug-pill" style="background:${drug(i.drug).color}; flex:0 0 auto;">${escapeHtml(i.eye.toUpperCase())} · ${escapeHtml(drugLabel(i.drug))}</span>
                <div class="meta">
                  <h3 style="font-size:14px;">${escapeHtml(fmtDate(i.date))}</h3>
                  <p style="font-size:12px;">${escapeHtml((i.vaSnellen || ''))}${i.vaSnellen && i.crtUm ? ' · ' : ''}${typeof i.crtUm === 'number' ? `CRT ${i.crtUm} µm` : ''}${i.octPhoto ? ' · 📷' : ''}</p>
                </div>
                <div class="chev">›</div>
              </div>`;
          }).join('')}
        </div>` : `<p style="color:var(--text3); font-size:13px; text-align:center; padding:10px 0; margin:0;">${escapeHtml(fr ? 'Aucune visite' : 'No visits')}</p>`}
      </div>
    </div>`;

  // AI analysis button — only when we have something to send.
  const aiButton = (injs.length || patient.notes) ? `
    <button id="pv-ai" class="btn-secondary" style="margin: 10px 0;">${escapeHtml(fr ? '🧠 Analyser avec IA' : '🧠 Analyse with AI')}</button>` : '';

  view.innerHTML = `
    <div class="card">
      <h2 style="font-family:var(--serif); font-weight:500; font-size:20px; margin:0 0 4px;">${escapeHtml(formatPatientName(patient))}</h2>
      <p style="color:var(--text3); font-size:13px; margin:0;">
        ${patient.patientNumber ? `#${escapeHtml(patient.patientNumber)}` : ''}${patient.patientNumber && patient.dob ? ' · ' : ''}${patient.dob ? (fr ? 'DDN ' : 'DOB ') + escapeHtml(fmtDate(patient.dob)) : ''}
      </p>
      ${patient.notes ? `<p style="font-size:13px; margin: 10px 0 0; line-height:1.45;">${escapeHtml(patient.notes)}</p>` : ''}
      <div style="margin-top:10px; display:flex; gap:8px;">
        <button id="edit-patient" class="btn-ghost" style="padding:6px 8px;">${escapeHtml(t('btn.edit'))}</button>
        <button id="pstats" class="btn-ghost" style="padding:6px 8px;">${escapeHtml(t('patient.stats'))}</button>
      </div>
    </div>
    ${nextHighlight}
    ${aiButton}
    ${allergies.length ? `
      <div class="card" style="background:rgba(220,38,38,0.08); border-color:rgba(220,38,38,0.35); display:flex; align-items:center; gap:10px;">
        <span style="font-size:20px;">⚠</span>
        <div>
          <div style="font-size:12px; color:#991B1B; text-transform:uppercase; letter-spacing:0.04em; font-weight:700;">${escapeHtml(fr ? 'Allergies / intolérances' : 'Allergies / intolerances')}</div>
          <div style="font-size:14px; color:var(--text); margin-top:2px;">${allergies.map(k => `<span class="drug-pill" style="background:${drug(k).color}; margin-right:4px;">${escapeHtml(drugLabel(k))}</span>`).join(' ')}</div>
        </div>
      </div>` : ''}
    ${eyeLineHtml('od')}
    ${eyeLineHtml('os')}
    ${visitsToggle}
    <div style="margin-top:18px;">
      <button id="delete-patient" class="btn-danger">${escapeHtml(t('btn.delete'))}</button>
    </div>`;

  document.getElementById('edit-patient').onclick = () => editPatientDialog(patient);
  document.getElementById('pstats').onclick = () => go('patient-stats', { patientId: patient.id });
  document.getElementById('delete-patient').onclick = async () => {
    if (!confirm(t('patient.delete.confirm'))) return;
    await db.deletePatient(patient.id);
    pruneNavStack(s => s.patientId === patient.id);
    toast(t('patient.deleted'));
    if (!(await goBack())) go('patients', {}, { noStack: true });
  };
  view.querySelectorAll('[data-action="add-injection"]').forEach(b => {
    b.onclick = () => go('injection', { patientId: patient.id, injectionId: null, eye: b.dataset.eye });
  });
  view.querySelectorAll('[data-action="edit-eye"]').forEach(b => {
    b.onclick = () => editEyeDialog(patient, b.dataset.eye);
  });
  view.querySelectorAll('.row[data-iid]').forEach(r => {
    r.onclick = () => go('injection', { patientId: patient.id, injectionId: r.dataset.iid });
  });
  const visitsToggleEl = document.getElementById('pv-visits');
  if (visitsToggleEl) {
    visitsToggleEl.querySelector('.toggle-head').onclick = () => {
      visitsToggleEl.classList.toggle('open');
      state.patientVisitsOpen = visitsToggleEl.classList.contains('open');
    };
  }
  const aiBtn = document.getElementById('pv-ai');
  if (aiBtn) aiBtn.onclick = () => analysePatientWithAi(patient, injs);
}

function vaSparkSvg(eyeInjections) {
  const series = eyeInjections
    .slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    .map(i => ({ date: i.date, v: snellenToLogMAR(i.vaSnellen) }))
    .filter(p => p.v != null);
  if (series.length < 2) return '';
  return sparklineSvg(series.map(p => p.v), { invertY: true, color: 'var(--signal)' });
}
function crtSparkSvg(eyeInjections) {
  const series = eyeInjections
    .slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    .map(i => ({ date: i.date, v: typeof i.crtUm === 'number' ? i.crtUm : null }))
    .filter(p => p.v != null);
  if (series.length < 2) return '';
  return sparklineSvg(series.map(p => p.v), { invertY: false, color: '#A855F7' });
}
function sparklineSvg(values, opts = {}) {
  if (!values || values.length < 2) return '';
  const w = 280, h = 36, pad = 4;
  let lo = Math.min(...values), hi = Math.max(...values);
  if (lo === hi) { lo -= 1; hi += 1; }
  const yScale = (v) => {
    const norm = (v - lo) / (hi - lo);
    const yN = opts.invertY ? norm : 1 - norm;
    return pad + yN * (h - 2 * pad);
  };
  const step = (w - 2 * pad) / (values.length - 1);
  const points = values.map((v, i) => `${(pad + i * step).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');
  const last = values[values.length - 1];
  const first = values[0];
  const trendUp = last > first;
  const direction = opts.invertY ? (trendUp ? 'down' : 'up') : (trendUp ? 'up' : 'down');
  const trendColor = direction === 'up' ? 'var(--green)' : 'var(--ember)';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${opts.color || trendColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${(pad + (values.length - 1) * step).toFixed(1)}" cy="${yScale(last).toFixed(1)}" r="3" fill="${opts.color || trendColor}"/>
  </svg>`;
}
function drugSwitchTimelineHtml(eyeInjections) {
  const sorted = eyeInjections.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const switches = [];
  let lastDrug = null;
  for (const i of sorted) {
    if (lastDrug && i.drug !== lastDrug) {
      switches.push({ from: lastDrug, to: i.drug, date: i.date, reason: i.switchReason });
    }
    lastDrug = i.drug;
  }
  if (!switches.length) return '';
  return `
    <div style="border-top:1px solid var(--separator); padding-top:8px; margin-top:8px;">
      <div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px;">${escapeHtml(t('eye.switches'))}</div>
      ${switches.map(s => `
        <div style="display:flex; gap:6px; align-items:center; font-size:12px; padding:3px 0;">
          <span class="drug-pill" style="background:${drug(s.from).color};">${escapeHtml(drugLabel(s.from))}</span>
          <span>→</span>
          <span class="drug-pill" style="background:${drug(s.to).color};">${escapeHtml(drugLabel(s.to))}</span>
          <span style="color:var(--text3);">${escapeHtml(fmtDate(s.date))}${s.reason ? ' · ' + escapeHtml(switchReasonLabel(s.reason)) : ''}</span>
        </div>`).join('')}
    </div>`;
}
