<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>InjectLog</title>
<meta name="theme-color" content="#0A6BFF">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="InjectLog">
<link rel="apple-touch-icon" href="injectlog_icon.png">
<style>
:root {
  --paper: #FBFAF7;
  --surface: #FFFFFF;
  --mist: #EEF1F5;
  --ink: #0F172A;
  --slate: #94A3B8;

  --bg: var(--paper);
  --card: var(--surface);
  --text: var(--ink);
  --text2: #475569;
  --text3: #94A3B8;
  --separator: rgba(15, 23, 42, 0.08);

  --signal: #0A6BFF;
  --signal-100: rgba(10, 107, 255, 0.12);

  --green: #16A34A;
  --amber: #E5A93B;
  --ember: #DC2626;

  --shadow-1: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.04);

  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);

  --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --serif: ui-serif, 'New York', 'Iowan Old Style', Georgia, 'Times New Roman', serif;
  --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
body { padding-bottom: var(--safe-bottom); }
body.has-tab-bar { padding-bottom: calc(var(--safe-bottom) + 64px); }

#app { max-width: 720px; margin: 0 auto; padding: 0 16px; }

header.bar {
  position: sticky; top: 0; z-index: 5;
  background: rgba(251, 250, 247, 0.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  padding: calc(var(--safe-top) + 12px) 4px 12px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--separator);
  margin: 0 -16px 14px;
  padding-left: 16px; padding-right: 16px;
}
.bar-title {
  font-family: var(--serif); font-weight: 500;
  font-size: 22px; letter-spacing: -0.01em; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bar-title em { font-style: italic; color: var(--signal); font-weight: 500; }
.bar .back { background: none; border: 0; color: var(--signal); font: inherit; font-weight: 500; padding: 6px 8px; margin-left: -8px; cursor: pointer; }
.bar .back:before { content: "‹ "; }
.bar .primary { background: none; border: 0; color: var(--signal); font: inherit; font-weight: 500; padding: 6px 8px; cursor: pointer; }
.bar-logo { width: 28px; height: 28px; border-radius: 6px; flex: 0 0 28px; object-fit: cover; box-shadow: 0 1px 2px rgba(10,31,68,0.08); }

main#view { padding: 0 0 24px; }

.tab-bar {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--separator);
  padding-bottom: env(safe-area-inset-bottom);
  display: flex;
  z-index: 8000;
}
.tab-bar .tab {
  flex: 1; background: transparent; border: none;
  padding: 8px 0 6px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--text3); font-size: 11px; cursor: pointer;
  position: relative;
}
.tab-bar .tab svg { width: 24px; height: 24px; display: block; }
.tab-bar .tab.on { color: var(--signal); }
.tab-bar .tab.on svg { stroke-width: 2; }
.tab-bar .tab-badge {
  position: absolute; top: 4px; right: calc(50% - 22px);
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 999px; background: var(--ember); color: #fff;
  font-size: 11px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
.tab-bar .tab.has-badge .tab-badge { display: flex; }

.card {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-1);
}
.list .row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 4px;
  border-bottom: 1px solid var(--separator);
  cursor: pointer;
}
.list .row:last-child { border-bottom: 0; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--mist); color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-weight: 500; font-size: 14px;
  flex: 0 0 auto;
}
.row .meta { flex: 1; min-width: 0; }
.row .meta h3 { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; margin: 0; }
.row .meta p { font-size: 13px; color: var(--text3); margin: 2px 0 0; }
.row .chev { color: var(--slate); }

button.btn-block, button.btn-secondary, button.btn-ghost, button.btn-danger {
  font: inherit; border-radius: 12px; border: 0;
  padding: 12px 16px; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: transform 0.12s var(--ease-ios), background 0.12s;
}
button.btn-block { background: var(--signal); color: #fff; width: 100%; }
button.btn-secondary { background: var(--mist); color: var(--text); width: 100%; }
button.btn-ghost { background: transparent; color: var(--signal); }
button.btn-danger { background: var(--ember); color: #fff; width: 100%; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

label.field { display: block; margin-bottom: 12px; }
label.field .lbl {
  display: block; font-size: 12px; color: var(--text3);
  margin-bottom: 4px; font-weight: 500;
  letter-spacing: 0.02em; text-transform: uppercase;
}
input[type=text], input[type=date], input[type=number], input[type=email],
input[type=password],
select, textarea {
  width: 100%; font: inherit; color: var(--text);
  background: var(--mist);
  border: 1px solid transparent;
  border-radius: 12px; padding: 12px 14px;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus {
  outline: 0; border-color: var(--signal); background: var(--surface);
}
textarea { min-height: 80px; resize: vertical; }

.seg { display: inline-flex; background: var(--mist); padding: 3px; border-radius: 10px; width: 100%; }
.seg button {
  flex: 1; background: transparent; border: 0;
  padding: 8px 10px; border-radius: 8px;
  font: inherit; font-size: 13px; color: var(--text2);
  cursor: pointer;
}
.seg button.on { background: var(--surface); color: var(--text); box-shadow: var(--shadow-1); }

.chip { display: inline-flex; align-items: center; gap: 4px;
  background: var(--mist); color: var(--text2);
  padding: 6px 10px; border-radius: 999px; font-size: 12px;
  border: 0; font: inherit; cursor: pointer;
}
.chip.selected { background: var(--signal); color: #fff; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }

.section-title {
  font-family: var(--serif); font-size: 13px; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text3); margin: 18px 4px 6px;
}
.empty { text-align: center; padding: 56px 16px; color: var(--text3); }
.empty h2 { font-family: var(--serif); font-size: 20px; color: var(--text); margin: 0 0 6px; font-weight: 500; }
.empty p { font-size: 14px; max-width: 32ch; margin: 0 auto 14px; line-height: 1.45; }

.drug-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  color: #fff; letter-spacing: 0.02em;
}
.drug-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.85);
}

.status-badge {
  display: inline-block; padding: 3px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
}
.status-badge.future { background: rgba(20, 184, 166, 0.12); color: #0F766E; }
.status-badge.due    { background: rgba(229, 169, 59, 0.20); color: #8A6500; }
.status-badge.late   { background: rgba(220, 38, 38, 0.14);  color: #991B1B; }
.status-badge.none   { background: var(--mist); color: var(--text3); }

.eye-card {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 14px; padding: 14px;
  box-shadow: var(--shadow-1);
}
.eye-card .eye-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.eye-card .eye-label {
  font-family: var(--serif); font-size: 15px; font-weight: 500;
}
.eye-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
@media (max-width: 380px) { .eye-grid { grid-template-columns: 1fr; } }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-head { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.cal-cell {
  background: var(--card); border: 1px solid var(--separator);
  border-radius: 8px;
  min-height: 56px; padding: 4px 6px;
  display: flex; flex-direction: column; gap: 2px;
  position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.cal-cell.out  { opacity: 0.32; }
.cal-cell.today { border-color: var(--signal); box-shadow: 0 0 0 2px var(--signal-100); }
.cal-cell .d { font-size: 12px; font-weight: 600; color: var(--text2); }
.cal-cell .dot-row { display: flex; gap: 2px; flex-wrap: wrap; }
.cal-cell .dot { width: 6px; height: 6px; border-radius: 50%; }
.cal-cell .more { font-size: 9px; color: var(--text3); margin-top: auto; }
.cal-cell.long-pressing { background: var(--signal-100); }

.spark { display: block; width: 100%; height: 36px; }

.oct-thumb { width: 64px; height: 64px; border-radius: 8px; overflow: hidden; background: var(--mist); flex: 0 0 auto; }
.oct-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

#install-backdrop {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.55);
  z-index: 9997; display: none;
}
#install-backdrop.show { display: block; }
#install-hint {
  position: fixed; left: 16px; right: 16px;
  bottom: calc(env(safe-area-inset-bottom) + 24px);
  background: var(--card); color: var(--text);
  border: 1px solid var(--separator);
  border-radius: 18px;
  box-shadow: 0 18px 60px rgba(0,0,0,0.45);
  padding: 20px 20px 22px;
  z-index: 9998; display: none;
}
#install-hint.show { display: block; }
#install-hint h4 {
  font-family: var(--serif); font-size: 17px; font-weight: 500;
  margin: 0 0 8px; letter-spacing: -0.01em;
}
#install-hint p { font-size: 14px; color: var(--text2); margin: 0; line-height: 1.5; }
#install-hint button {
  margin-top: 14px; background: var(--signal); color: #fff;
  border: 0; padding: 11px 18px; border-radius: 10px;
  font: inherit; font-weight: 500; cursor: pointer;
}

#resume-chip {
  background: var(--signal-100);
  border: 1px solid rgba(10, 107, 255, 0.35);
  border-radius: 12px;
  padding: 10px 14px;
  margin: 0 0 12px;
  display: none;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
#resume-chip.show { display: flex; }
#resume-chip .avatar {
  width: 28px; height: 28px; font-size: 12px;
  background: var(--signal); color: #fff;
}
#resume-chip .body { flex: 1; min-width: 0; }
#resume-chip .label { font-size: 11px; color: var(--signal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
#resume-chip .name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#resume-chip .chev { color: var(--signal); font-size: 18px; flex: 0 0 auto; }
#resume-chip .dismiss {
  background: transparent; border: 0; color: var(--text3);
  font-size: 18px; line-height: 1; padding: 4px 6px;
  flex: 0 0 auto; cursor: pointer;
}

/* lock screen */
.lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px;
}
.lock-screen .icon {
  width: 96px; height: 96px;
  border-radius: 22px;
  box-shadow: 0 6px 24px rgba(10, 107, 255, 0.25);
  margin-bottom: 18px;
}
.lock-screen h1 {
  font-family: var(--serif); font-size: 28px; font-weight: 500; letter-spacing: -0.01em;
  margin: 0 0 6px;
}
.lock-screen p { color: var(--text2); text-align: center; max-width: 32ch; margin: 0 0 22px; }
.lock-screen button {
  background: var(--signal); color: #fff; border: 0;
  border-radius: 12px; padding: 14px 22px; font-size: 15px; font-weight: 500;
  cursor: pointer;
}

footer.legal {
  text-align: center; color: var(--text3);
  font-size: 11px; padding: 18px 16px 12px;
}

.toast {
  position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 88px);
  transform: translateX(-50%) translateY(40px);
  background: var(--ink); color: #fff;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.18s, transform 0.18s var(--ease-ios);
  z-index: 9000; pointer-events: none;
  max-width: calc(100vw - 32px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* terms / demo full-screen */
.fs-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
}
.fs-overlay header {
  padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
  border-bottom: 1px solid var(--separator);
}
.fs-overlay header h2 {
  font-family: var(--serif); font-size: 20px; font-weight: 500; margin: 0;
}
.fs-overlay main {
  flex: 1; overflow-y: auto;
  padding: 18px 20px 12px;
  line-height: 1.55;
}
.fs-overlay footer {
  padding: 12px 20px calc(env(safe-area-inset-bottom) + 12px);
  border-top: 1px solid var(--separator);
  background: var(--card);
}

/* sparkline tooltip */
.spark-wrap { position: relative; }

/* drug-switch timeline */
.timeline {
  position: relative;
  padding: 4px 0;
}
.timeline-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--separator);
}
.timeline-row:last-child { border-bottom: 0; }
.timeline-dot {
  width: 12px; height: 12px; border-radius: 50%;
  flex: 0 0 auto;
}

/* OCT photo capture */
.photo-viewer {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0, 0, 0, 0.95);
  display: flex; flex-direction: column;
}
.photo-viewer .pv-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
  color: #fff;
}
.photo-viewer .pv-header button { background: transparent; color: #fff; border: 0; padding: 8px; font: inherit; cursor: pointer; }
.photo-viewer .pv-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.photo-viewer .pv-body img { max-width: 100%; max-height: 100%; }
</style>
</head>
<body>
<div id="install-backdrop" aria-hidden="true"></div>
<aside id="install-hint" role="dialog" aria-live="polite">
  <h4></h4>
  <p></p>
  <button id="install-ok" type="button">OK</button>
</aside>

<div id="app">
  <header class="bar">
    <button id="back" class="back" style="display:none">Back</button>
    <img class="bar-logo" src="injectlog_icon.png" alt="" id="bar-logo">
    <div class="bar-title">Inject<em>Log</em></div>
    <button id="primary" class="primary" style="display:none"></button>
  </header>
  <div id="resume-chip" style="display:none;"></div>
  <main id="view"></main>
  <footer class="legal" id="footer-credit"></footer>
</div>

<nav class="tab-bar" id="tab-bar" style="display:none;">
  <button class="tab" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11l9-8 9 8"/>
      <path d="M5 10v10h14V10"/>
    </svg>
    <span class="tab-label" id="tl-home">Patients</span>
    <span class="tab-badge" id="tb-home"></span>
  </button>
  <button class="tab" data-tab="calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="18" height="16" rx="2"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="3" x2="8" y2="7"/>
      <line x1="16" y1="3" x2="16" y2="7"/>
    </svg>
    <span class="tab-label" id="tl-calendar">Calendar</span>
  </button>
  <button class="tab" data-tab="stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="20" x2="4" y2="12"/>
      <line x1="10" y1="20" x2="10" y2="4"/>
      <line x1="16" y1="20" x2="16" y2="14"/>
      <line x1="22" y1="20" x2="2" y2="20"/>
    </svg>
    <span class="tab-label" id="tl-stats">Stats</span>
  </button>
  <button class="tab" data-tab="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9c.4.2.7.4.9.7"/>
    </svg>
    <span class="tab-label" id="tl-settings">Settings</span>
  </button>
</nav>

<div id="toast" class="toast"></div>

<script>
/* =====================================================================
   InjectLog v0.2 — anti-VEGF injection tracker.
   Local-only (IndexedDB) patient + injection data; optional encrypted
   backup; optional AI schedule import (identifiers only); biometric
   lock; Terms of Use; first-run demo; navigation back-stack; resume
   chip; per-patient stats; recall list; capacity planner; cost ledger;
   complications tracker.
   =================================================================== */

/* ─── reference data ──────────────────────────────────────────────── */
const DRUGS = [
  { key: 'avastin',  en: 'Avastin',   fr: 'Avastin',   scientific: 'bevacizumab',     color: '#6366F1' },
  { key: 'lucentis', en: 'Lucentis',  fr: 'Lucentis',  scientific: 'ranibizumab',     color: '#14B8A6' },
  { key: 'eylea',    en: 'Eylea',     fr: 'Eylea',     scientific: 'aflibercept',     color: '#F97316' },
  { key: 'eylea-hd', en: 'Eylea HD',  fr: 'Eylea HD',  scientific: 'aflibercept-HD',  color: '#DC2626' },
  { key: 'vabysmo',  en: 'Vabysmo',   fr: 'Vabysmo',   scientific: 'faricimab-svoa',  color: '#A855F7' },
  { key: 'other',    en: 'Other',     fr: 'Autre',     scientific: '',                color: '#64748B' },
];
const drug = (k) => DRUGS.find(d => d.key === k) || DRUGS[DRUGS.length - 1];
const drugLabel = (k) => { const d = drug(k); return getLang() === 'fr' ? d.fr : d.en; };

const INDICATIONS = [
  { key: 'namd',  en: 'nAMD (wet AMD)',           fr: 'DMLA néovasculaire' },
  { key: 'dme',   en: 'Diabetic macular oedema',  fr: 'Œdème maculaire diabétique' },
  { key: 'brvo',  en: 'BRVO macular oedema',      fr: 'OBVR œdème maculaire' },
  { key: 'crvo',  en: 'CRVO macular oedema',      fr: 'OVCR œdème maculaire' },
  { key: 'mcnv',  en: 'Myopic CNV',               fr: 'NVC myopique' },
  { key: 'pcv',   en: 'Polypoidal CV',            fr: 'Vasculopathie choroïdienne polypoïdale' },
  { key: 'rop',   en: 'ROP',                      fr: 'Rétinopathie du prématuré' },
  { key: 'other', en: 'Other',                    fr: 'Autre' },
];
const indicationLabel = (k) => {
  const it = INDICATIONS.find(x => x.key === k);
  if (!it) return k || '';
  return getLang() === 'fr' ? it.fr : it.en;
};

const REGIMENS = [
  { key: 'loading', en: 'Loading',          fr: 'Charge' },
  { key: 'tae',     en: 'Treat & Extend',   fr: 'Treat & Extend' },
  { key: 'fixed',   en: 'Fixed interval',   fr: 'Intervalle fixe' },
  { key: 'prn',     en: 'PRN',              fr: 'PRN' },
];
const regimenLabel = (k) => {
  const r = REGIMENS.find(x => x.key === k);

/* ─── IndexedDB ───────────────────────────────────────────────────── */
const DB_NAME = 'injectlog-v1';
const DB_VERSION = 2;
let _dbPromise = null;
function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('patients')) {
        db.createObjectStore('patients', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('injections')) {
        const s = db.createObjectStore('injections', { keyPath: 'id' });
        s.createIndex('patientId', 'patientId', { unique: false });
        s.createIndex('date', 'date', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
async function tx(store, mode, run) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const r = run(s);
    t.oncomplete = () => resolve(r);
    t.onerror = () => reject(t.error);
  });
}
const db = {
  async listPatients() {
    return tx('patients', 'readonly', s => new Promise(res => {
      const out = [];
      s.openCursor().onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out.sort((a, b) => (b.modifiedAt || 0) - (a.modifiedAt || 0)));
      };
    }));
  },
  async getPatient(id) {
    return tx('patients', 'readonly', s => new Promise(res => {
      s.get(id).onsuccess = (e) => res(e.target.result);
    }));
  },
  async savePatient(p) {
    p.modifiedAt = Date.now();
    if (!p.createdAt) p.createdAt = p.modifiedAt;
    return tx('patients', 'readwrite', s => s.put(p));
  },
  async deletePatient(id) {
    await tx('patients', 'readwrite', s => s.delete(id));
    const injs = await db.listInjections(id);
    await Promise.all(injs.map(i => db.deleteInjection(i.id)));
  },
  async listInjections(patientId) {
    return tx('injections', 'readonly', s => new Promise(res => {
      const out = [];
      const idx = s.index('patientId');
      idx.openCursor(IDBKeyRange.only(patientId)).onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out.sort((a, b) => (b.date || '').localeCompare(a.date || '')));
      };
    }));
  },
  async listAllInjections() {
    return tx('injections', 'readonly', s => new Promise(res => {
      const out = [];
      s.openCursor().onsuccess = (e) => {
        const c = e.target.result;
        if (c) { out.push(c.value); c.continue(); }
        else res(out);
      };
    }));
  },
  async getInjection(id) {
    return tx('injections', 'readonly', s => new Promise(res => {
      s.get(id).onsuccess = (e) => res(e.target.result);
    }));
  },
  async saveInjection(i) {
    i.modifiedAt = Date.now();
    if (!i.createdAt) i.createdAt = i.modifiedAt;
    return tx('injections', 'readwrite', s => s.put(i));
  },
  async deleteInjection(id) {
    return tx('injections', 'readwrite', s => s.delete(id));
  },
};

function emptyEye() {

    active: false,
    diagnosis: '',
    drug: 'eylea',
    regimen: 'tae',
    intervalWeeks: 4,
    loadingTarget: 3,

function ensurePatientShape(p) {

  if (!p.eyes.od) p.eyes.od = emptyEye();
  if (!p.eyes.os) p.eyes.os = emptyEye();
  return p;

function eyeStatus(eye, injections, todayDate) {
  if (!eye || !eye.active) return { lastDate: null, nextDate: null, status: 'none' };
  const today = todayDate || todayISO();
  const eyeKey = eye._eyeKey;
  const eyeInj = (injections || []).filter(i => i.eye === eyeKey).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const last = eyeInj[eyeInj.length - 1];
  const lastDate = last ? last.date : null;
  const interval = (last && last.intervalWeeksApplied) || eye.intervalWeeks || 4;
  let nextDate = null;
  if (eye.regimen === 'prn') nextDate = null;
  else if (lastDate) nextDate = addDays(lastDate, interval * 7);
  else nextDate = today;
  let status = 'future';
  if (nextDate) {
    const dd = daysBetween(today, nextDate);
    if (dd < -DUE_WINDOW_DAYS) status = 'late';
    else if (dd <= DUE_WINDOW_DAYS) status = 'due';
    else status = 'future';
  }
  const loadingTarget = eye.regimen === 'loading' ? (eye.loadingTarget || 3) : 0;
  return {
    lastDate, nextDate, status,
    daysToNext: nextDate ? daysBetween(today, nextDate) : null,
    interval,
    loadingDone: loadingTarget ? eyeInj.length : 0,
    loadingTarget,
    injectionCount: eyeInj.length,
  };
}

/* ─── lock screen (Face ID via WebAuthn, passphrase fallback) ─────── */
async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function enableLock() {
  // Try WebAuthn platform authenticator first.
  if (window.PublicKeyCredential) {
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = crypto.getRandomValues(new Uint8Array(16));
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge,
          rp: { name: 'InjectLog' },
          user: { id: userId, name: 'user', displayName: 'InjectLog user' },
          pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
          authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
          timeout: 60000,
        },
      });
      if (cred && cred.rawId) {
        const id64 = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
        localStorage.setItem(LOCK_CRED_KEY, id64);
        localStorage.setItem(LOCK_KEY, '1');
        toast(t('lock.enabled'));
        return true;
      }
    } catch (e) {
      console.warn('WebAuthn enrol failed', e);
    }
  }
  // Fallback: passphrase.
  const pass = prompt(t('lock.passphrase.set'));
  if (!pass || pass.length < 8) return false;
  const h = await sha256Hex(pass);
  localStorage.setItem(LOCK_PASS_HASH_KEY, h);
  localStorage.setItem(LOCK_KEY, '1');
  toast(t('lock.enabled'));
  return true;
}
function disableLock() {
  localStorage.removeItem(LOCK_KEY);
  localStorage.removeItem(LOCK_CRED_KEY);
  localStorage.removeItem(LOCK_PASS_HASH_KEY);
  toast(t('lock.disabled'));
}
async function unlockAttempt() {
  const credId64 = localStorage.getItem(LOCK_CRED_KEY);
  if (credId64 && window.PublicKeyCredential) {
    try {
      const raw = Uint8Array.from(atob(credId64), c => c.charCodeAt(0));
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const res = await navigator.credentials.get({
        publicKey: {
          challenge,
          allowCredentials: [{ id: raw, type: 'public-key' }],
          userVerification: 'required',
          timeout: 60000,
        },
      });
      if (res) return true;
    } catch (e) {
      console.warn('WebAuthn unlock failed', e);
    }
  }
  if (localStorage.getItem(LOCK_PASS_HASH_KEY)) {
    const pass = prompt(t('lock.subtitle'));
    if (!pass) return false;
    const h = await sha256Hex(pass);
    return h === localStorage.getItem(LOCK_PASS_HASH_KEY);
  }
  return false;
}
async function showLockScreen() {
  return new Promise((resolve) => {
    const el = document.createElement('div');
    el.className = 'lock-screen';
    el.innerHTML = `
      <img class="icon" src="injectlog_icon.png" alt="">
      <h1>${escapeHtml(t('lock.title'))}</h1>
      <p>${escapeHtml(t('lock.subtitle'))}</p>
      <button id="lock-unlock" type="button">${escapeHtml(t('btn.unlock'))}</button>`;
    document.body.appendChild(el);
    const attempt = async () => {
      const ok = await unlockAttempt();
      if (ok) { el.remove(); resolve(); }
      else toast(t('lock.fail'));
    };
    document.getElementById('lock-unlock').onclick = attempt;
    // Auto-trigger after a short delay.
    setTimeout(attempt, 250);
  });
}

/* ─── encrypted backup (AES-256-GCM / PBKDF2 250 k) ───────────────── */
async function deriveKey(passphrase, salt) {

  const km = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 250000, hash: 'SHA-256' },
    km,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']

}

}

}
async function exportEncryptedBackup() {
  const pass = prompt('Passphrase for this backup (keep it safe):');
  if (!pass || pass.length < 6) { toast('Passphrase too short'); return; }

  const injPacked = await Promise.all(injections.map(async (i) => {
    if (i.octPhoto instanceof Blob) {
      const buf = await i.octPhoto.arrayBuffer();
      return { ...i, octPhoto: { _b64: b64encode(buf), _type: i.octPhoto.type || 'image/jpeg' } };

    format: 'injectlog-encrypted-backup',
    version: 1,
    exportedAt: new Date().toISOString(),
    algorithm: 'AES-256-GCM/PBKDF2-SHA256',
    iterations: 250000,
    salt: b64encode(salt),
    iv: b64encode(iv),
    ciphertext: b64encode(ct),
  };
  const blob = new Blob([JSON.stringify(file)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `injectlog-backup-${todayISO()}.lidcatch.json`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);

}
async function importEncryptedBackup(file) {
  if (!file) return;
  let parsed;
  try { parsed = JSON.parse(await file.text()); } catch { toast('Bad file'); return; }
  if (parsed.format === 'injectlog-v1') {
    // Plain JSON backup from v0.1 — accept.
    if (Array.isArray(parsed.patients)) for (const p of parsed.patients) await db.savePatient(p);
    if (Array.isArray(parsed.injections)) for (const i of parsed.injections) await db.saveInjection(i);
    toast('Plain backup imported');
    render();
    return;
  }
  if (parsed.format !== 'injectlog-encrypted-backup') { toast('Unknown format'); return; }
  const pass = prompt('Passphrase to decrypt this backup:');
  if (!pass) return;
  try {
    const salt = b64decode(parsed.salt);
    const iv = b64decode(parsed.iv);
    const ct = b64decode(parsed.ciphertext);
    const key = await deriveKey(pass, salt);
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    const data = JSON.parse(new TextDecoder().decode(plain));
    if (Array.isArray(data.patients)) {
      for (const p of data.patients) await db.savePatient(p);
    }
    if (Array.isArray(data.injections)) {
      for (const i of data.injections) {
        if (i.octPhoto && i.octPhoto._b64) {
          const bytes = b64decode(i.octPhoto._b64);
          i.octPhoto = new Blob([bytes], { type: i.octPhoto._type || 'image/jpeg' });
        }
        await db.saveInjection(i);
      }
    }
    toast('Backup decrypted and imported');
    render();
  } catch (e) {
    console.error(e);
    toast('Decryption failed — wrong passphrase?');
  }
}

async function dueLateCount() {
  try {
    const patients = await db.listPatients();
    const today = todayISO();
    let n = 0;
    for (const p of patients) {
      ensurePatientShape(p);
      const injs = await db.listInjections(p.id);
      const sOd = eyeStatus({ ...p.eyes.od, _eyeKey: 'od' }, injs, today).status;
      const sOs = eyeStatus({ ...p.eyes.os, _eyeKey: 'os' }, injs, today).status;
      if (sOd === 'due' || sOd === 'late' || sOs === 'due' || sOs === 'late') n++;
    }
    return n;
  } catch { return 0; }
}

async function go(v, payload = {}, opts = {}) {
  const prev = state.view;
  // Track patient context for the resume chip.
  const isPatientCtx = (vw) => vw === 'patient' || vw === 'injection' || vw === 'patient-stats';
  if (isPatientCtx(prev) && !isPatientCtx(v)) {
    state._lastPatientCtx = { view: prev, patientId: state.patientId, injectionId: state.injectionId };
  } else if (isPatientCtx(v)) {
    state._lastPatientCtx = null;
  }
  if (!opts.noStack && prev && prev !== v) {
    state._navStack.push({
      view: prev, patientId: state.patientId, injectionId: state.injectionId, calendarMonth: state.calendarMonth,
    });
    while (state._navStack.length > 60) state._navStack.shift();
  }
  state.view = v;

  await render();
  window.scrollTo({ top: 0, behavior: 'instant' });

    state.injectionId = snap.injectionId;
    state.calendarMonth = snap.calendarMonth;

async function handleImportSchedule(file) {
  if (!file) return;
  try {
    showLoading('Reading the schedule…');
    // Resize on-device first.
    const blob = await processPhotoFile(file, 1400);
    const dataUrl = await blobToDataURL(blob);
    const resp = await fetch('/api/scan-list', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ image: dataUrl }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || `API ${resp.status}`);
    const parsed = Array.isArray(data.patients) ? data.patients : [];
    hideLoading();
    if (!parsed.length) { toast('No patients detected'); return; }
    // Save each as a new patient (skip duplicates by chart #).
    const existing = await db.listPatients();
    const byPN = new Map();
    for (const p of existing) {
      const pn = (p.patientNumber || '').trim();
      if (pn) byPN.set(pn.toLowerCase(), p);
    }
    let created = 0, skipped = 0;
    for (const r of parsed) {
      const pn = (r.patientNumber || '').trim();
      if (pn && byPN.has(pn.toLowerCase())) { skipped++; continue; }
      const p = {
        id: uid(),
        initials: (r.initials || deriveInitials(r.name)).toUpperCase(),
        name: r.name || '',
        patientNumber: r.patientNumber || '',
        dob: '',
        notes: '',
        eyes: { od: emptyEye(), os: emptyEye() },
        createdAt: Date.now(),
      };
      await db.savePatient(p);
      created++;
    }
    toast(`Imported ${created} · skipped ${skipped}`);
    render();
  } catch (e) {
    hideLoading();
    console.error(e);
    toast(`Schedule scan failed: ${e?.message || 'unknown'}`);
  }
}
function processPhotoFile(file, maxEdge = 1600) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const w0 = img.naturalWidth, h0 = img.naturalHeight;
      const scale = Math.min(1, maxEdge / Math.max(w0, h0));
      const w = Math.max(1, Math.round(w0 * scale));
      const h = Math.max(1, Math.round(h0 * scale));
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(b => b ? res(b) : rej(new Error('toBlob null')), 'image/jpeg', 0.86);
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('decode')); };
    img.src = url;
  });
}
function blobToDataURL(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('read'));
    r.readAsDataURL(blob);
  });
}

// Simple deterministic LCG so the demo cohort is repeatable across runs.
let _seedRng = 0xC0FFEE;
function seedRngReset(seed) { _seedRng = seed >>> 0; }
function seedRandom() {
  _seedRng = (_seedRng * 1664525 + 1013904223) >>> 0;
  return _seedRng / 0x100000000;
}
function seedPick(arr) { return arr[Math.floor(seedRandom() * arr.length)]; }
function seedPickWeighted(items) {
  const total = items.reduce((s, [, w]) => s + w, 0);
  let r = seedRandom() * total;
  for (const [item, w] of items) { if (r < w) return item; r -= w; }
  return items[items.length - 1][0];
}
function seedInt(lo, hi) { return lo + Math.floor(seedRandom() * (hi - lo + 1)); }

function _makeEye() {
  const diagnosis = seedPickWeighted([
    ['namd', 50], ['dme', 22], ['brvo', 9], ['crvo', 7], ['mcnv', 4], ['pcv', 3], ['rop', 1], ['other', 4],
  ]);
  const drug = seedPickWeighted([
    ['eylea', 32], ['avastin', 24], ['vabysmo', 18], ['lucentis', 12], ['eylea-hd', 11], ['other', 3],
  ]);
  const regimen = seedPickWeighted([
    ['tae', 60], ['fixed', 18], ['loading', 12], ['prn', 10],
  ]);
  let intervalWeeks;
  if (regimen === 'loading') intervalWeeks = 4;
  else if (regimen === 'prn') intervalWeeks = 8;
  else if (regimen === 'fixed') intervalWeeks = seedPickWeighted([[4,5],[6,15],[8,40],[10,20],[12,20]]);
  else intervalWeeks = seedPickWeighted([[4,10],[6,15],[8,30],[10,20],[12,15],[14,5],[16,5]]);
  return {
    active: true,
    diagnosis, drug, regimen,
    intervalWeeks,
    loadingTarget: 3,
    notes: '',
  };
}

async function _seedInjectionsForEye(patientId, eyeKey, eye) {
  const historyRoll = seedRandom();
  let totalInj;
  if (eye.regimen === 'loading') {
    totalInj = seedPickWeighted([[0,10],[1,20],[2,30],[3,30],[4,10]]);
  } else if (historyRoll < 0.30) totalInj = seedInt(1, 5);
  else if (historyRoll < 0.70) totalInj = seedInt(6, 15);
  else totalInj = seedInt(16, 28);
  if (totalInj === 0) return;

  const avgIntervalDays = eye.regimen === 'loading' ? 28 : (eye.intervalWeeks * 7);
  const totalDaysBack = totalInj * avgIntervalDays - seedInt(0, avgIntervalDays / 2);
  let currentDate = addDays(todayISO(), -totalDaysBack);

  let currentDrug = eye.drug;
  let intervalToApply = eye.intervalWeeks;
  let currentVALogMAR = snellenToLogMAR(seedPickWeighted([
    ['20/20',5],['20/25',8],['20/30',10],['20/40',18],['20/50',14],['20/60',12],
    ['20/80',10],['20/100',9],['20/200',8],['20/400',3],['20/800',3],
  ])) ?? 0.3;
  let currentCRT = seedInt(280, 480);
  const trajectory = seedPickWeighted([['improving',40],['stable',40],['worsening',20]]);
  const previousDrugForSwitch = currentDrug;
  let switchPending = false;

  for (let i = 0; i < totalInj; i++) {
    if (i > 0) {
      if (trajectory === 'improving') {
        currentVALogMAR -= 0.015 + seedRandom() * 0.025;
        currentCRT -= 4 + seedRandom() * 12;
      } else if (trajectory === 'worsening') {
        currentVALogMAR += 0.008 + seedRandom() * 0.018;
        currentCRT += 2 + seedRandom() * 8;
      } else {
        currentVALogMAR += (seedRandom() - 0.5) * 0.02;
        currentCRT += (seedRandom() - 0.5) * 10;
      }
      currentVALogMAR = Math.max(0, Math.min(1.7, currentVALogMAR));
      currentCRT = Math.max(220, Math.min(700, Math.round(currentCRT)));
    }

    // Snellen denominator from logMAR.
    const candidates = [20, 25, 30, 40, 50, 60, 80, 100, 125, 160, 200, 250, 320, 400, 500, 800];
    const target = Math.round(20 * Math.pow(10, currentVALogMAR));
    const snellenDen = candidates.reduce((best, c) => Math.abs(c - target) < Math.abs(best - target) ? c : best, 20);
    const snellenVA = `20/${snellenDen}`;

    const complications = [];
    if (seedRandom() < 0.018) complications.push(seedPick(['ioh-spike','subconj-hem']));
    if (seedRandom() < 0.003) complications.push('endophth'); // very rare

    // Drug switch only on TAE, post-loading. ~6% per injection after 5.
    let switchReason = '';
    if (eye.regimen === 'tae' && i >= 5 && seedRandom() < 0.06) {
      const others = DRUGS.filter(d => d.key !== currentDrug && d.key !== 'other');
      currentDrug = seedPick(others).key;
      switchReason = seedPickWeighted([
        ['durability',35],['partial',25],['no-response',15],['tachyphylaxis',10],['cost',8],['adverse',4],['patient',3],
      ]);
    }
    if (eye.regimen === 'tae' && i > 0) {
      if (trajectory === 'improving' || (trajectory === 'stable' && seedRandom() < 0.45)) {
        intervalToApply = Math.min(16, intervalToApply + 2);
      } else if (trajectory === 'worsening') {
        intervalToApply = Math.max(4, intervalToApply - 2);
      }
    }

    const inj = {
      id: uid(),
      _demo: true,
      patientId,
      date: currentDate,
      eye: eyeKey,
      drug: currentDrug,
      vaSnellen: snellenVA,
      crtUm: currentCRT,
      iopPre: seedInt(11, 19),
      iopPost: seedInt(13, 26),
      complications,
      switchReason,
      notes: '',
      intervalWeeksApplied: intervalToApply,
      createdAt: Date.now(),
    };
    await db.saveInjection(inj);
    currentDate = addDays(currentDate, intervalToApply * 7);
  }
}

async function seedDemoPatients() {
  if (!confirm('Load 200 demo patients with ~2 000 fake injections? This is reversible.')) return;
  seedRngReset(20260517);
  showLoading('Seeding 0 / 200 patients…');
  try {
    await clearDemoPatients(); // start fresh
    for (let i = 0; i < 200; i++) {
      const last = seedPick(DEMO_LAST_NAMES);
      const first = seedPick(DEMO_FIRST_NAMES);
      const name = `${last}, ${first}`;
      const ageYears = seedInt(50, 92);
      const dobYear = new Date().getFullYear() - ageYears;
      const dob = `${dobYear}-${String(seedInt(1, 12)).padStart(2, '0')}-${String(seedInt(1, 28)).padStart(2, '0')}`;
      const roll = seedRandom();
      let odActive = false, osActive = false;
      if (roll < 0.62) { odActive = true; osActive = true; }
      else if (roll < 0.85) { odActive = true; }
      else if (roll < 0.96) { osActive = true; }
      else { odActive = true; } // tiny fallback
      const patient = {
        id: uid(),
        _demo: true,
        initials: deriveInitials(name),
        name,
        patientNumber: String(10000 + i),
        dob,
        notes: '',
        eyes: {
          od: odActive ? _makeEye() : emptyEye(),
          os: osActive ? _makeEye() : emptyEye(),
        },
        createdAt: Date.now() - seedInt(30, 5 * 365) * 86400000,
      };
      await db.savePatient(patient);
      if (odActive) await _seedInjectionsForEye(patient.id, 'od', patient.eyes.od);
      if (osActive) await _seedInjectionsForEye(patient.id, 'os', patient.eyes.os);
      if (i % 5 === 0 || i === 199) showLoading(`Seeding ${i + 1} / 200 patients…`);
    }
    hideLoading();
    toast('200 demo patients loaded');
    render();
  } catch (e) {
    hideLoading();
    console.error(e);
    toast('Seed failed: ' + (e?.message || 'unknown'));
  }
}

function vaSparkSvg(eyeInjections) {
  const series = eyeInjections
    .slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    .map(i => ({ date: i.date, v: snellenToLogMAR(i.vaSnellen) }))
    .filter(p => p.v != null);
  if (series.length < 2) return '';
  return sparklineSvg(series.map(p => p.v), { invertY: true, color: 'var(--signal)' });
}
function crtSparkSvg(eyeInjections) {
  const series = eyeInjections
    .slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    .map(i => ({ date: i.date, v: typeof i.crtUm === 'number' ? i.crtUm : null }))
    .filter(p => p.v != null);
  if (series.length < 2) return '';
  return sparklineSvg(series.map(p => p.v), { invertY: false, color: '#A855F7' });
}
function sparklineSvg(values, opts = {}) {
  if (!values || values.length < 2) return '';
  const w = 280, h = 36, pad = 4;
  let lo = Math.min(...values), hi = Math.max(...values);
  if (lo === hi) { lo -= 1; hi += 1; }
  const yScale = (v) => {
    const norm = (v - lo) / (hi - lo);
    const yN = opts.invertY ? norm : 1 - norm;
    return pad + yN * (h - 2 * pad);
  };
  const step = (w - 2 * pad) / (values.length - 1);
  const points = values.map((v, i) => `${(pad + i * step).toFixed(1)},${yScale(v).toFixed(1)}`).join(' ');
  const last = values[values.length - 1];
  const first = values[0];
  const trendUp = last > first;
  const direction = opts.invertY ? (trendUp ? 'down' : 'up') : (trendUp ? 'up' : 'down');
  const trendColor = direction === 'up' ? 'var(--green)' : 'var(--ember)';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${points}" fill="none" stroke="${opts.color || trendColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${(pad + (values.length - 1) * step).toFixed(1)}" cy="${yScale(last).toFixed(1)}" r="3" fill="${opts.color || trendColor}"/>
  </svg>`;
}
function drugSwitchTimelineHtml(eyeInjections) {
  const sorted = eyeInjections.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const switches = [];
  let lastDrug = null;
  for (const i of sorted) {
    if (lastDrug && i.drug !== lastDrug) {
      switches.push({ from: lastDrug, to: i.drug, date: i.date, reason: i.switchReason });
    }
    lastDrug = i.drug;
  }
  if (!switches.length) return '';
  return `
    <div style="border-top:1px solid var(--separator); padding-top:8px; margin-top:8px;">
      <div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px;">${escapeHtml(t('eye.switches'))}</div>
      ${switches.map(s => `
        <div style="display:flex; gap:6px; align-items:center; font-size:12px; padding:3px 0;">
          <span class="drug-pill" style="background:${drug(s.from).color};">${escapeHtml(drugLabel(s.from))}</span>
          <span>→</span>
          <span class="drug-pill" style="background:${drug(s.to).color};">${escapeHtml(drugLabel(s.to))}</span>
          <span style="color:var(--text3);">${escapeHtml(fmtDate(s.date))}${s.reason ? ' · ' + escapeHtml(switchReasonLabel(s.reason)) : ''}</span>
        </div>`).join('')}
    </div>`;
}

    const eyeKey = state.eye || 'od';
    const eyePlan = patient.eyes[eyeKey] || emptyEye();
    inj = {
      id: uid(),
      patientId: patient.id,
      date: todayISO(),
      eye: eyeKey,
      drug: eyePlan.drug || 'eylea',
      vaSnellen: '',
      crtUm: null,
      iopPre: null,
      iopPost: null,
      complications: [],

      notes: '',
      intervalWeeksApplied: (lastForEye?.intervalWeeksApplied) || eyePlan.intervalWeeks || 4,

    };

        <select id="i-switch">
          <option value="">—</option>
          ${SWITCH_REASONS.map(r => `<option value="${r.key}" ${inj.switchReason === r.key ? 'selected' : ''}>${escapeHtml(switchReasonLabel(r.key))}</option>`).join('')}

        <span class="lbl">${escapeHtml(t('inj.va'))}</span>

        <label class="field">
          <span class="lbl">${escapeHtml(t('inj.iop.pre'))}</span>
          <input id="i-iop-pre" type="number" min="1" max="60" inputmode="numeric" value="${inj.iopPre ?? ''}">
        </label>
        <label class="field">
          <span class="lbl">${escapeHtml(t('inj.iop.post'))}</span>
          <input id="i-iop-post" type="number" min="1" max="60" inputmode="numeric" value="${inj.iopPost ?? ''}">

      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.interval.next'))}</span>
        <input id="i-int" type="number" min="1" max="24" inputmode="numeric" value="${inj.intervalWeeksApplied || 4}">
      </label>
      <label class="field">
        <span class="lbl">${escapeHtml(t('inj.complications'))}</span>
        <div class="chip-grid" id="i-comp">
          ${COMPLICATIONS.map(c => `<button type="button" class="chip ${(inj.complications || []).includes(c.key) ? 'selected' : ''}" data-k="${c.key}">${escapeHtml(complicationLabel(c.key))}</button>`).join('')}
        </div>

  // Show switch-reason field whenever the chosen drug differs from the
  // patient's current plan for that eye OR the previous injection's drug.
  const drugSelect = document.getElementById('i-drug');
  const switchWrap = document.getElementById('switch-wrap');
  const previousInjs = await db.listInjections(patient.id);
  const prevForEye = previousInjs.find(i => i.eye === inj.eye && i.id !== inj.id);
  const checkSwitch = () => {
    const cur = drugSelect.value;
    const ref = prevForEye?.drug || patient.eyes[inj.eye].drug;
    switchWrap.style.display = (ref && cur !== ref) ? '' : 'none';
  };
  drugSelect.addEventListener('change', () => {
    inj.eye = view.querySelector('#i-eye button.on')?.dataset.v || 'od';
    checkSwitch();
  });
  checkSwitch();

  view.querySelectorAll('#i-eye button').forEach(b => {
    b.onclick = () => {
      view.querySelectorAll('#i-eye button').forEach(x => x.classList.toggle('on', x === b));
      checkSwitch();
    };
  });
  view.querySelectorAll('#i-comp .chip').forEach(c => {
    c.onclick = () => c.classList.toggle('selected');
  });
  const octBtn = document.getElementById('i-oct-add');
  const octInput = document.getElementById('i-oct-input');
  octBtn.onclick = () => {
    if (inj.octPhoto) {
      inj.octPhoto = null;
      document.getElementById('i-oct-thumb').innerHTML = '';
      octBtn.textContent = t('inj.oct.add');
    } else {
      octInput.click();
    }
  };
  octInput.onchange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    inj.octPhoto = await processPhotoFile(file, 1600);
    document.getElementById('i-oct-thumb').innerHTML = `<div class="oct-thumb"><img src="${URL.createObjectURL(inj.octPhoto)}" alt=""></div>`;
    octBtn.textContent = t('inj.oct.remove');
  };
  document.getElementById('i-save').onclick = async () => {
    inj.date = document.getElementById('i-date').value || todayISO();
    inj.eye = view.querySelector('#i-eye button.on')?.dataset.v || 'od';
    inj.drug = document.getElementById('i-drug').value;
    inj.vaSnellen = document.getElementById('i-va').value.trim();
    const crt = Number(document.getElementById('i-crt').value);
    inj.crtUm = isFinite(crt) && crt > 0 ? crt : null;
    const ip = Number(document.getElementById('i-iop-pre').value);
    inj.iopPre = isFinite(ip) && ip > 0 ? ip : null;
    const ipp = Number(document.getElementById('i-iop-post').value);
    inj.iopPost = isFinite(ipp) && ipp > 0 ? ipp : null;
    const iv = Number(document.getElementById('i-int').value);
    inj.intervalWeeksApplied = (isFinite(iv) && iv >= 1 && iv <= 24) ? iv : 4;
    inj.complications = Array.from(view.querySelectorAll('#i-comp .chip.selected')).map(c => c.dataset.k);
    inj.switchReason = document.getElementById('i-switch')?.value || '';
    inj.notes = document.getElementById('i-notes').value.trim();
    await db.saveInjection(inj);
    const cur = await db.getPatient(inj.patientId);
    ensurePatientShape(cur);
    cur.eyes[inj.eye].intervalWeeks = inj.intervalWeeksApplied;
    if (!cur.eyes[inj.eye].active) cur.eyes[inj.eye].active = true;
    cur.eyes[inj.eye].drug = inj.drug;
    await db.savePatient(cur);
    toast(t('inj.saved'));
    if (!(await goBack())) go('patient', { patientId: inj.patientId });
  };
  const delBtn = document.getElementById('i-delete');
  if (delBtn) delBtn.onclick = async () => {
    if (!confirm(t('inj.delete.confirm'))) return;
    await db.deleteInjection(inj.id);
    pruneNavStack(s => s.injectionId === inj.id);
    toast(t('inj.deleted'));
    if (!(await goBack())) go('patient', { patientId: inj.patientId });
  };
}

  if (!patient) return go('patients');
  const injs = await db.listInjections(patient.id);
  titleEl.textContent = t('pstats.title');

  const eyeStats = (eyeKey) => {
    const list = injs.filter(i => i.eye === eyeKey).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    if (!list.length) return { count: 0 };
    const first = list[0], last = list[list.length - 1];
    const years = first.date ? daysBetween(first.date, last.date) / 365 : 0;
    const switches = [];
    let lastDrug = null;
    for (const i of list) { if (lastDrug && i.drug !== lastDrug) switches.push(i); lastDrug = i.drug; }
    // Longest dry interval = longest gap between consecutive injections
    let longest = 0;
    for (let i = 1; i < list.length; i++) {
      const gap = daysBetween(list[i - 1].date, list[i].date);
      if (gap > longest) longest = gap;
    }
    const baselineVA = snellenToLogMAR(list.find(i => i.vaSnellen)?.vaSnellen);
    const latestVA = snellenToLogMAR([...list].reverse().find(i => i.vaSnellen)?.vaSnellen);
    const vaLines = (baselineVA != null && latestVA != null) ? logMarToLines(baselineVA - latestVA).toFixed(1) : null;
    const baselineCRT = list.find(i => typeof i.crtUm === 'number')?.crtUm;
    const latestCRT = [...list].reverse().find(i => typeof i.crtUm === 'number')?.crtUm;
    const crtDelta = (baselineCRT && latestCRT) ? (latestCRT - baselineCRT) : null;
    return {
      count: list.length,
      years: years.toFixed(1),
      switches: switches.length,
      longestWeeks: (longest / 7).toFixed(1),
      vaLines, crtDelta,
    };
  };

  const od = eyeStats('od');
  const os = eyeStats('os');
  const card = (eyeKey, s) => `
    <div class="card" style="margin-bottom:10px;">
      <h3 style="font-family:var(--serif); margin:0 0 8px; font-size:16px;">${escapeHtml(eyeKey === 'od' ? t('eye.od') : t('eye.os'))}</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px;">
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.injections'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.count || 0}</div></div>
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.years.on.tx'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.years ?? '0'}</div></div>
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.switches'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.switches ?? 0}</div></div>
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.longest.dry'))}</div><div style="font-family:var(--serif); font-size:22px;">${s.longestWeeks ?? '—'}</div></div>
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.va.delta'))}</div><div style="font-family:var(--serif); font-size:22px; color:${s.vaLines > 0 ? 'var(--green)' : (s.vaLines < 0 ? 'var(--ember)' : 'var(--text)')}">${s.vaLines != null ? (s.vaLines > 0 ? '+' : '') + s.vaLines : '—'}</div></div>
        <div><div style="color:var(--text3); font-size:11px; text-transform:uppercase;">${escapeHtml(t('pstats.crt.delta'))}</div><div style="font-family:var(--serif); font-size:22px; color:${s.crtDelta < 0 ? 'var(--green)' : (s.crtDelta > 0 ? 'var(--ember)' : 'var(--text)')}">${s.crtDelta != null ? (s.crtDelta > 0 ? '+' : '') + s.crtDelta + ' µm' : '—'}</div></div>
      </div>
    </div>`;
  view.innerHTML = `
    <h3 class="section-title">${escapeHtml(formatPatientName(patient))}</h3>
    ${card('od', od)}
    ${card('os', os)}`;
}

/* =====================================================================
   Calendar — with long-press quick-add
   =================================================================== */
async function renderCalendar() {
  titleEl.textContent = t('cal.title');
  primaryBtn.style.display = 'none';

  const now = new Date();
  if (!state.calendarMonth) {
    state.calendarMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  }
  const [y, m] = state.calendarMonth.split('-').map(Number);
  const monthStart = new Date(y, m - 1, 1);
  const monthEnd = new Date(y, m, 0);
  const gridStart = new Date(monthStart); gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const gridEnd = new Date(monthEnd);     gridEnd.setDate(gridEnd.getDate() + (6 - gridEnd.getDay()));
  const days = [];
  for (let d = new Date(gridStart); d <= gridEnd; d.setDate(d.getDate() + 1)) days.push(todayISO(d.getTime()));

  const patients = await db.listPatients();
  const today = todayISO();
  const byDate = new Map();
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const eyeKey of ['od', 'os']) {
      const eye = { ...p.eyes[eyeKey], _eyeKey: eyeKey };
      const s = eyeStatus(eye, injs, today);
      if (!eye.active || !s.nextDate) continue;
      const target = s.status === 'late' ? today : s.nextDate;
      if (!byDate.has(target)) byDate.set(target, []);
      byDate.get(target).push({ p, eye: eyeKey, drugKey: eye.drug, status: s.status });
    }
  }
  const dow = getLang() === 'fr' ? ['D','L','M','M','J','V','S'] : ['S','M','T','W','T','F','S'];
  const isToday = (iso) => iso === today;

  view.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <button id="cal-prev" class="btn-ghost" style="padding:6px 12px;">‹</button>
      <h2 style="font-family:var(--serif); font-weight:500; font-size:18px; margin:0; text-transform:capitalize;">${escapeHtml(fmtMonth(state.calendarMonth))}</h2>
      <button id="cal-next" class="btn-ghost" style="padding:6px 12px;">›</button>
    </div>
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 10px;">${escapeHtml(t('cal.tap.day'))}</p>
    <div class="cal-grid">
      ${dow.map(d => `<div class="cal-head">${d}</div>`).join('')}
      ${days.map(iso => {
        const isOut = !iso.startsWith(state.calendarMonth);
        const todays = byDate.get(iso) || [];
        const dots = todays.slice(0, 4).map(e => `<div class="dot" style="background:${drug(e.drugKey).color};"></div>`).join('');
        const more = todays.length > 4 ? `<div class="more">+${todays.length - 4}</div>` : '';
        const dayNum = Number(iso.split('-')[2]);
        return `
          <div class="cal-cell ${isOut ? 'out' : ''} ${isToday(iso) ? 'today' : ''}" data-iso="${iso}">
            <div class="d">${dayNum}</div>
            <div class="dot-row">${dots}</div>
            ${more}
          </div>`;
      }).join('')}
    </div>
    <div id="cal-day" style="margin-top:16px;"></div>`;

  document.getElementById('cal-prev').onclick = () => {
    const d = new Date(y, m - 2, 1);
    state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    renderCalendar();
  };
  document.getElementById('cal-next').onclick = () => {
    const d = new Date(y, m, 1);
    state.calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    renderCalendar();
  };
  // Tap = show day's list. Long-press (500 ms) = quick-add.
  view.querySelectorAll('.cal-cell').forEach(cell => {
    let pressTimer = null, longFired = false;
    const start = () => {
      longFired = false;
      cell.classList.add('long-pressing');
      pressTimer = setTimeout(() => {
        longFired = true;
        cell.classList.remove('long-pressing');
        quickAddOnDate(cell.dataset.iso);
      }, 500);
    };
    const cancel = () => {
      cell.classList.remove('long-pressing');
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    };
    cell.addEventListener('touchstart', start, { passive: true });
    cell.addEventListener('touchmove', cancel);
    cell.addEventListener('touchend', cancel);
    cell.addEventListener('touchcancel', cancel);
    cell.addEventListener('mousedown', start);
    cell.addEventListener('mouseup', cancel);
    cell.addEventListener('mouseleave', cancel);
    cell.onclick = () => { if (!longFired) showCalDay(cell.dataset.iso, byDate); };
  });
  if (todayISO().startsWith(state.calendarMonth)) showCalDay(todayISO(), byDate);
}
function showCalDay(iso, byDate) {
  const wrap = document.getElementById('cal-day');
  if (!wrap) return;
  const entries = byDate.get(iso) || [];
  if (!entries.length) {
    wrap.innerHTML = `<div class="card" style="text-align:center; color:var(--text3); font-size:13px;">${escapeHtml(tF('cal.day.empty', { date: fmtDate(iso) }))}</div>`;
    return;
  }
  wrap.innerHTML = `
    <h3 class="section-title">${escapeHtml(tF('cal.day.due', { date: fmtDate(iso) }))}</h3>
    <div class="card list">
      ${entries.map(e => `
        <div class="row" data-pid="${e.p.id}">
          <span class="drug-pill" style="background:${drug(e.drugKey).color}; flex:0 0 auto;">${escapeHtml(e.eye.toUpperCase())} ${escapeHtml(drugLabel(e.drugKey))}</span>
          <div class="meta">
            <h3>${escapeHtml(formatPatientName(e.p))}${e.p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(e.p.patientNumber)}</span>` : ''}</h3>
            <p><span class="status-badge ${e.status}">${escapeHtml(t('status.' + e.status))}</span></p>
          </div>
          <div class="chev">›</div>
        </div>`).join('')}
    </div>`;
  wrap.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => go('patient', { patientId: r.dataset.pid });
  });
}
async function quickAddOnDate(iso) {
  // Pop a patient picker that, when chosen, lands on the injection editor
  // pre-filled with the chosen date.
  const patients = await db.listPatients();
  if (!patients.length) { toast('No patients'); return; }
  const el = document.createElement('div');
  el.className = 'fs-overlay';
  el.innerHTML = `
    <header>
      <button id="qa-cancel" class="btn-ghost" style="padding:6px 10px;">${escapeHtml(t('btn.cancel'))}</button>
      <h2>${escapeHtml(tF('cal.quick.add', { date: fmtDate(iso) }))}</h2>
    </header>
    <main>
      <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('cal.pick.patient'))}</p>

          <div class="row" data-pid="${p.id}">

            <div class="meta">
              <h3>${escapeHtml(formatPatientName(p))}${p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(p.patientNumber)}</span>` : ''}</h3>
            </div>
            <div class="chev">›</div>
          </div>`).join('')}
      </div>

}

/* =====================================================================
   Stats hub
   =================================================================== */
async function renderStats() {
  titleEl.textContent = t('stats.title');
  primaryBtn.style.display = 'none';

  const patients = await db.listPatients();
  const allInj = await db.listAllInjections();
  const drugCount = {};
  for (const i of allInj) drugCount[i.drug] = (drugCount[i.drug] || 0) + 1;
  const indCount = {};
  let activeEyes = 0;
  for (const p of patients) {
    ensurePatientShape(p);
    for (const ek of ['od', 'os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      activeEyes++;
      indCount[e.diagnosis || 'unknown'] = (indCount[e.diagnosis || 'unknown'] || 0) + 1;
    }
  }
  const oneYearAgo = (() => { const d = new Date(); d.setFullYear(d.getFullYear() - 1); return todayISO(d.getTime()); })();
  const recent = allInj.filter(i => i.date >= oneYearAgo);
  const perPatient = patients.length ? recent.length / patients.length : 0;
  let taeIntervals = [];
  for (const p of patients) {
    for (const ek of ['od', 'os']) {
      const e = p.eyes[ek];
      if (!e.active || e.regimen !== 'tae') continue;
      const inj = allInj.filter(i => i.patientId === p.id && i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (!inj.length) continue;
      const lastIv = inj[inj.length - 1].intervalWeeksApplied;
      if (isFinite(lastIv)) taeIntervals.push(lastIv);
    }
  }
  const meanTae = taeIntervals.length ? (taeIntervals.reduce((a,b)=>a+b,0) / taeIntervals.length) : null;
  const compCount = allInj.reduce((s, i) => s + (Array.isArray(i.complications) ? i.complications.length : 0), 0);
  const compRate = allInj.length ? (compCount * 1000 / allInj.length) : 0;
  const drugTotal = Object.values(drugCount).reduce((a,b) => a + b, 0) || 1;
  const indTotal  = Object.values(indCount).reduce((a,b) => a + b, 0) || 1;

  view.innerHTML = `
    <div class="eye-grid" style="margin-bottom:12px;">
      ${statTile(t('stats.total.injections'), allInj.length)}
      ${statTile(t('stats.total.patients'), patients.length)}
      ${statTile(t('stats.eyes.active'), activeEyes)}
      ${statTile(t('stats.injections.per.year'), perPatient.toFixed(1))}
      ${statTile(t('stats.mean.interval'), meanTae == null ? '—' : meanTae.toFixed(1) + ' w')}
      ${statTile(t('stats.complications.rate'), compRate.toFixed(1))}
    </div>

    <h3 class="section-title">${escapeHtml(t('stats.drug.share'))}</h3>
    <div class="card">
      ${DRUGS.filter(d => drugCount[d.key]).map(d => {
        const n = drugCount[d.key] || 0;
        const pct = (n / drugTotal) * 100;
        return `
          <div style="margin-bottom:8px;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
              <span><span class="drug-pill" style="background:${d.color};">${escapeHtml(getLang() === 'fr' ? d.fr : d.en)}</span></span>
              <span style="font-variant-numeric:tabular-nums; font-size:13px;">${n} · ${pct.toFixed(0)}%</span>
            </div>
            <div style="height:6px; background:var(--mist); border-radius:3px; overflow:hidden;">
              <div style="height:100%; width:${pct}%; background:${d.color};"></div>
            </div>
          </div>`;
      }).join('') || `<p style="color:var(--text3); font-size:13px; margin:0;">—</p>`}
    </div>

    <h3 class="section-title">${escapeHtml(t('stats.indication.share'))}</h3>
    <div class="card">
      ${INDICATIONS.filter(i => indCount[i.key]).map(i => {
        const n = indCount[i.key] || 0;
        const pct = (n / indTotal) * 100;
        return `
          <div style="display:flex; justify-content:space-between; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--separator);">
            <span>${escapeHtml(getLang() === 'fr' ? i.fr : i.en)}</span>
            <span style="font-variant-numeric:tabular-nums; font-size:13px;">${n} · ${pct.toFixed(0)}%</span>
          </div>`;
      }).join('') || `<p style="color:var(--text3); font-size:13px; margin:0;">—</p>`}
    </div>

    <h3 class="section-title">${escapeHtml(t('stats.title'))}</h3>
    <div class="card list">
      <div class="row" data-go="letter-gain"><div class="avatar">📈</div><div class="meta"><h3>${escapeHtml(t('stats.letter.gain'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="capacity"><div class="avatar">📅</div><div class="meta"><h3>${escapeHtml(t('stats.capacity'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="cost"><div class="avatar">💰</div><div class="meta"><h3>${escapeHtml(t('stats.cost'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="complications"><div class="avatar">⚠</div><div class="meta"><h3>${escapeHtml(t('stats.complications.detail'))}</h3></div><div class="chev">›</div></div>
      <div class="row" data-go="recall"><div class="avatar">🔔</div><div class="meta"><h3>${escapeHtml(t('stats.recall'))}</h3></div><div class="chev">›</div></div>
    </div>`;

  view.querySelectorAll('.row[data-go]').forEach(r => r.onclick = () => go(r.dataset.go));
}
function statTile(label, value) {
  return `
    <div class="card" style="margin:0;">
      <div style="font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em;">${escapeHtml(label)}</div>
      <div style="font-family:var(--serif); font-size:24px; font-weight:500;">${escapeHtml(String(value))}</div>

}

/* ─── Letter-gain outcomes ─────────────────────────────────────────── */
async function renderLetterGain() {
  titleEl.textContent = t('stats.letter.gain');
  primaryBtn.style.display = 'none';
  const patients = await db.listPatients();
  const allInj = await db.listAllInjections();
  const cutoffDays = 270; // ~9 mo
  // For each active eye, get baseline (first VA-recorded injection) and
  // latest VA-recorded injection that is at least cutoff days after baseline.
  const byInd = new Map(); // indicationKey → { eyes:[{deltaLines}] }
  for (const p of patients) {
    ensurePatientShape(p);
    for (const ek of ['od','os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      const list = allInj.filter(i => i.patientId === p.id && i.eye === ek && i.vaSnellen).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      if (list.length < 2) continue;
      const baseline = list[0];
      const candidates = list.filter(i => daysBetween(baseline.date, i.date) >= cutoffDays);
      if (!candidates.length) continue;
      const final = candidates[candidates.length - 1];
      const baseV = snellenToLogMAR(baseline.vaSnellen);
      const finV = snellenToLogMAR(final.vaSnellen);
      if (baseV == null || finV == null) continue;
      const deltaLines = logMarToLines(baseV - finV);
      const key = e.diagnosis || 'unknown';
      if (!byInd.has(key)) byInd.set(key, []);
      byInd.get(key).push(deltaLines);
    }
  }
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(tF('stats.letter.gain.body', { n: 1 }))}</p>
    <div class="card">
      ${Array.from(byInd.entries()).map(([k, arr]) => {
        const gain5  = arr.filter(d => d >= 1).length;   // ≥ 1 line ≈ ≥ 5 letters
        const gain10 = arr.filter(d => d >= 2).length;
        const gain15 = arr.filter(d => d >= 3).length;
        const total = arr.length;
        return `
          <div style="padding:8px 0; border-bottom:1px solid var(--separator);">
            <div style="font-size:14px; font-weight:600; margin-bottom:4px;">${escapeHtml(indicationLabel(k))} <span style="color:var(--text3); font-weight:400;">· n=${total}</span></div>
            <div style="font-size:12px; color:var(--text2);">
              ≥ 5 letters: <strong>${((gain5/total)*100).toFixed(0)}%</strong> ·
              ≥ 10: <strong>${((gain10/total)*100).toFixed(0)}%</strong> ·
              ≥ 15: <strong>${((gain15/total)*100).toFixed(0)}%</strong>
            </div>
          </div>`;
      }).join('') || `<p style="color:var(--text3); font-size:13px; margin:0;">Not enough data yet — needs at least one eye with ≥ 9 mo of follow-up and Snellen VA at baseline + a later visit.</p>`}
    </div>`;
}

/* ─── Capacity planner ─────────────────────────────────────────────── */
async function renderCapacity() {
  titleEl.textContent = t('stats.capacity');
  primaryBtn.style.display = 'none';
  const patients = await db.listPatients();
  const today = todayISO();
  const days = [];
  for (let i = 0; i < 28; i++) days.push(addDays(today, i));
  const counts = new Map(days.map(d => [d, 0]));
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const ek of ['od','os']) {
      const eye = { ...p.eyes[ek], _eyeKey: ek };
      if (!eye.active) continue;
      const s = eyeStatus(eye, injs, today);
      if (!s.nextDate) continue;
      if (s.nextDate >= today && s.nextDate <= days[days.length - 1]) {
        counts.set(s.nextDate, (counts.get(s.nextDate) || 0) + 1);
      } else if (s.status === 'late') {
        counts.set(today, (counts.get(today) || 0) + 1);
      }
    }
  }
  const TARGET = 10; // tweak in Settings later
  const max = Math.max(...Array.from(counts.values()), TARGET);
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('stats.capacity.body'))}</p>
    <div class="card">
      ${days.map(d => {
        const n = counts.get(d) || 0;
        const pct = (n / max) * 100;
        const over = n > TARGET;
        return `
          <div style="display:flex; align-items:center; gap:10px; padding:4px 0;">
            <div style="width:70px; font-size:12px; color:var(--text3);">${escapeHtml(fmtDate(d))}</div>
            <div style="flex:1; height:8px; background:var(--mist); border-radius:4px; overflow:hidden;">
              <div style="height:100%; width:${pct}%; background:${over ? 'var(--ember)' : 'var(--signal)'};"></div>
            </div>
            <div style="width:36px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px;">${n}</div>
          </div>`;
      }).join('')}
    </div>`;
}

async function renderCost() {

  const costs = getCosts();
  const byDrug = {};

  let total = 0;
  view.innerHTML = `

    <div class="card">
      ${DRUGS.map(d => {

        return `

            <span class="drug-pill" style="background:${d.color};">${escapeHtml(getLang() === 'fr' ? d.fr : d.en)}</span>
            <div style="flex:1; font-size:13px;">${n} × ${unit ? '$' + unit : '—'}</div>
            <div style="font-variant-numeric:tabular-nums; font-size:13px;">${unit ? '$' + lineTotal.toLocaleString() : '—'}</div>
          </div>`;
      }).join('')}
      <div style="display:flex; justify-content:space-between; padding-top:8px; font-weight:600;">
        <span>Total</span>
        <span>$${total.toLocaleString()}</span>
      </div>
    </div>`;
}

/* ─── Complications tracker ────────────────────────────────────────── */
async function renderComplications() {
  titleEl.textContent = t('stats.complications.detail');
  primaryBtn.style.display = 'none';
  const allInj = await db.listAllInjections();
  const patients = await db.listPatients();
  const pById = new Map(patients.map(p => [p.id, p]));
  const events = [];
  for (const i of allInj) {
    for (const c of (i.complications || [])) {
      events.push({ key: c, date: i.date, patientId: i.patientId, eye: i.eye });
    }
  }
  events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  view.innerHTML = `
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(t('stats.complications.body'))}</p>
    ${events.length ? `<div class="card list">
      ${events.map(e => {
        const p = pById.get(e.patientId);
        return `
          <div class="row" data-pid="${e.patientId}">
            <div class="avatar" style="background:rgba(220,38,38,0.14); color:#991B1B;">⚠</div>
            <div class="meta">
              <h3>${escapeHtml(complicationLabel(e.key))}</h3>
              <p>${escapeHtml(fmtDate(e.date))} · ${escapeHtml(e.eye.toUpperCase())} · ${escapeHtml(formatPatientName(p || {}))}</p>
            </div>
            <div class="chev">›</div>
          </div>`;
      }).join('')}
    </div>` : `<div class="empty"><p>—</p></div>`}`;
  view.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => go('patient', { patientId: r.dataset.pid });
  });
}

/* ─── Recall list ─────────────────────────────────────────────────── */
async function renderRecall() {
  titleEl.textContent = t('stats.recall');
  primaryBtn.style.display = 'none';
  const wks = getRecallWeeks();
  const cutoffDate = addDays(todayISO(), -wks * 7);
  const patients = await db.listPatients();
  const flagged = [];
  for (const p of patients) {
    ensurePatientShape(p);
    const injs = await db.listInjections(p.id);
    for (const ek of ['od','os']) {
      const e = p.eyes[ek];
      if (!e.active) continue;
      const list = injs.filter(i => i.eye === ek).sort((a,b) => (a.date||'').localeCompare(b.date||''));
      const last = list[list.length - 1];
      if (!last) continue;
      if (last.date < cutoffDate) flagged.push({ p, eye: ek, lastDate: last.date, drug: e.drug });
    }
  }
  flagged.sort((a, b) => (a.lastDate || '').localeCompare(b.lastDate || ''));
  view.innerHTML = `
    <label class="field">
      <span class="lbl">${escapeHtml(t('stats.recall.weeks'))}</span>
      <input id="recall-wks" type="number" min="4" max="52" value="${wks}">
    </label>
    <p style="font-size:12px; color:var(--text3); margin: 4px 4px 12px;">${escapeHtml(tF('stats.recall.body', { n: wks }))}</p>
    ${flagged.length ? `<div class="card list">
      ${flagged.map(f => `
        <div class="row" data-pid="${f.p.id}">
          <span class="drug-pill" style="background:${drug(f.drug).color}; flex:0 0 auto;">${escapeHtml(f.eye.toUpperCase())} ${escapeHtml(drugLabel(f.drug))}</span>
          <div class="meta">
            <h3>${escapeHtml(formatPatientName(f.p))}${f.p.patientNumber ? ` <span style="font-weight:400; color:var(--text3); font-size:13px;">· #${escapeHtml(f.p.patientNumber)}</span>` : ''}</h3>
            <p>${escapeHtml(getLang() === 'fr' ? 'Dernière inj. ' : 'Last inj. ') + escapeHtml(fmtDate(f.lastDate))}</p>
          </div>
          <div class="chev">›</div>
        </div>`).join('')}
    </div>` : `<div class="empty"><p>—</p></div>`}`;
  document.getElementById('recall-wks').addEventListener('change', (e) => {
    setRecallWeeks(e.target.value);
    renderRecall();
  });
  view.querySelectorAll('.row[data-pid]').forEach(r => {
    r.onclick = () => go('patient', { patientId: r.dataset.pid });
  });
}

      <button id="s-seed-clear" class="btn-secondary">${escapeHtml(getLang() === 'fr' ? 'Retirer les patients fictifs' : 'Remove demo patients')}</button>
