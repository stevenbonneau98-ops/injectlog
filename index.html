/* =====================================================================
   Analyse with AI — sends de-identified clinical history to Anthropic
   Claude Opus 4.7 for an educational comparison vs. consensus practice.
   Identifiers (name, chart #, DOB, free-text notes) are NOT sent.
   =================================================================== */
async function analysePatientWithAi(patient, injs) {
  const fr = getLang() === 'fr';
  // Confirm before sending — the user explicitly opts in each time, like
  // the schedule-scan feature does. Matches the consent posture in Terms.
  const confirmMsg = fr
    ? "Envoyer l'historique clinique anonymisé de ce patient à Anthropic Claude (États-Unis) pour une analyse éducative ? Aucun identifiant (nom, n° dossier, DDN, notes) n'est envoyé."
    : "Send this patient's de-identified clinical history to Anthropic Claude (US-hosted) for an educational analysis? No identifiers (name, chart #, DOB, notes) are sent.";
  if (!confirm(confirmMsg)) return;

  // Build the de-identified payload.
  ensurePatientShape(patient);
  const ageYears = (() => {
    if (!patient.dob) return null;
    const d = new Date(patient.dob);
    if (isNaN(d.getTime())) return null;
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 86400000));
  })();
  const buildEye = (eyeKey) => {
    const eye = patient.eyes[eyeKey];
    const list = injs.filter(i => i.eye === eyeKey).slice().sort((a,b) => (a.date || '').localeCompare(b.date || ''));
    return {
      eye: eyeKey,
      active: !!eye.active,
      diagnosis: eye.diagnosis || null,
      regimen: eye.regimen || null,
      intervalWeeks: eye.intervalWeeks || null,
      loadingTarget: eye.loadingTarget || null,
      injections: list.map((i, idx) => ({
        date: i.date,
        drug: i.drug,
        vaSnellen: i.vaSnellen || null,
        crtUm: typeof i.crtUm === 'number' ? i.crtUm : null,
        iopPre: i.iopPre ?? null,
        iopPost: i.iopPost ?? null,
        intervalWeeksApplied: i.intervalWeeksApplied ?? null,
        weeksSincePrior: idx > 0 ? Number((daysBetween(list[idx - 1].date, i.date) / 7).toFixed(1)) : null,
        complications: Array.isArray(i.complications) ? i.complications : [],
        switchReason: i.switchReason || null,
      })),
    };
  };
  const payload = {
    lang: fr ? 'fr' : 'en',
    ageYears,
    allergies: Array.isArray(patient.allergies) ? patient.allergies : [],
    eyes: [buildEye('od'), buildEye('os')],
  };

  // Open the modal in a "loading" state immediately, then stream/await
  // the response. We re-use the fs-overlay pattern from Terms / Demo.
  const el = document.createElement('div');
  el.className = 'fs-overlay';
  el.innerHTML = `
    <header>
      <button id="ai-cancel" class="btn-ghost" style="padding:6px 10px;">${escapeHtml(t('btn.close'))}</button>
      <h2>${escapeHtml(fr ? 'Analyse IA' : 'AI analysis')}</h2>
    </header>
    <main style="padding:14px;">
      <div id="ai-out">
        <p style="color:var(--text3); font-size:13px;">${escapeHtml(fr ? 'Analyse en cours…' : 'Analysing…')}</p>
      </div>
      <p style="font-size:11px; color:var(--text3); line-height:1.45; margin-top:18px;">${escapeHtml(fr
        ? "Cette analyse est éducative et compare la trajectoire du patient avec la pratique consensuelle. Ce n'est pas une recommandation clinique."
        : "This analysis is educational and compares the patient's trajectory with consensus practice. It is not a clinical recommendation.")}</p>
    </main>`;
  document.body.appendChild(el);
  el.querySelector('#ai-cancel').onclick = () => el.remove();

  try {
    const res = await fetch('/api/analyze-patient', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json().catch(() => ({}));
    const out = el.querySelector('#ai-out');
    if (!out) return; // user dismissed
    if (!res.ok) {
      if (data?.error === 'auth') {
        out.innerHTML = `
          <div style="background:rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.25); border-radius:10px; padding:12px 14px;">
            <div style="font-size:13px; font-weight:600; color:#991B1B; margin-bottom:6px;">${escapeHtml(fr ? 'Clé API Anthropic invalide' : 'Anthropic API key invalid')}</div>
            <p style="font-size:13px; color:var(--text2); line-height:1.5; margin: 0 0 8px;">${escapeHtml(fr
              ? "Le serveur a reçu une erreur 401 d'Anthropic. Pour corriger :"
              : 'The server got a 401 from Anthropic. To fix:')}</p>
            <ol style="font-size:12.5px; color:var(--text2); line-height:1.55; padding-left:20px; margin:0;">
              <li>${escapeHtml(fr ? 'Ouvrez Vercel → ce projet → Settings → Environment Variables.' : 'Open Vercel → this project → Settings → Environment Variables.')}</li>
              <li>${escapeHtml(fr ? 'Ajoutez ou corrigez ANTHROPIC_API_KEY (depuis console.anthropic.com).' : 'Add or fix ANTHROPIC_API_KEY (from console.anthropic.com).')}</li>
              <li>${escapeHtml(fr ? 'Redéployez (Deployments → ⋯ → Redeploy).' : 'Redeploy (Deployments → ⋯ → Redeploy).')}</li>
            </ol>
          </div>`;
      } else {
        out.innerHTML = `<p style="color:var(--ember); font-size:13px;">${escapeHtml((fr ? 'Erreur : ' : 'Error: ') + (data?.error || res.status))}</p>`;
      }
      return;
    }
    const text = data.text || '';
    // The model emits one block per eye, structured as:
    //   OD — <indication> · <regimen> · n=<count>
    //   • Trajectory: ...
    //   • Vs. consensus: ...
    //   • Flag: ...           (optional)
    //   • Consider: ...
    // We parse line-by-line and render each block as a card tinted by eye
    // (faint blue OD / faint yellow OS) with bullets stacked beneath the
    // header. The closing disclaimer line is dropped into a muted footer.
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const blocks = [];
    let current = null;
    let disclaimer = '';
    for (const line of lines) {
      const eyeMatch = line.match(/^(OD|OS)\s*[—\-:·]\s*(.*)$/i);
      if (eyeMatch) {
        if (current) blocks.push(current);
        current = { eye: eyeMatch[1].toLowerCase(), header: eyeMatch[2].trim(), bullets: [] };
        continue;
      }
      const bulletMatch = line.match(/^[•\-*]\s*(.*)$/);
      if (bulletMatch && current) {
        current.bullets.push(bulletMatch[1].trim());
        continue;
      }
      // Disclaimer / fallback prose
      if (/educational discussion only|discussion éducative uniquement/i.test(line)) {
        disclaimer = line;
      } else if (current) {
        // Continuation of the previous bullet (line-wrapped)
        if (current.bullets.length) current.bullets[current.bullets.length - 1] += ' ' + line;
        else current.header += ' ' + line;
      } else {
        // No eye header yet — treat as preamble paragraph
        blocks.push({ eye: null, header: '', bullets: [], prose: line });
      }
    }
    if (current) blocks.push(current);
    const renderBullet = (b) => {
      // Highlight the bullet's leading label ("Trajectory:", "Vs.", etc.)
      const m = b.match(/^([^:]+:)\s*(.*)$/);
      if (m) {
        return `<li style="margin: 0 0 4px; padding-left:4px;"><strong style="color:var(--text); font-weight:600;">${escapeHtml(m[1])}</strong> <span style="color:var(--text2);">${escapeHtml(m[2])}</span></li>`;
      }
      return `<li style="margin: 0 0 4px; padding-left:4px; color:var(--text2);">${escapeHtml(b)}</li>`;
    };
    const cards = blocks.map(b => {
      if (b.prose) return `<p style="font-size:13px; color:var(--text2); line-height:1.5; margin: 0 0 10px;">${escapeHtml(b.prose)}</p>`;
      const tint = b.eye === 'od'
        ? 'background:rgba(10,107,255,0.06); border-color:rgba(10,107,255,0.25);'
        : 'background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.30);';
      const eyeLabel = b.eye === 'od' ? t('eye.od') : t('eye.os');
      return `
        <div class="card" style="${tint} margin-bottom:10px; padding:12px 14px;">
          <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:6px;">
            <span style="font-family:var(--serif); font-size:17px; font-weight:600;">${escapeHtml(eyeLabel)}</span>
            <span style="font-size:12px; color:var(--text3);">${escapeHtml(b.header)}</span>
          </div>
          <ul style="list-style:disc; padding-left:18px; margin:0; font-size:13.5px; line-height:1.5;">
            ${b.bullets.map(renderBullet).join('')}
          </ul>
        </div>`;
    }).join('');
    out.innerHTML = cards + (disclaimer
      ? `<p style="font-size:11px; color:var(--text3); font-style:italic; margin: 12px 4px 0; text-align:center;">${escapeHtml(disclaimer)}</p>`
      : '');
  } catch (e) {
    const out = el.querySelector('#ai-out');
    if (out) out.innerHTML = `<p style="color:var(--ember); font-size:13px;">${escapeHtml((fr ? 'Erreur réseau : ' : 'Network error: ') + String(e))}</p>`;
  }
}

/* =====================================================================
   Email today's list (mailto)
   =================================================================== */
async function emailTodaysList(enriched) {
  const email = getDigestEmail();
  if (!email) { toast(t('home.email.no.email')); return; }
  const items = (enriched || []).filter(x => {
    return x.sOd.status === 'due' || x.sOd.status === 'late' ||
           x.sOs.status === 'due' || x.sOs.status === 'late';
  });
  if (!items.length) { toast(t('home.email.none')); return; }
  const lines = items.map(({ p, sOd, sOs }) => {
    const parts = [];
    if (sOd.status === 'due' || sOd.status === 'late') parts.push(`OD ${drugLabel(p.eyes.od.drug)} (${t('status.' + sOd.status)})`);
    if (sOs.status === 'due' || sOs.status === 'late') parts.push(`OS ${drugLabel(p.eyes.os.drug)} (${t('status.' + sOs.status)})`);
    return `• ${formatPatientName(p)}${p.patientNumber ? ' #' + p.patientNumber : ''} — ${parts.join(', ')}`;
  });
  const subject = tF('home.email.subject', { date: fmtDate(todayISO()) });
  const body = lines.join('\n');
  window.location.href = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  toast(t('home.email.opened'));
}

/* ─── service worker ──────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

/* ─── boot ────────────────────────────────────────────────────────── */
(async function boot() {
  await showInstallHint();
  if (navigator.storage?.persist) { try { await navigator.storage.persist(); } catch {} }
  if (lockIsEnabled()) await showLockScreen();
  const termsAt = localStorage.getItem(TERMS_KEY);
  if (!termsAt) await showTermsScreen(false);
  if (!localStorage.getItem(DEMO_KEY)) await showDemoFlow(false);
  await promptFaceIdSetup();
  startAutoLockWatcher();
  await go('patients');
})();
</script>
